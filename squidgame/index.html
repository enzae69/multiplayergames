<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SQUID GAME</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#080810;color:#fff;font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,45,110,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,45,110,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.screen{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:20px 14px 40px;position:relative;z-index:1;gap:12px}
.screen.active{display:flex}
.sq-logo{font-family:'Russo One',sans-serif;font-size:clamp(38px,12vw,72px);color:#fff;background:linear-gradient(135deg,#c00040,#ff2d6e);padding:6px 24px 12px;border-radius:14px;letter-spacing:6px;box-shadow:0 6px 0 #7a0025,0 12px 40px rgba(255,45,110,.5);border:3px solid rgba(255,255,255,.6);text-shadow:2px 2px 6px rgba(0,0,0,.5);line-height:1.1}
.sq-sub{font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:5px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:10px}
.inp{background:rgba(12,12,28,1);border:2px solid rgba(255,45,110,.3);color:#fff;font-family:'Russo One',sans-serif;font-size:20px;padding:14px 18px;border-radius:12px;outline:none;width:100%;text-align:center;letter-spacing:3px;transition:border-color .2s;max-width:360px}
.inp:focus{border-color:#ff2d6e;box-shadow:0 0 0 3px rgba(255,45,110,.15)}
.inp::placeholder{color:rgba(255,255,255,.2);font-weight:400;letter-spacing:1px}
.btn{font-family:'Russo One',sans-serif;font-size:16px;letter-spacing:2px;padding:16px 28px;border:none;border-radius:12px;cursor:pointer;touch-action:manipulation;transition:transform .12s,opacity .15s;text-transform:uppercase;width:100%;max-width:400px}
.btn:active{transform:scale(.95)}
.btn-red{background:linear-gradient(135deg,#9c0030,#ff2d6e);color:#fff;box-shadow:0 4px 20px rgba(255,45,110,.4)}
.btn-teal{background:linear-gradient(135deg,#006b60,#00d9c0);color:#fff;box-shadow:0 4px 20px rgba(0,217,192,.4)}
.btn-ghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15)}
.btn:disabled{opacity:.3;cursor:default;pointer-events:none}
.err{color:#ff4466;font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:1px;min-height:18px;text-align:center}
.sec-label{font-family:'Russo One',sans-serif;font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.3)}

/* LOBBY */
.player-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;width:100%;max-width:400px}
.player-row.me{border-color:rgba(255,45,110,.4);background:rgba(255,45,110,.06)}
.player-row.host{border-color:rgba(255,200,0,.3);background:rgba(255,200,0,.04)}
.player-av{font-size:20px;width:32px;text-align:center}
.player-nm{font-family:'Russo One',sans-serif;font-size:14px;flex:1}
.tag{font-family:'Russo One',sans-serif;font-size:9px;letter-spacing:2px;padding:2px 8px;border-radius:6px}
.tag-host{background:rgba(255,200,0,.15);color:#ffc800;border:1px solid rgba(255,200,0,.3)}
.tag-you{background:rgba(255,45,110,.15);color:#ff7aaa;border:1px solid rgba(255,45,110,.3)}
.lobby-wait{font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:3px;color:rgba(255,45,110,.5);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* GAME HEADER */
.game-header{width:100%;max-width:500px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.5);border:1px solid rgba(255,45,110,.2);border-radius:12px;padding:10px 16px}
.game-title-sm{font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:2px;color:#ff2d6e}
.game-timer{font-family:'Russo One',sans-serif;font-size:24px;color:#fff;letter-spacing:2px}
.game-timer.urgent{color:#ff2d6e;animation:blink .5s step-end infinite}
@keyframes blink{50%{opacity:.3}}

/* PLAYER STATUS BAR */
.pbar{display:flex;flex-wrap:wrap;gap:6px;width:100%;max-width:500px;justify-content:center}
.pchip{font-family:'Russo One',sans-serif;font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:20px;border:1px solid;white-space:nowrap;transition:opacity .3s}
.pchip.alive{background:rgba(0,217,192,.1);border-color:rgba(0,217,192,.3);color:#00d9c0}
.pchip.dead{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.25);text-decoration:line-through;opacity:.5}
.pchip.me{border-color:rgba(255,45,110,.5);color:#ff7aaa}
.pchip.me.alive{background:rgba(255,45,110,.1)}

/* COUNTDOWN */
.countdown-num{font-family:'Russo One',sans-serif;font-size:clamp(100px,30vw,200px);color:#ff2d6e;text-shadow:0 0 60px rgba(255,45,110,.7),0 0 120px rgba(255,45,110,.4);animation:pop .5s ease-out}
@keyframes pop{0%{transform:scale(1.4);opacity:0}100%{transform:scale(1);opacity:1}}

/* GAME AREAS */
.game-area{width:100%;max-width:500px;display:flex;flex-direction:column;align-items:center;gap:14px}
canvas{border-radius:12px;border:2px solid rgba(255,45,110,.2);max-width:100%}

/* BIG GAME BUTTON */
.big-btn{font-family:'Russo One',sans-serif;font-size:22px;letter-spacing:4px;padding:28px;border:none;border-radius:20px;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;width:100%;max-width:300px;transition:transform .08s,box-shadow .08s}
.big-btn:active{transform:scale(.93)}
.big-btn-red{background:linear-gradient(135deg,#9c0030,#ff2d6e);color:#fff;box-shadow:0 8px 0 #6a001f,0 12px 30px rgba(255,45,110,.5)}
.big-btn-teal{background:linear-gradient(135deg,#005950,#00d9c0);color:#fff;box-shadow:0 8px 0 #003d38,0 12px 30px rgba(0,217,192,.5)}
.big-btn-gold{background:linear-gradient(135deg,#8a6000,#ffc800);color:#1a1000;box-shadow:0 8px 0 #5a3d00,0 12px 30px rgba(255,200,0,.5)}
.big-btn:disabled{opacity:.3;pointer-events:none}

/* PROGRESS BAR */
.progress-wrap{width:100%;max-width:400px;background:rgba(255,255,255,.08);border-radius:20px;height:20px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.progress-fill{height:100%;border-radius:20px;transition:width .3s}
.progress-red{background:linear-gradient(90deg,#9c0030,#ff2d6e)}
.progress-teal{background:linear-gradient(90deg,#005950,#00d9c0)}
.progress-gold{background:linear-gradient(90deg,#8a6000,#ffc800)}

/* ELIM / RESULTS */
.elim-box{background:rgba(180,0,30,.15);border:2px solid rgba(255,45,110,.4);border-radius:18px;padding:24px;width:100%;max-width:400px;text-align:center}
.elim-title{font-family:'Russo One',sans-serif;font-size:22px;color:#ff2d6e;letter-spacing:3px;margin-bottom:12px}
.elim-list{display:flex;flex-direction:column;gap:6px}
.elim-item{font-family:'Russo One',sans-serif;font-size:14px;color:rgba(255,255,255,.6);letter-spacing:1px}

.winner-box{display:flex;flex-direction:column;align-items:center;gap:16px}
.winner-crown{font-size:80px;animation:crown-bounce 1s ease-in-out infinite alternate}
@keyframes crown-bounce{0%{transform:translateY(0) rotate(-5deg)}100%{transform:translateY(-12px) rotate(5deg)}}
.winner-name{font-family:'Russo One',sans-serif;font-size:clamp(28px,9vw,52px);color:#ffc800;text-shadow:0 0 30px rgba(255,200,0,.8);letter-spacing:4px;text-align:center}
.winner-sub{font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:5px;color:rgba(255,200,0,.5)}

/* HP BAR */
.hp-row{display:flex;align-items:center;gap:8px;width:100%;max-width:400px}
.hp-name{font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:1px;width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.hp-bar-wrap{flex:1;background:rgba(255,255,255,.08);border-radius:10px;height:14px;overflow:hidden}
.hp-bar-fill{height:100%;border-radius:10px;transition:width .2s;background:linear-gradient(90deg,#00d9c0,#00ff9d)}
.hp-val{font-family:'Russo One',sans-serif;font-size:10px;color:rgba(255,255,255,.4);width:30px;text-align:right;flex-shrink:0}

/* MARBLES */
.marble-count{font-family:'Russo One',sans-serif;font-size:48px;color:#ffc800;text-shadow:0 0 20px rgba(255,200,0,.6)}
.pick-row{display:flex;gap:10px;width:100%;max-width:360px}
.pick-btn{flex:1;font-family:'Russo One',sans-serif;font-size:18px;letter-spacing:2px;padding:20px;border:2px solid rgba(255,255,255,.2);border-radius:14px;background:rgba(255,255,255,.06);color:#fff;cursor:pointer;touch-action:manipulation;transition:all .15s}
.pick-btn.selected,.pick-btn:active{background:rgba(255,45,110,.2);border-color:#ff2d6e;color:#ff7aaa}

/* GLASS BRIDGE */
.bridge-row{display:flex;gap:10px;width:100%;max-width:360px;justify-content:center;margin:4px 0}
.glass-tile{flex:1;max-width:140px;padding:20px 10px;border-radius:12px;font-family:'Russo One',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;touch-action:manipulation;border:2px solid;transition:all .2s;text-align:center}
.glass-tile.unknown{background:rgba(100,200,255,.08);border-color:rgba(100,200,255,.25);color:rgba(100,200,255,.8)}
.glass-tile.safe{background:rgba(0,217,192,.15);border-color:#00d9c0;color:#00d9c0;pointer-events:none}
.glass-tile.broken{background:rgba(255,45,110,.15);border-color:#ff2d6e;color:#ff2d6e;pointer-events:none}
.glass-tile:disabled{pointer-events:none;opacity:.5}

/* MINGLE */
.mingle-num{font-family:'Russo One',sans-serif;font-size:clamp(60px,20vw,120px);color:#00d9c0;text-shadow:0 0 40px rgba(0,217,192,.7)}
.mingle-label{font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:5px;color:rgba(0,217,192,.5)}
.mingle-grid{display:flex;flex-wrap:wrap;gap:8px;width:100%;max-width:400px;justify-content:center}
.mingle-chip{font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:1px;padding:10px 16px;border-radius:10px;border:2px solid rgba(0,217,192,.25);background:rgba(0,217,192,.06);color:#00d9c0;cursor:pointer;touch-action:manipulation;transition:all .15s}
.mingle-chip.in-group{border-color:#00d9c0;background:rgba(0,217,192,.18);color:#fff}
.mingle-chip.me{border-color:#ff2d6e;color:#ff7aaa}

/* TUG */
.rope-wrap{width:100%;max-width:400px;height:40px;background:rgba(255,255,255,.06);border-radius:20px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.rope-fill-a{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#ff2d6e,#ff7a9d);border-radius:20px 0 0 20px;transition:width .2s}
.rope-fill-b{position:absolute;right:0;top:0;bottom:0;background:linear-gradient(270deg,#00d9c0,#7affed);border-radius:0 20px 20px 0;transition:width .2s}
.rope-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Russo One',sans-serif;font-size:20px}
.team-label{font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:3px;padding:6px 14px;border-radius:8px}
.team-a{color:#ff2d6e;border:1px solid rgba(255,45,110,.3);background:rgba(255,45,110,.08)}
.team-b{color:#00d9c0;border:1px solid rgba(0,217,192,.3);background:rgba(0,217,192,.08)}

/* LIGHT */
.light-circle{width:120px;height:120px;border-radius:50%;border:6px solid;transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:50px}
.light-green{background:rgba(0,217,192,.15);border-color:#00d9c0;box-shadow:0 0 40px rgba(0,217,192,.5)}
.light-red{background:rgba(255,45,110,.2);border-color:#ff2d6e;box-shadow:0 0 40px rgba(255,45,110,.7);animation:danger-pulse .4s ease-in-out infinite alternate}
@keyframes danger-pulse{0%{box-shadow:0 0 40px rgba(255,45,110,.7)}100%{box-shadow:0 0 80px rgba(255,45,110,1)}}

/* RLGL tracks */
.track-container{width:100%;max-width:480px}
.track-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.track-name{font-family:'Russo One',sans-serif;font-size:10px;color:rgba(255,255,255,.4);width:60px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.track-bar{flex:1;height:18px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;position:relative}
.track-fill{height:100%;border-radius:10px;transition:width .15s}
.track-me .track-fill{background:linear-gradient(90deg,#9c0030,#ff2d6e)}
.track-other .track-fill{background:linear-gradient(90deg,#005950,#00d9c0)}
.track-dead .track-fill{background:rgba(255,255,255,.1)}
.track-dead .track-name{color:rgba(255,255,255,.2);text-decoration:line-through}
.finish-flag{font-size:14px;flex-shrink:0}

/* SPECTATOR */
.spec-badge{background:rgba(255,200,0,.1);border:1px solid rgba(255,200,0,.3);color:#ffc800;font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:3px;padding:6px 14px;border-radius:8px;text-align:center}

/* LOADING */
#loading{position:fixed;inset:0;background:#080810;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
#loading.hide{opacity:0;pointer-events:none}
.spinner{width:44px;height:44px;border:3px solid rgba(255,45,110,.2);border-top-color:#ff2d6e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:3px;color:rgba(255,45,110,.5)}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,.96);border:1px solid rgba(255,45,110,.4);color:#fff;font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:2px;padding:12px 22px;border-radius:12px;z-index:8000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div class="load-txt">VERBINDE...</div></div>
<div id="toast"></div>

<!-- MENU -->
<div class="screen active" id="sMenu">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;width:100%">
    <div class="sq-logo">SQUID GAME</div>
    <div class="sq-sub">456 Players • 7 Games • 1 Survivor</div>
    <input class="inp" id="nameInp" placeholder="Dein Name" maxlength="12" autocomplete="off" spellcheck="false">
    <button class="btn btn-red" onclick="joinServer()">▶ SERVER BEITRETEN</button>
    <div class="err" id="menuErr"></div>
    <a href="../menu.html" class="btn btn-ghost" style="text-decoration:none;text-align:center;font-size:13px">← SPIELAUSWAHL</a>
  </div>
</div>

<!-- LOBBY -->
<div class="screen" id="sLobby">
  <div class="sq-logo" style="font-size:clamp(28px,9vw,52px)">SQUID GAME</div>
  <div class="sec-label">LOBBY — WARTE AUF SPIELER</div>
  <div id="playerList" style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px"></div>
  <div class="err" id="lobbyErr"></div>
  <button class="btn btn-red" id="startBtn" onclick="hostStart()" disabled>🎮 SPIEL STARTEN</button>
  <div class="lobby-wait" id="lobbyWait">Warte auf den Host...</div>
  <button class="btn btn-ghost" style="max-width:200px;font-size:12px" onclick="leaveServer()">← VERLASSEN</button>
</div>

<!-- COUNTDOWN -->
<div class="screen" id="sCountdown" style="justify-content:center">
  <div class="sq-logo" style="font-size:clamp(22px,7vw,40px)" id="cdGameName">GAME 1/7</div>
  <div class="countdown-num" id="cdNum">3</div>
  <div style="font-family:'Russo One',sans-serif;font-size:14px;letter-spacing:4px;color:rgba(255,255,255,.4)" id="cdSub">RED LIGHT GREEN LIGHT</div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="sGame">
  <div class="game-header">
    <div class="game-title-sm" id="ghTitle">GAME 1/7</div>
    <div class="game-timer" id="ghTimer">60</div>
  </div>
  <div class="pbar" id="pbar"></div>
  <div class="game-area" id="gameArea"></div>
  <div class="spec-badge" id="specBadge" style="display:none">👁 ZUSCHAUER</div>
</div>

<!-- ELIM SCREEN -->
<div class="screen" id="sElim" style="justify-content:center">
  <div class="elim-box">
    <div class="elim-title" id="elimTitle">ELIMINIERT</div>
    <div class="sec-label" style="margin-bottom:10px" id="elimGameName"></div>
    <div class="elim-list" id="elimList"></div>
    <div style="margin-top:14px;font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(0,217,192,.5)" id="elimSurvivors"></div>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="sResults" style="justify-content:center">
  <div class="winner-box">
    <div class="winner-crown">👑</div>
    <div class="winner-sub">GEWINNER</div>
    <div class="winner-name" id="winnerName">—</div>
    <div style="font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:2px;color:rgba(255,255,255,.3);text-align:center" id="winnerSub"></div>
    <button class="btn btn-red" style="margin-top:20px" onclick="leaveServer()">← ZURÜCK ZUM MENU</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const sb = createClient('https://ozvyymrqibpyqccgszlz.supabase.co','sb_publishable_30WmZF8d8h_rUSrTGtBwnQ_Kn9gquwL');

const AVATARS = ['🐙','🦑','🃏','🔺','🟥','⭕','🎭','🏮','🎯','🃏'];
const GAME_NAMES = ['','RED LIGHT GREEN LIGHT','HONEYCOMB','TUG OF WAR','MARBLES','GLASS BRIDGE','MINGLE','LAST STAND'];

let myId = 'p_' + Math.random().toString(36).slice(2,10);
let myName = '', myAvatar = '';
let isHost = false;
let gs = null, ch = null;
let hostTickInterval = null, hostTimerInterval = null;
let hostPingInterval = null;
let noHostTimeout = null;
let localMoving = false;

// Load saved name
(()=>{ var n=localStorage.getItem('sq_name'); if(n) document.getElementById('nameInp').value=n; })();

function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function setLoading(v){ document.getElementById('loading').classList.toggle('hide',!v); }
function showToast(msg,dur=2500){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),dur); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr){ var a=[...arr]; for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }

// ── CONNECT ──
window.joinServer = function(){
  var name = document.getElementById('nameInp').value.trim().toUpperCase();
  if(!name||name.length<2){ document.getElementById('menuErr').textContent='Name eingeben!'; return; }
  localStorage.setItem('sq_name', name);
  myName = name;
  myAvatar = pick(AVATARS);
  connectChannel();
};

function connectChannel(){
  setLoading(true);
  ch = sb.channel('squidgame_main', {config:{broadcast:{self:false}}});

  ch.on('broadcast',{event:'state'}, m=>{
    if(isHost) return;
    var prev = gs ? gs.phase : null;
    setLoading(false);
    gs = m.payload.s;
    clearTimeout(noHostTimeout);
    scheduleHostCheck();
    var prevPhase = prev;
    if(prevPhase !== gs.phase) onPhaseChange(prevPhase, gs.phase);
    updateUI();
  });

  ch.on('broadcast',{event:'ping'}, m=>{
    if(isHost) return;
    if(gs){ gs.lastHostPing = m.payload.ts; }
    clearTimeout(noHostTimeout);
    scheduleHostCheck();
  });

  ch.on('broadcast',{event:'input'}, m=>{
    if(!isHost) return;
    handleInput(m.payload);
  });

  ch.on('broadcast',{event:'join'}, m=>{
    if(!isHost) return;
    var p = m.payload;
    if(!gs) return;
    if(gs.players.find(x=>x.id===p.id)) return;
    // Mid-game: spectator only
    var alive = gs.phase === 'lobby';
    gs.players.push({id:p.id, name:p.name, avatar:p.avatar, alive, team:null, marbles:5, hp:100, joinTs:p.joinTs});
    broadcastState();
    updateUI();
  });

  ch.subscribe((status, err)=>{
    if(status === 'SUBSCRIBED'){
      setLoading(false);
      // Send join, then wait 2s for a host response
      ch.send({type:'broadcast',event:'join',payload:{id:myId,name:myName,avatar:myAvatar,joinTs:Date.now()}});
      setTimeout(()=>{
        if(!gs){
          // No host found — become host
          becomeHost();
        }
      }, 2000);
    } else if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED'){
      setLoading(false);
      document.getElementById('menuErr').textContent = 'Verbindungsfehler: ' + status;
    }
  });
}

function scheduleHostCheck(){
  clearTimeout(noHostTimeout);
  noHostTimeout = setTimeout(()=>{
    if(!isHost && gs){
      // Host is gone — check if we should take over
      var sorted = [...gs.players].sort((a,b)=>a.joinTs-b.joinTs);
      if(!sorted.length || sorted[0].id === myId){
        becomeHost();
      }
    }
  }, 9000);
}

function becomeHost(){
  isHost = true;
  if(!gs){
    gs = {
      phase:'lobby',
      players:[{id:myId,name:myName,avatar:myAvatar,alive:true,team:null,marbles:5,hp:100,joinTs:Date.now()}],
      hostId:myId,
      gameData:{},
      round:0,
      timerEnd:0,
      lastHostPing:Date.now(),
      eliminated:[],
    };
  } else {
    gs.hostId = myId;
    if(!gs.players.find(p=>p.id===myId)){
      gs.players.push({id:myId,name:myName,avatar:myAvatar,alive:false,team:null,marbles:5,hp:100,joinTs:Date.now()});
    }
  }
  startHostPing();
  broadcastState();
  showScreen('sLobby');
  updateUI();
}

function startHostPing(){
  clearInterval(hostPingInterval);
  hostPingInterval = setInterval(()=>{
    if(!isHost){ clearInterval(hostPingInterval); return; }
    ch.send({type:'broadcast',event:'ping',payload:{ts:Date.now()}});
  }, 2000);
}

function broadcastState(){ if(!ch||!isHost) return; ch.send({type:'broadcast',event:'state',payload:{s:gs}}); }

function sendInput(payload){ if(!ch) return; ch.send({type:'broadcast',event:'input',payload:{...payload,playerId:myId}}); }

window.leaveServer = function(){
  clearInterval(hostTickInterval); clearInterval(hostTimerInterval); clearInterval(hostPingInterval);
  clearTimeout(noHostTimeout);
  if(ch){ ch.unsubscribe(); ch=null; }
  gs=null; isHost=false; localMoving=false;
  showScreen('sMenu');
};

// ── HOST: START GAME ──
window.hostStart = function(){
  if(!isHost||!gs) return;
  var alive = gs.players.filter(p=>p.alive);
  if(alive.length < 2){ showToast('Mindestens 2 Spieler!'); return; }
  gs.round = 0;
  gs.eliminated = [];
  startCountdown(1);
};

function startCountdown(gameNum){
  clearInterval(hostTickInterval); clearInterval(hostTimerInterval);
  gs.phase = 'countdown';
  gs.gameData = {cdVal:3, gameNum};
  gs.round = gameNum;
  broadcastState();
  var cd = 3;
  var iv = setInterval(()=>{
    cd--;
    if(cd <= 0){
      clearInterval(iv);
      startGame(gameNum);
    } else {
      gs.gameData.cdVal = cd;
      broadcastState();
    }
  }, 1000);
}

function startGame(n){
  gs.phase = 'g'+n;
  gs.round = n;
  var duration = [0,60,60,30,0,0,20,30][n];
  gs.timerEnd = Date.now() + duration * 1000;
  gs.gameData = initGameData(n);
  broadcastState();
  clearInterval(hostTickInterval);
  hostTickInterval = setInterval(()=>hostTick(), 200);
}

function initGameData(n){
  var alive = gs.players.filter(p=>p.alive);
  if(n===1){
    var d = {light:'green', lightEnd: Date.now() + 3000, progress:{}, moving:{}};
    alive.forEach(p=>{ d.progress[p.id]=0; d.moving[p.id]=false; });
    return d;
  }
  if(n===2){
    var shapes = ['⭕','△','★','☂'];
    var d = {taps:{}, shape:{}};
    alive.forEach(p=>{ d.taps[p.id]=0; d.shape[p.id]=pick(shapes); });
    return d;
  }
  if(n===3){
    var d = {score:0, teamA:[], teamB:[]};
    var s = shuffle(alive);
    s.forEach((p,i)=>{ if(i%2===0){ d.teamA.push(p.id); p.team='A'; } else { d.teamB.push(p.id); p.team='B'; } });
    return d;
  }
  if(n===4){
    var d = {pairs:{}, picks:{}, rounds:[], roundNum:0, marbles:{}};
    alive.forEach(p=>{ d.marbles[p.id]=p.marbles||5; });
    var sh = shuffle(alive);
    for(var i=0;i<sh.length-1;i+=2) d.pairs[sh[i].id]=sh[i+1].id, d.pairs[sh[i+1].id]=sh[i].id;
    if(sh.length%2) d.solo = sh[sh.length-1].id;
    d.picks = {};
    d.roundNum = 0;
    d.waitingPick = true;
    return d;
  }
  if(n===5){
    var d = {rows:[], revealed:[], frontier:0, currentPlayer:null, playerOrder:[]};
    for(var i=0;i<10;i++) d.rows.push(Math.random()<0.5?'left':'right');
    d.revealed = new Array(10).fill(null);
    d.playerOrder = alive.map(p=>p.id);
    d.currentPlayerIdx = 0;
    d.currentPlayer = d.playerOrder[0];
    d.turnEnd = Date.now() + 12000;
    return d;
  }
  if(n===6){
    var groups = [3,2,4,2];
    var roundSizes = groups.slice(0,2);
    var d = {roundNum:0, groupSize: roundSizes[0], groups:{}, roundEnd: Date.now()+12000, roundSizes};
    alive.forEach(p=>{ d.groups[p.id]=null; });
    return d;
  }
  if(n===7){
    var d = {hp:{}};
    alive.forEach(p=>{ d.hp[p.id]=100; });
    return d;
  }
  return {};
}

function hostTick(){
  if(!isHost||!gs) return;
  var now = Date.now();
  var n = gs.round;
  var phase = gs.phase;
  if(phase !== 'g'+n) return;

  var timeLeft = Math.max(0, Math.ceil((gs.timerEnd - now)/1000));

  if(n===1) tickG1(now, timeLeft);
  else if(n===2) tickG2(now, timeLeft);
  else if(n===3) tickG3(now, timeLeft);
  else if(n===5) tickG5(now);
  else if(n===6) tickG6(now);
  else if(n===7) tickG7(now, timeLeft);

  // Timer-based end
  if([1,2,3,7].includes(n) && timeLeft <= 0) endGame(n);

  broadcastState();
}

function tickG1(now){
  var d = gs.gameData;
  // Advance moving players
  gs.players.filter(p=>p.alive&&d.moving[p.id]).forEach(p=>{
    d.progress[p.id] = Math.min(100, (d.progress[p.id]||0) + 0.35);
    if(d.progress[p.id] >= 100){
      // Finished - mark as safe
      d.progress[p.id] = 100;
    }
  });
  // Switch light
  if(now >= d.lightEnd){
    if(d.light === 'green'){
      d.light = 'red';
      d.lightEnd = now + (2000 + Math.random()*2000);
      // Eliminate moving players
      gs.players.filter(p=>p.alive).forEach(p=>{
        if(d.moving[p.id]){
          p.alive = false;
          if(!gs.eliminated) gs.eliminated=[];
          gs.eliminated.push({id:p.id,name:p.name,game:1});
        }
      });
    } else {
      d.light = 'green';
      d.lightEnd = now + (2000 + Math.random()*3000);
    }
  }
}

function tickG2(){ /* tap counts handled by input */ }

function tickG3(){ /* pull counts handled by input */ }

function tickG5(now){
  var d = gs.gameData;
  if(!d.currentPlayer) return;
  if(now >= d.turnEnd){
    // Auto-eliminate current player (too slow)
    var p = gs.players.find(x=>x.id===d.currentPlayer);
    if(p && p.alive){
      p.alive = false;
      if(!gs.eliminated) gs.eliminated=[];
      gs.eliminated.push({id:p.id,name:p.name,game:5});
    }
    advanceBridge(d, false);
  }
}

function tickG6(now){
  var d = gs.gameData;
  if(now >= d.roundEnd){
    // Evaluate groups
    var groupSize = d.groupSize;
    // Build groups map: groupId -> [playerIds]
    var groupMap = {};
    Object.entries(d.groups).forEach(([pid,gid])=>{
      if(!gid){ groupMap['solo_'+pid]=[pid]; return; }
      if(!groupMap[gid]) groupMap[gid]=[];
      groupMap[gid].push(pid);
    });
    // Eliminate wrong-sized
    Object.values(groupMap).forEach(members=>{
      if(members.length !== groupSize){
        members.forEach(pid=>{
          var p = gs.players.find(x=>x.id===pid);
          if(p&&p.alive){ p.alive=false; if(!gs.eliminated)gs.eliminated=[]; gs.eliminated.push({id:p.id,name:p.name,game:6}); }
        });
      }
    });
    d.roundNum++;
    if(d.roundNum >= d.roundSizes.length){
      endGame(6);
      return;
    }
    // Next round
    d.groupSize = d.roundSizes[d.roundNum];
    var alive = gs.players.filter(p=>p.alive);
    d.groups = {};
    alive.forEach(p=>{ d.groups[p.id]=null; });
    d.roundEnd = Date.now() + 12000;
  }
}

function tickG7(now, timeLeft){
  var d = gs.gameData;
  // Check if only 1 alive
  var alive = gs.players.filter(p=>p.alive);
  if(alive.length <= 1) endGame(7);
}

function advanceBridge(d, success){
  if(success){
    d.frontier = (d.frontier||0) + 1;
  }
  // Move to next player
  d.currentPlayerIdx = (d.currentPlayerIdx||0) + 1;
  if(d.currentPlayerIdx >= d.playerOrder.length){
    endGame(5); return;
  }
  // Find next alive player in order
  while(d.currentPlayerIdx < d.playerOrder.length){
    var pid = d.playerOrder[d.currentPlayerIdx];
    if(gs.players.find(p=>p.id===pid&&p.alive)) break;
    d.currentPlayerIdx++;
  }
  if(d.currentPlayerIdx >= d.playerOrder.length){ endGame(5); return; }
  d.currentPlayer = d.playerOrder[d.currentPlayerIdx];
  d.turnEnd = Date.now() + 12000;
}

function handleInput(payload){
  if(!isHost||!gs) return;
  var {playerId, type} = payload;
  var p = gs.players.find(x=>x.id===playerId);
  var n = gs.round;

  if(type==='move' && n===1 && gs.phase==='g1'){
    gs.gameData.moving[playerId] = payload.val;
  }
  if(type==='tap' && n===2 && gs.phase==='g2'){
    if(p&&p.alive) gs.gameData.taps[playerId] = (gs.gameData.taps[playerId]||0)+1;
  }
  if(type==='pull' && n===3 && gs.phase==='g3'){
    if(!p||!p.alive) return;
    var d=gs.gameData;
    if(d.teamA.includes(playerId)) d.score-=1;
    else if(d.teamB.includes(playerId)) d.score+=1;
  }
  if(type==='marble' && n===4 && gs.phase==='g4'){
    if(!p||!p.alive) return;
    var d=gs.gameData;
    d.picks[playerId]=payload.val;
    // Check if both in pair have picked
    var partnerId=d.pairs[playerId];
    if(partnerId && d.picks[partnerId]){
      // Reveal result
      var count = Math.floor(Math.random()*10)+1;
      var actual = count%2===0?'even':'odd';
      var pWin = d.picks[playerId]===actual;
      var ptWin = d.picks[partnerId]===actual;
      if(pWin && !ptWin){ d.marbles[playerId]++; d.marbles[partnerId]--; }
      else if(!pWin && ptWin){ d.marbles[partnerId]++; d.marbles[playerId]--; }
      var round = {p1:playerId,p2:partnerId,count,actual,p1pick:d.picks[playerId],p2pick:d.picks[partnerId]};
      d.rounds.push(round);
      d.picks={};
      d.roundNum++;
      if(d.roundNum>=5) endGame(4);
    }
  }
  if(type==='glass' && n===5 && gs.phase==='g5'){
    var d=gs.gameData;
    if(d.currentPlayer!==playerId) return;
    var row=d.rows[d.frontier||0];
    var correct = payload.val===row;
    if(!correct){
      if(!gs.eliminated)gs.eliminated=[];
      gs.eliminated.push({id:playerId,name:p?p.name:'?',game:5});
      if(p) p.alive=false;
      d.revealed[d.frontier||0]=row;
    }
    advanceBridge(d, correct);
  }
  if(type==='mingle' && n===6 && gs.phase==='g6'){
    if(!p||!p.alive) return;
    var d=gs.gameData;
    var targetId=payload.targetId;
    var gSize=d.groupSize;
    // Find or create group
    var myGroup=d.groups[playerId];
    var targetGroup=d.groups[targetId];
    if(!myGroup && !targetGroup){
      var gId='g_'+Math.random().toString(36).slice(2,6);
      d.groups[playerId]=gId; d.groups[targetId]=gId;
    } else if(myGroup && !targetGroup){
      // Check group size
      var cnt=Object.values(d.groups).filter(g=>g===myGroup).length;
      if(cnt<gSize) d.groups[targetId]=myGroup;
    } else if(!myGroup && targetGroup){
      var cnt=Object.values(d.groups).filter(g=>g===targetGroup).length;
      if(cnt<gSize) d.groups[playerId]=targetGroup;
    }
  }
  if(type==='attack' && n===7 && gs.phase==='g7'){
    if(!p||!p.alive) return;
    var d=gs.gameData;
    var alive=gs.players.filter(x=>x.alive&&x.id!==playerId);
    if(!alive.length) return;
    var target=pick(alive);
    d.hp[target.id]=Math.max(0,(d.hp[target.id]||100)-15);
    if(d.hp[target.id]<=0){
      target.alive=false;
      if(!gs.eliminated)gs.eliminated=[];
      gs.eliminated.push({id:target.id,name:target.name,game:7});
    }
  }
}

function endGame(n){
  clearInterval(hostTickInterval);
  // Determine who gets eliminated this round
  var newElim = [];
  if(n===1){
    // Bottom 50% by progress eliminated (those who didn't cross)
    var alive=gs.players.filter(p=>p.alive);
    var sorted=alive.slice().sort((a,b)=>(gs.gameData.progress[b.id]||0)-(gs.gameData.progress[a.id]||0));
    var cutoff=Math.ceil(sorted.length/2);
    sorted.slice(cutoff).forEach(p=>{
      p.alive=false; newElim.push({id:p.id,name:p.name,game:n});
    });
  }
  if(n===2){
    var d=gs.gameData;
    gs.players.filter(p=>p.alive).forEach(p=>{
      if((d.taps[p.id]||0)<80){ p.alive=false; newElim.push({id:p.id,name:p.name,game:n}); }
    });
  }
  if(n===3){
    var d=gs.gameData;
    if(d.score < 0){
      // Team A loses
      d.teamA.forEach(pid=>{
        var p=gs.players.find(x=>x.id===pid&&x.alive);
        if(p){ p.alive=false; newElim.push({id:p.id,name:p.name,game:n}); }
      });
    } else {
      d.teamB.forEach(pid=>{
        var p=gs.players.find(x=>x.id===pid&&x.alive);
        if(p){ p.alive=false; newElim.push({id:p.id,name:p.name,game:n}); }
      });
    }
  }
  if(n===4){
    var d=gs.gameData;
    gs.players.filter(p=>p.alive).forEach(p=>{
      if((d.marbles[p.id]||5)<=0){ p.alive=false; newElim.push({id:p.id,name:p.name,game:n}); }
    });
    if(d.solo){
      // Solo player auto-survived - just keep them
    }
  }
  if(n===5){
    // Those who didn't cross are already eliminated in-tick
    newElim = (gs.eliminated||[]).filter(e=>e.game===5);
  }
  if(n===6){
    newElim = (gs.eliminated||[]).filter(e=>e.game===6);
  }
  if(n===7){
    var alive=gs.players.filter(p=>p.alive);
    // Highest HP wins
    if(alive.length>1){
      var d=gs.gameData;
      var sorted=alive.sort((a,b)=>(d.hp[b.id]||0)-(d.hp[a.id]||0));
      sorted.slice(1).forEach(p=>{ p.alive=false; newElim.push({id:p.id,name:p.name,game:n}); });
    }
  }

  if(!gs.eliminated) gs.eliminated=[];
  newElim.forEach(e=>{ if(!gs.eliminated.find(x=>x.id===e.id)) gs.eliminated.push(e); });

  var survivors = gs.players.filter(p=>p.alive);
  // Check win condition
  if(survivors.length<=1 || n===7){
    gs.phase = 'winner';
    gs.winner = survivors.length ? survivors[0] : null;
    broadcastState();
    updateUI();
    return;
  }
  // Show elim screen then advance
  gs.phase = 'elim';
  gs.elimForGame = n;
  gs.elimNewList = newElim;
  broadcastState();
  setTimeout(()=>{
    if(!isHost) return;
    if(n<7){
      startCountdown(n+1);
    } else {
      gs.phase='winner';
      gs.winner=survivors[0]||null;
      broadcastState();
      updateUI();
    }
  }, 5000);
}

// ── PHASE CHANGE (guests) ──
function onPhaseChange(prev, next){
  // guest side: stop/start timers etc
  localMoving = false;
}

// ── UPDATE UI ──
function updateUI(){
  if(!gs) return;
  var phase = gs.phase;

  if(phase==='lobby'){ renderLobby(); return; }
  if(phase==='countdown'){ renderCountdown(); return; }
  if(phase==='elim'){ renderElim(); return; }
  if(phase==='winner'){ renderWinner(); return; }
  if(phase.startsWith('g')){ renderGame(); return; }
}

function renderLobby(){
  showScreen('sLobby');
  var list = document.getElementById('playerList');
  list.innerHTML = gs.players.map(p=>{
    var me = p.id===myId, host = p.id===gs.hostId;
    var cls = 'player-row'+(me?' me':'')+(host&&!me?' host':'');
    var tags = '';
    if(host) tags += '<span class="tag tag-host">HOST</span>';
    if(me) tags += '<span class="tag tag-you">DU</span>';
    return `<div class="${cls}"><div class="player-av">${p.avatar}</div><div class="player-nm">${esc(p.name)}</div>${tags}</div>`;
  }).join('');
  var cnt = gs.players.filter(p=>p.alive).length;
  var startBtn = document.getElementById('startBtn');
  var lobbyWait = document.getElementById('lobbyWait');
  if(isHost){
    startBtn.style.display='block'; startBtn.disabled=(cnt<2);
    lobbyWait.style.display='none';
    document.getElementById('lobbyErr').textContent = cnt<2 ? 'Mindestens 2 Spieler zum Starten' : '';
  } else {
    startBtn.style.display='none'; lobbyWait.style.display='block';
    document.getElementById('lobbyErr').textContent='';
  }
}

function renderCountdown(){
  showScreen('sCountdown');
  var n = gs.gameData.gameNum||gs.round||1;
  document.getElementById('cdGameName').textContent = 'GAME '+n+'/7';
  document.getElementById('cdNum').textContent = gs.gameData.cdVal||'GO!';
  document.getElementById('cdSub').textContent = GAME_NAMES[n]||'';
}

function renderElim(){
  showScreen('sElim');
  var n = gs.elimForGame||gs.round;
  document.getElementById('elimTitle').textContent = '☠ ELIMINIERT';
  document.getElementById('elimGameName').textContent = 'NACH GAME '+n+'/7: '+GAME_NAMES[n];

  else list.innerHTML = elims.map(e=>`<div class="elim-item">✗ ${esc(e.name)}</div>`).join('');

function renderWinner(){
  showScreen('sResults');
  var w = gs.winner;
  document.getElementById('winnerName').textContent = w ? w.name : '???';
  document.getElementById('winnerSub').textContent = w&&w.id===myId ? '🎉 DAS BIST DU!' : '';
}

function renderGame(){
  showScreen('sGame');
  var n = gs.round;
  document.getElementById('ghTitle').textContent = 'GAME '+n+'/7 — '+GAME_NAMES[n];
  var timeLeft = Math.max(0, Math.ceil((gs.timerEnd - Date.now())/1000));
  var timerEl = document.getElementById('ghTimer');
  timerEl.textContent = timeLeft > 0 ? timeLeft+'s' : '';
  timerEl.classList.toggle('urgent', timeLeft <= 10 && timeLeft > 0);

  renderPbar();

  var myP = gs.players.find(p=>p.id===myId);
  var amAlive = myP && myP.alive;
  document.getElementById('specBadge').style.display = amAlive ? 'none' : 'flex';

  var area = document.getElementById('gameArea');
  if(n===1) renderG1(area, amAlive);
  else if(n===2) renderG2(area, amAlive);
  else if(n===3) renderG3(area, amAlive);
  else if(n===4) renderG4(area, amAlive);
  else if(n===5) renderG5(area, amAlive);
  else if(n===6) renderG6(area, amAlive);
  else if(n===7) renderG7(area, amAlive);
}

function renderPbar(){
  var pbar = document.getElementById('pbar');
  pbar.innerHTML = gs.players.map(p=>{
    var me = p.id===myId;
    var cls = 'pchip '+(p.alive?'alive':'dead')+(me?' me':'');
    return `<div class="${cls}">${p.alive?'':'✗ '}${esc(p.name)}</div>`;
  }).join('');
}

    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div class="light-circle ${light==='green'?'light-green':'light-red'}">${light==='green'?'🟢':'🔴'}</div>
      <div style="font-family:'Russo One',sans-serif;font-size:14px;letter-spacing:4px;color:${light==='green'?'#00d9c0':'#ff2d6e'}">${light==='green'?'GREEN LIGHT — MOVE!':'RED LIGHT — STOP!'}</div>
    </div>
    <div class="track-container">
      ${gs.players.map(p=>{

      }).join('')}
    </div>
    ${amAlive?`<button class="big-btn ${light==='green'?'big-btn-teal':'big-btn-red'}" id="moveBtn" style="font-size:18px;padding:22px"
      ontouchstart="startMove()" ontouchend="stopMove()" onmousedown="startMove()" onmouseup="stopMove()" onmouseleave="stopMove()">
      ${light==='green'?'🏃 BEWEGEN (HALTEN)':'🛑 NICHT BEWEGEN!'}
    </button>`:''}`;
  area.innerHTML = html;
}

window.startMove = function(){
  if(!gs||gs.gameData.light==='red') return;
  localMoving = true;
  sendInput({type:'move',val:true});
};
window.stopMove = function(){
  localMoving = false;
  sendInput({type:'move',val:false});
};

// ── GAME 2: HONEYCOMB ──
function renderG2(area, amAlive){
  var d = gs.gameData;
  var myTaps = d.taps[myId]||0;
  var pct = Math.min(100, Math.round(myTaps/80*100));
  var html = `
    <div style="text-align:center">
      <div style="font-family:'Russo One',sans-serif;font-size:50px">${d.shape&&d.shape[myId]?d.shape[myId]:'?'}</div>
      <div style="font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.4);margin-top:4px">DEINE FORM — 80 TAPS NÖTIG</div>
    </div>
    <div style="width:100%;max-width:300px">
      <div style="display:flex;justify-content:space-between;font-family:'Russo One',sans-serif;font-size:11px;color:rgba(255,255,255,.4);margin-bottom:4px"><span>${myTaps}/80</span><span>${pct}%</span></div>
      <div class="progress-wrap"><div class="progress-fill progress-teal" style="width:${pct}%"></div></div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;width:100%;max-width:400px;justify-content:center">
      ${gs.players.filter(p=>p.alive&&p.id!==myId).map(p=>{
        var t=d.taps[p.id]||0,pct2=Math.min(100,Math.round(t/80*100));
        return `<div style="font-family:'Russo One',sans-serif;font-size:10px;color:rgba(255,255,255,.4);text-align:center;min-width:80px"><div>${esc(p.name)}</div><div style="background:rgba(255,255,255,.06);border-radius:6px;height:6px;width:80px;overflow:hidden;margin-top:3px"><div style="height:100%;background:#00d9c0;border-radius:6px;width:${pct2}%"></div></div></div>`;
      }).join('')}
    </div>
    ${amAlive&&myTaps<80?`<button class="big-btn big-btn-teal" onclick="tapHoneycomb()">🍬 CHIP! (${myTaps}/80)</button>`:''}
    ${myTaps>=80?`<div style="font-family:'Russo One',sans-serif;font-size:18px;color:#00d9c0;letter-spacing:3px">✅ GESCHAFFT!</div>`:''}`;
  area.innerHTML = html;
}
window.tapHoneycomb = function(){ sendInput({type:'tap'}); };

// ── GAME 3: TUG OF WAR ──
function renderG3(area, amAlive){
  var d = gs.gameData;
  var score = d.score||0;
  var pctA = Math.max(0, Math.min(100, 50 - score));
  var pctB = Math.max(0, Math.min(100, 50 + score));
  var myP = gs.players.find(p=>p.id===myId);
  var myTeam = myP&&myP.team;
  var html = `
    <div style="display:flex;gap:16px;align-items:center;width:100%;max-width:360px;justify-content:center">
      <div class="team-label team-a">TEAM A</div>
      <div style="font-family:'Russo One',sans-serif;font-size:11px;color:rgba(255,255,255,.3)">${Math.abs(score)>0?Math.abs(score)+'pt':'-'}</div>
      <div class="team-label team-b">TEAM B</div>
    </div>
    <div class="rope-wrap">
      <div class="rope-fill-a" style="width:${pctA}%"></div>
      <div class="rope-fill-b" style="width:${pctB}%"></div>
      <div class="rope-center">🪢</div>
    </div>
    <div style="display:flex;gap:10px;width:100%;max-width:400px;justify-content:space-between">
      <div style="flex:1">
        ${(d.teamA||[]).map(pid=>{ var p=gs.players.find(x=>x.id===pid); return p?`<div style="font-family:'Russo One',sans-serif;font-size:11px;color:#ff7aaa;text-align:center">${esc(p.name)}</div>`:''; }).join('')}
      </div>
      <div style="flex:1">
        ${(d.teamB||[]).map(pid=>{ var p=gs.players.find(x=>x.id===pid); return p?`<div style="font-family:'Russo One',sans-serif;font-size:11px;color:#7affed;text-align:center">${esc(p.name)}</div>`:''; }).join('')}
      </div>
    </div>
    ${amAlive?`<button class="big-btn ${myTeam==='A'?'big-btn-red':'big-btn-teal'}" onclick="pullRope()">💪 ZIEHEN (TEAM ${myTeam||'?'})</button>`:''}`;
  area.innerHTML = html;
}
window.pullRope = function(){ sendInput({type:'pull'}); };

// ── GAME 4: MARBLES ──
function renderG4(area, amAlive){
  var d = gs.gameData;
  var myM = d.marbles&&d.marbles[myId]!==undefined ? d.marbles[myId] : 5;
  var partnerId = d.pairs&&d.pairs[myId];
  var partner = partnerId ? gs.players.find(p=>p.id===partnerId) : null;
  var partnerM = partner&&d.marbles ? (d.marbles[partner.id]||5) : 0;
  var solo = d.solo===myId;
  var lastRound = d.rounds&&d.rounds[d.rounds.length-1];
  var myPick = d.picks&&d.picks[myId];

  var roundInfo = '';
  if(lastRound&&(lastRound.p1===myId||lastRound.p2===myId)){
    var iWon = (lastRound.p1===myId&&lastRound.p1pick===lastRound.actual)||(lastRound.p2===myId&&lastRound.p2pick===lastRound.actual);
    roundInfo = `<div style="font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:2px;color:${iWon?'#00d9c0':'#ff2d6e'}">${iWon?'✅ GEWONNEN':'❌ VERLOREN'} — Anzahl: ${lastRound.count} (${lastRound.actual.toUpperCase()})</div>`;
  }

  var html = `
    <div style="text-align:center">
      <div class="marble-count">${myM} 🔮</div>
      <div style="font-family:'Russo One',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(255,200,0,.5)">DEINE MURMELN — RUNDE ${(d.roundNum||0)+1}/5</div>
    </div>
    ${partner?`<div style="font-family:'Russo One',sans-serif;font-size:13px;color:rgba(255,255,255,.4)">vs ${esc(partner.name)} (${partnerM} 🔮)</div>`:''}
    ${roundInfo}
    ${solo?`<div style="font-family:'Russo One',sans-serif;font-size:14px;color:#00d9c0;letter-spacing:2px">✅ DU BIST ALLEIN — AUTOMATISCH SICHER</div>`:''}
    ${amAlive&&!solo&&!myPick?`
      <div style="font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.3)">GERADE ODER UNGERADE?</div>
      <div class="pick-row">
        <button class="pick-btn" onclick="pickMarble('odd')">UNGERADE</button>
        <button class="pick-btn" onclick="pickMarble('even')">GERADE</button>
      </div>`:''}
    ${myPick?`<div style="font-family:'Russo One',sans-serif;font-size:13px;color:rgba(255,255,255,.4);letter-spacing:2px">Gewählt: ${myPick==='odd'?'UNGERADE':'GERADE'} — Warte auf Partner...</div>`:''}`;
  area.innerHTML = html;
}
window.pickMarble = function(val){ sendInput({type:'marble',val}); };

// ── GAME 5: GLASS BRIDGE ──
function renderG5(area, amAlive){
  var d = gs.gameData;
  var currentPlayer = d.currentPlayer;
  var isMyTurn = currentPlayer === myId;
  var frontier = d.frontier||0;
  var timeLeft = Math.max(0,Math.ceil((d.turnEnd-Date.now())/1000));
  var curP = gs.players.find(p=>p.id===currentPlayer);

  var html = `
    <div style="font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:2px;color:rgba(255,255,255,.4);text-align:center">
      ${isMyTurn?'🚶 DU BIST DRAN!':'🚶 '+esc(curP?curP.name:'?')+' ist dran'}
      ${isMyTurn?` — ${timeLeft}s`:''}
    </div>
    <div style="font-family:'Russo One',sans-serif;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px">REIHE ${frontier+1}/10</div>
    ${Array.from({length:Math.min(10,frontier+3)}).map((_,i)=>{
      var rowIdx = i;
      var safe = d.rows[rowIdx];
      var rev = d.revealed[rowIdx];
      var isCurrent = rowIdx===frontier;
      if(rowIdx<frontier){
        // Already crossed — show safe
        return `<div class="bridge-row"><div class="glass-tile ${safe==='left'?'safe':'broken'}" style="opacity:.5">LEFT ${safe==='left'?'✅':''}</div><div class="glass-tile ${safe==='right'?'safe':'broken'}" style="opacity:.5">RIGHT ${safe==='right'?'✅':''}</div></div>`;
      }
      if(rev){
        return `<div class="bridge-row"><div class="glass-tile ${rev==='left'?'safe':'broken'}">LEFT ${rev==='left'?'✅':'💥'}</div><div class="glass-tile ${rev==='right'?'safe':'broken'}">RIGHT ${rev==='right'?'✅':'💥'}</div></div>`;
      }
      return `<div class="bridge-row">
        <button class="glass-tile unknown" ${(!isMyTurn||!amAlive)?'disabled':''} onclick="pickGlass('left')" style="${isCurrent?'border-color:rgba(255,200,0,.5);color:#ffc800':''}">LEFT</button>
        <button class="glass-tile unknown" ${(!isMyTurn||!amAlive)?'disabled':''} onclick="pickGlass('right')" style="${isCurrent?'border-color:rgba(255,200,0,.5);color:#ffc800':''}">RIGHT</button>
      </div>`;
    }).join('')}`;
  area.innerHTML = html;
}
window.pickGlass = function(val){ sendInput({type:'glass',val}); };

// ── GAME 6: MINGLE ──
function renderG6(area, amAlive){
  var d = gs.gameData;
  var gSize = d.groupSize||2;
  var timeLeft = Math.max(0,Math.ceil((d.roundEnd-Date.now())/1000));
  var myGroup = d.groups&&d.groups[myId];
  var groupCount = myGroup ? Object.values(d.groups).filter(g=>g===myGroup).length : 0;
  var alive = gs.players.filter(p=>p.alive);

  var html = `
    <div style="text-align:center">
      <div class="mingle-label">BILDE GRUPPEN VON</div>
      <div class="mingle-num">${gSize}</div>
      <div style="font-family:'Russo One',sans-serif;font-size:13px;color:#00d9c0;letter-spacing:2px">${timeLeft}s — RUNDE ${(d.roundNum||0)+1}/${(d.roundSizes||[]).length}</div>
    </div>
    ${myGroup?`<div style="font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:2px;color:${groupCount===gSize?'#00d9c0':'rgba(255,200,0,.8)'}">Deine Gruppe: ${groupCount}/${gSize} ${groupCount===gSize?'✅':''}</div>`:''}
    <div class="mingle-grid">
      ${alive.filter(p=>p.id!==myId).map(p=>{
        var theirGroup=d.groups&&d.groups[p.id];
        var sameGroup=myGroup&&theirGroup===myGroup;
        return `<button class="mingle-chip ${sameGroup?'in-group':''}" onclick="mingleJoin('${p.id}')">${esc(p.name)}${sameGroup?' ✓':''}</button>`;
      }).join('')}
    </div>`;
  area.innerHTML = html;
}
window.mingleJoin = function(targetId){ sendInput({type:'mingle',targetId}); };

// ── GAME 7: LAST STAND ──
function renderG7(area, amAlive){
  var d = gs.gameData;
  var alive = gs.players.filter(p=>p.alive);
  var html = `
    <div style="font-family:'Russo One',sans-serif;font-size:14px;letter-spacing:4px;color:#ff2d6e;text-align:center">⚔ LETZTER ÜBERLEBENDE GEWINNT</div>
    <div style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px">
      ${gs.players.map(p=>{
        var hp=d.hp&&d.hp[p.id]!==undefined?d.hp[p.id]:100;
        var me=p.id===myId;
        return `<div class="hp-row">
          <div class="hp-name" style="${me?'color:#ff7aaa':!p.alive?'color:rgba(255,255,255,.2)':''}">${me?'👤 ':''}${esc(p.name)}</div>
          <div class="hp-bar-wrap"><div class="hp-bar-fill" style="width:${p.alive?hp:0}%;${hp<30?'background:linear-gradient(90deg,#9c0030,#ff2d6e)':''}"></div></div>
          <div class="hp-val">${p.alive?hp:0}</div>
        </div>`;
      }).join('')}
    </div>
    ${amAlive?`<button class="big-btn big-btn-red" onclick="attackPlayer()">⚔ ANGREIFEN</button>`:''}`;
  area.innerHTML = html;
}
window.attackPlayer = function(){ sendInput({type:'attack'}); };

function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

// ── PERIODIC UI REFRESH (for timer) ──
setInterval(()=>{ if(gs&&gs.phase&&gs.phase.startsWith('g')) renderGame(); }, 500);

// On page load
setLoading(false);

</script>
</body>
</html>
