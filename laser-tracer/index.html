<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LASER TRACER 3D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;background:#050510;font-family:'Exo 2',sans-serif;color:#fff;user-select:none}
canvas{display:block;width:100%!important;height:100%!important;touch-action:none}

/* ── OVERLAY SCREENS ── */
.screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(5,5,16,0.96);overflow-y:auto;padding:24px 16px 48px;-webkit-overflow-scrolling:touch}
.screen.off{display:none}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.04) 1px,transparent 1px);background-size:40px 40px;animation:grid 20s linear infinite;pointer-events:none;z-index:0}
@keyframes grid{0%{background-position:0 0}100%{background-position:40px 40px}}
.gtitle{font-family:'Russo One',sans-serif;font-size:clamp(40px,12vw,88px);background:linear-gradient(90deg,#00f5ff,#ff006e,#ffff00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gp 3s ease-in-out infinite;letter-spacing:3px;text-align:center}
@keyframes gp{0%,100%{filter:drop-shadow(0 0 18px #00f5ff)}50%{filter:drop-shadow(0 0 40px #ff006e)}}
.gsub{color:rgba(255,255,255,0.4);letter-spacing:6px;font-size:12px;text-transform:uppercase;margin-top:-10px}
.sep{width:60px;height:2px;background:linear-gradient(90deg,transparent,#00f5ff,transparent)}

/* profile card */
.pcard{background:rgba(10,10,31,0.95);border:2px solid rgba(0,245,255,0.3);border-radius:14px;padding:13px 16px;width:min(360px,93vw);display:flex;align-items:center;gap:11px;box-shadow:0 0 24px rgba(0,245,255,0.08)}
.pav-w{position:relative;flex-shrink:0}.pav{width:46px;height:46px}
.lvlbdg{position:absolute;bottom:-3px;right:-3px;background:#ffd700;color:#000;font-weight:900;font-size:10px;border-radius:8px;padding:1px 5px;font-family:'Russo One',sans-serif;box-shadow:0 0 8px #ffd700}
.pinfo{flex:1;min-width:0}.pname{font-weight:900;font-size:15px;color:#00f5ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.xpbg{background:rgba(15,15,42,1);height:6px;border-radius:4px;margin-top:4px;overflow:hidden;border:1px solid rgba(255,255,255,0.08)}
.xpfill{height:100%;background:linear-gradient(90deg,#00f5ff,#39ff14);border-radius:4px;box-shadow:0 0 6px #39ff14;transition:width .6s}
.xptxt{font-size:9px;color:rgba(255,255,255,0.4);margin-top:2px;letter-spacing:1px}
.coins{display:flex;align-items:center;gap:4px;font-family:'Russo One',sans-serif;color:#ffd700;font-size:13px;background:rgba(15,15,42,1);padding:4px 9px;border-radius:16px;border:1px solid rgba(255,215,0,0.3)}

/* buttons */
.btn{font-family:'Russo One',sans-serif;font-size:15px;letter-spacing:1.5px;padding:14px 28px;border:none;border-radius:8px;cursor:pointer;transition:transform .15s;text-transform:uppercase;touch-action:manipulation;width:min(300px,90vw)}
.btn:active{transform:scale(.96)}
.bcyan{background:linear-gradient(135deg,#007a8a,#00c4d4);color:#050510;box-shadow:0 0 18px rgba(0,245,255,.4)}
.bgreen{background:linear-gradient(135deg,#1a8a1a,#39ff14);color:#050510;box-shadow:0 0 18px rgba(57,255,20,.4)}
.bghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.berr{color:#ff006e;font-size:12px;text-align:center;min-height:16px;letter-spacing:1px}

/* lobby */
.lbox{background:rgba(10,10,31,.95);border:2px solid rgba(0,245,255,.3);border-radius:16px;padding:20px;width:min(460px,95vw);box-shadow:0 0 30px rgba(0,245,255,.1)}
.ltitle{font-family:'Russo One',sans-serif;font-size:20px;color:#00f5ff;text-align:center;letter-spacing:3px;margin-bottom:13px}
.codebox{background:rgba(15,15,42,1);border:2px dashed #ffff00;border-radius:10px;padding:10px;text-align:center;margin-bottom:11px;cursor:pointer}
.codebig{font-family:'Russo One',sans-serif;font-size:28px;color:#ffff00;letter-spacing:8px;filter:drop-shadow(0 0 8px #ffff00)}
.codelbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase}
.plist{display:grid;grid-template-columns:1fr 1fr;gap:7px;min-height:100px;margin-bottom:11px}
.pslot{background:rgba(15,15,42,1);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:8px;display:flex;align-items:center;gap:7px;min-height:48px}
.pslot.filled{border-color:rgba(0,245,255,.3);background:rgba(0,245,255,.04)}
.pslot.me{border-color:#00f5ff;box-shadow:0 0 10px rgba(0,245,255,.2)}
.psav{width:26px;height:26px;flex-shrink:0}
.psname{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pslvl{font-size:9px;color:#39ff14}
.sempty{color:rgba(255,255,255,.2);font-size:10px;letter-spacing:2px}
.lbtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.lhint{font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-top:5px;letter-spacing:1px}

/* HUD */
#hud{position:fixed;top:10px;left:0;right:0;display:none;justify-content:space-between;padding:0 12px;z-index:20;pointer-events:none}
.hp{background:rgba(5,5,16,.88);border:1px solid rgba(0,245,255,.3);border-radius:9px;padding:5px 11px;backdrop-filter:blur(8px)}
.hbig{font-family:'Russo One',sans-serif;font-size:24px;color:#00f5ff;line-height:1;filter:drop-shadow(0 0 6px #00f5ff)}
.hsm{font-size:8px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;text-align:center}
.halive{font-family:'Russo One',sans-serif;font-size:17px;color:#39ff14}
.hwave{font-family:'Russo One',sans-serif;font-size:17px;color:#ff006e}

/* wave banner */
#waveBanner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Russo One',sans-serif;font-size:clamp(40px,10vw,72px);color:#ff006e;filter:drop-shadow(0 0 30px #ff006e);z-index:60;pointer-events:none;opacity:0}
#waveBanner.show{animation:wf 1.8s ease-out forwards}
@keyframes wf{0%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}25%{opacity:1;transform:translate(-50%,-50%) scale(1)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(.8)}}

/* countdown */
#cdOv{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:65;pointer-events:none}
#cdOv.show{display:flex}
.cdnum{font-family:'Russo One',sans-serif;font-size:clamp(120px,30vw,200px);color:#00f5ff;filter:drop-shadow(0 0 60px #00f5ff);animation:cp .6s ease-out}
@keyframes cp{0%{transform:scale(1.6);opacity:0}50%{transform:scale(.95);opacity:1}100%{transform:scale(1)}}

/* result */
.rtitle{font-family:'Russo One',sans-serif;font-size:clamp(30px,8vw,62px);letter-spacing:3px;text-align:center}
.rtitle.win{background:linear-gradient(90deg,#39ff14,#00f5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 28px #39ff14)}
.rtitle.lose{background:linear-gradient(90deg,#ff006e,#ff6600);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 28px #ff006e)}
.rwbox{background:rgba(10,10,31,.95);border:2px solid #ffd700;border-radius:13px;padding:13px 20px;display:flex;gap:20px}
.rwval{font-family:'Russo One',sans-serif;font-size:22px;text-align:center}
.rxp{color:#00f5ff}.rcoin{color:#ffd700}
.rwlbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase}
.lvlup{background:linear-gradient(90deg,#ffd700,#ffff00);color:#000;font-family:'Russo One',sans-serif;padding:6px 16px;border-radius:18px;letter-spacing:2px;box-shadow:0 0 22px #ffd700;animation:lp .6s}
@keyframes lp{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}

/* MOBILE CONTROLS */
#joystick{position:fixed;bottom:20px;left:20px;width:120px;height:120px;z-index:25;touch-action:none;display:none}
#joystick.show{display:block}
.jbase{position:absolute;inset:0;border-radius:50%;background:rgba(5,5,16,.55);border:2px solid rgba(0,245,255,.35);backdrop-filter:blur(4px)}
.jknob{position:absolute;width:50px;height:50px;left:35px;top:35px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#fff,#00f5ff);box-shadow:0 0 16px #00f5ff}
#jumpBtn{position:fixed;bottom:20px;right:20px;width:76px;height:76px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:28px;border:2px solid rgba(0,245,255,.5);background:rgba(0,245,255,.15);box-shadow:0 0 18px rgba(0,245,255,.3);cursor:pointer;z-index:25;touch-action:manipulation;backdrop-filter:blur(6px)}
#jumpBtn.show{display:flex}
#jumpBtn:active{transform:scale(.88)}

/* emote bar */
#emoteBar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:none;gap:7px;z-index:25}
#emoteBar.show{display:flex}
.emb{width:48px;height:48px;background:rgba(5,5,16,.9);border:2px solid rgba(255,255,255,.15);border-radius:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;backdrop-filter:blur(8px);touch-action:manipulation}
.emb:active{transform:scale(.88);border-color:#00f5ff}
.emk{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:1px}

/* chat */
#chatBox{position:fixed;top:68px;right:10px;width:160px;z-index:22;pointer-events:none}
.cmsg{background:rgba(5,5,16,.82);border:1px solid rgba(0,245,255,.3);border-radius:7px;padding:3px 8px;font-size:10px;margin-bottom:3px;animation:fm 5s forwards}
@keyframes fm{0%,70%{opacity:1}100%{opacity:0}}
.cname{color:#00f5ff;font-weight:700}

/* dead overlay */
#deadMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Russo One',sans-serif;font-size:clamp(28px,7vw,54px);color:#ff006e;filter:drop-shadow(0 0 24px #ff006e);z-index:58;display:none;animation:dm .4s ease-out}
@keyframes dm{0%{transform:translate(-50%,-50%) scale(1.5)}100%{transform:translate(-50%,-50%) scale(1)}}

@media(max-width:480px){
  #joystick{width:110px;height:110px}.jknob{width:44px;height:44px;left:33px;top:33px}
  #jumpBtn{width:68px;height:68px;font-size:24px}
  .emb{width:43px;height:43px;font-size:16px}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hp"><div class="halive" id="hudAlive">👤 1</div><div class="hsm">ALIVE</div></div>
  <div class="hp"><div class="hbig" id="hudTimer">60</div><div class="hsm" id="hudTimerLbl">SEKUNDEN</div></div>
  <div class="hp"><div class="hwave" id="hudWave">W 1</div><div class="hsm">WELLE</div></div>
</div>

<div id="waveBanner"></div>
<div id="cdOv"></div>
<div id="deadMsg">💀 RAUS!</div>
<div id="chatBox"></div>

<!-- MOBILE CONTROLS -->
<div id="joystick"><div class="jbase"></div><div class="jknob" id="jknob"></div></div>
<div id="jumpBtn">⬆</div>
<div id="emoteBar">
  <div class="emb" onclick="sendEmote('📦','Box')"><span>📦</span><span class="emk">1</span></div>
  <div class="emb" onclick="sendEmote('👋','Wave')"><span>👋</span><span class="emk">2</span></div>
  <div class="emb" onclick="sendEmote('💀','RIP')"><span>💀</span><span class="emk">3</span></div>
  <div class="emb" onclick="sendEmote('🔥','Fire')"><span>🔥</span><span class="emk">4</span></div>
  <div class="emb" onclick="sendEmote('😂','LOL')"><span>😂</span><span class="emk">5</span></div>
  <div class="emb" onclick="sendEmote('🏆','GG')"><span>🏆</span><span class="emk">6</span></div>
</div>

<!-- ── MENU ── -->
<div class="screen" id="sMenu">
  <div class="gtitle">LASER TRACER</div>
  <div class="gsub">3D EDITION</div>
  <div class="sep"></div>
  <div class="pcard" id="pCard" style="display:none">
    <div class="pav-w"><div class="pav" id="pAv"></div><div class="lvlbdg" id="pLvl">1</div></div>
    <div class="pinfo">
      <div class="pname" id="pName">Player</div>
      <div class="xpbg"><div class="xpfill" id="xpFill" style="width:0%"></div></div>
      <div class="xptxt" id="xpTxt">0/100 XP</div>
    </div>
    <div class="coins">🪙 <span id="pCoins">0</span></div>
  </div>
  <button class="btn bgreen" onclick="startSolo()">🎯 SOLO ÜBEN</button>
  <button class="btn bcyan" onclick="toggleMulti()">⚔️ MULTIPLAYER</button>
  <div id="multiOpts" style="display:none;flex-direction:column;gap:9px;align-items:center;width:100%">
    <button class="btn bcyan" onclick="createRoom()" style="width:min(280px,88vw)">🚀 ROOM ERSTELLEN</button>
    <button class="btn bghost" onclick="showJoin()" style="width:min(280px,88vw)">🔗 BEITRETEN</button>
    <div id="joinArea" style="display:none;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
      <input id="joinCode" maxlength="4" placeholder="CODE" style="background:rgba(15,15,42,1);border:2px solid rgba(0,245,255,.3);color:#00f5ff;font-family:'Russo One',sans-serif;font-size:20px;padding:9px 14px;border-radius:8px;outline:none;width:140px;text-align:center;letter-spacing:6px;text-transform:uppercase"/>
      <button class="btn bcyan" onclick="joinRoom()" style="width:auto;padding:11px 18px">JOIN</button>
    </div>
  </div>
  <button class="btn bghost" onclick="goPortal()" style="font-size:12px;padding:10px 20px">← SPIELAUSWAHL</button>
  <div class="berr" id="menuErr"></div>
</div>

<!-- ── LOBBY ── -->
<div class="screen off" id="sLobby">
  <div class="lbox">
    <div class="ltitle">⚡ LOBBY</div>
    <div class="codebox" onclick="copyCode()">
      <div class="codelbl">Room Code — tippen zum kopieren</div>
      <div class="codebig" id="lobbyCode">----</div>
    </div>
    <div class="plist" id="pList"></div>
    <div class="lbtns">
      <button class="btn bcyan" id="startBtn" onclick="startMulti()" style="width:auto;padding:12px 20px">▶ STARTEN</button>
      <button class="btn bghost" onclick="leaveRoom()" style="width:auto;padding:10px 14px;font-size:12px">← ZURÜCK</button>
    </div>
    <div class="lhint" id="lhint">Mindestens 2 Spieler</div>
    <div class="berr" id="lobbyErr"></div>
  </div>
</div>

<!-- ── RESULT ── -->
<div class="screen off" id="sResult">
  <div class="rtitle" id="rTitle">GG!</div>
  <div style="color:rgba(255,255,255,.6);font-size:14px;text-align:center" id="rStats"></div>
  <div class="lvlup" id="lvlup" style="display:none">⬆ LEVEL UP!</div>
  <div class="rwbox">
    <div><div class="rwval rxp" id="rXp">+0</div><div class="rwlbl">XP</div></div>
    <div><div class="rwval rcoin" id="rCoin">+0</div><div class="rwlbl">MÜNZEN</div></div>
  </div>
  <div style="display:flex;gap:9px;flex-wrap:wrap;justify-content:center" id="rBtns"></div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js";
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
import { SUPABASE_URL, SUPABASE_ANON_KEY } from "../../supabase-config.js";

// ═══════════════════════════════════════════
//  SUPABASE
// ═══════════════════════════════════════════
let sb=null, SB_USER=null, isOnline=false;
let progress={name:'Player',level:1,xp:0,coins:200,owned:['cyan','pink'],equipped:'cyan',wins:0,games:0,bestWave:0};
const SKIN_COLORS={cyan:'#00f5ff',pink:'#ff006e',green:'#39ff14',orange:'#ff8800',purple:'#cc00ff',ice:'#aaffff',lava:'#ff3300',toxic:'#aaff00',galaxy:'#7b2fff',gold:'#ffd700',rainbow:'#ff0088',void:'#5500aa'};
function xpNeeded(l){return 100+(l-1)*60}
function myColor(){return SKIN_COLORS[progress.equipped]||'#00f5ff'}
async function saveProg(){if(!sb||!SB_USER)return;try{await sb.from('profiles').upsert({id:SB_USER.id,name:progress.name,level:progress.level,xp:progress.xp,coins:progress.coins,owned:progress.owned,equipped:progress.equipped,wins:progress.wins,games:progress.games,best_wave:progress.bestWave,updated_at:new Date().toISOString()});}catch(e){}}
async function loadProg(){if(!sb||!SB_USER)return;try{const{data}=await sb.from('profiles').select('*').eq('id',SB_USER.id).single();if(data){progress.name=data.name||'Player';progress.level=data.level??1;progress.xp=data.xp??0;progress.coins=data.coins??200;progress.owned=Array.isArray(data.owned)?data.owned:['cyan','pink'];progress.equipped=data.equipped||'cyan';progress.wins=data.wins??0;progress.games=data.games??0;progress.bestWave=data.best_wave??0;}}catch(e){}}
function persist(){if(sb&&SB_USER)saveProg();}

function hexColor(c){return parseInt((c||'#00f5ff').replace('#',''),16)}
function avatarSVG(c,s){const cid='av'+c.replace('#','');return `<svg width="${s}" height="${s}" viewBox="0 0 60 60"><defs><radialGradient id="${cid}" cx="40%" cy="35%"><stop offset="0%" stop-color="#fff"/><stop offset="45%" stop-color="${c}"/><stop offset="100%" stop-color="${c}"/></radialGradient></defs><circle cx="30" cy="30" r="22" fill="url(#${cid})" stroke="${c}" stroke-width="2"/><circle cx="23" cy="26" r="4.5" fill="#1a1a2e"/><circle cx="37" cy="26" r="4.5" fill="#1a1a2e"/><circle cx="24.5" cy="24.5" r="1.8" fill="#fff"/><circle cx="38.5" cy="24.5" r="1.8" fill="#fff"/><path d="M 23 38 Q 30 43 37 38" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`}

function renderProfile(){
  document.getElementById('pName').textContent=progress.name;
  document.getElementById('pLvl').textContent=progress.level;
  document.getElementById('pCoins').textContent=progress.coins;
  document.getElementById('pAv').innerHTML=avatarSVG(myColor(),46);
  const need=xpNeeded(progress.level);
  document.getElementById('xpFill').style.width=Math.min(100,progress.xp/need*100)+'%';
  document.getElementById('xpTxt').textContent=`${progress.xp}/${need} XP`;
  document.getElementById('pCard').style.display='flex';
}

// ═══════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setClearColor(0x050510);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x050510,0.028);

const camera=new THREE.PerspectiveCamera(65,1,0.1,300);
camera.position.set(0,12,18);

function onResize(){
  const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
onResize(); window.addEventListener('resize',onResize);

// ── LIGHTS ──
scene.add(new THREE.AmbientLight(0x1a1a3a,2.5));
const sun=new THREE.DirectionalLight(0x00f5ff,1.8);
sun.position.set(8,20,8); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=0.5; sun.shadow.camera.far=80;
sun.shadow.camera.left=-30; sun.shadow.camera.right=30; sun.shadow.camera.top=30; sun.shadow.camera.bottom=-30;
scene.add(sun);
const fill=new THREE.PointLight(0xff006e,1.2,50); fill.position.set(-10,5,0); scene.add(fill);

// ── ARENA ──
const ARENA_R=18; // circular arena radius

// Floor — circular platform
const floorGeo=new THREE.CylinderGeometry(ARENA_R,ARENA_R,0.5,64);
const floorMat=new THREE.MeshStandardMaterial({color:0x090920,roughness:0.7,metalness:0.3,emissive:0x050510});
const floorMesh=new THREE.Mesh(floorGeo,floorMat);
floorMesh.position.y=-0.25; floorMesh.receiveShadow=true; scene.add(floorMesh);

// Floor grid pattern (rings)
for(let r=3;r<=ARENA_R;r+=3){
  const pts=[]; for(let a=0;a<=Math.PI*2;a+=0.1) pts.push(new THREE.Vector3(Math.cos(a)*r,0.01,Math.sin(a)*r));
  const ringGeo=new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.Line(ringGeo,new THREE.LineBasicMaterial({color:0x00f5ff,transparent:true,opacity:0.08})));
}
// Cross lines
for(let a=0;a<Math.PI;a+=Math.PI/8){

// ═══════════════════════════════════════════
//  LASER SYSTEM — Stumble Guys style
//  All lasers rotate around center at Y=0.55
//  (knee height — must JUMP over)
// ═══════════════════════════════════════════
const LASER_Y=0.55;        // height of laser beam center
const LASER_HEIGHT=0.28;   // beam radius (thin)
const LASER_LEN=ARENA_R*2-1;

const LASER_COLORS_HEX=['#ff006e','#ff8800','#ffff00','#cc00ff','#00ff88','#ff3333'];
let laserPivots=[];        // THREE.Group pivoting at center
let laserSpeeds=[];        // rad/s per laser
let laserBaseSpeed=0.4;    // increases each wave

function buildLasers(count){
  // Remove old
  laserPivots.forEach(p=>scene.remove(p)); laserPivots=[]; laserSpeeds=[];

  for(let i=0;i<count;i++){
    const pivot=new THREE.Group(); pivot.position.y=LASER_Y;
    pivot.rotation.y=(Math.PI*2/count)*i; // evenly spaced

    const color=LASER_COLORS_HEX[i%LASER_COLORS_HEX.length];
    const hex=hexColor(color);

    // Glow outer
    const glowGeo=new THREE.CylinderGeometry(LASER_HEIGHT*2.5,LASER_HEIGHT*2.5,LASER_LEN,8);
    const glowMat=new THREE.MeshStandardMaterial({color:hex,emissive:hex,emissiveIntensity:0.7,transparent:true,opacity:0.25});
    const glow=new THREE.Mesh(glowGeo,glowMat);
    glow.rotation.z=Math.PI/2; pivot.add(glow);

    // Core beam
    const coreGeo=new THREE.CylinderGeometry(LASER_HEIGHT*0.7,LASER_HEIGHT*0.7,LASER_LEN,8);
    const coreMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:2});
    const core=new THREE.Mesh(coreGeo,coreMat);
    core.rotation.z=Math.PI/2; pivot.add(core);

    // Light along beam
    const lt=new THREE.PointLight(hex,2,6); lt.position.x=ARENA_R*0.5; pivot.add(lt);
    const lt2=new THREE.PointLight(hex,2,6); lt2.position.x=-ARENA_R*0.5; pivot.add(lt2);

    // End caps (bright balls)
    [LASER_LEN/2,-LASER_LEN/2].forEach(ex=>{
      const cap=new THREE.Mesh(new THREE.SphereGeometry(LASER_HEIGHT*1.8,8,8),new THREE.MeshStandardMaterial({color:hex,emissive:hex,emissiveIntensity:3}));
      cap.position.x=ex; pivot.add(cap);
    });

    scene.add(pivot);
    laserPivots.push(pivot);

    // Alternating directions, slightly different speeds for variety
    const dir=i%2===0?1:-1;
    const variance=0.85+Math.random()*0.3;
    laserSpeeds.push(dir*laserBaseSpeed*variance);
  }
}

// ═══════════════════════════════════════════
//  PLAYER MESH
// ═══════════════════════════════════════════
function makePlayer(color){
  const hex=hexColor(color); const g=new THREE.Group();
  // Body (capsule-like)
  const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.42,0.7,4,8),new THREE.MeshStandardMaterial({color:hex,emissive:hex,emissiveIntensity:0.35,roughness:0.4,metalness:0.2}));
  body.position.y=0.77; body.castShadow=true; g.add(body);
  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.38,10,8),new THREE.MeshStandardMaterial({color:hex,emissive:hex,emissiveIntensity:0.45,roughness:0.3}));
  head.position.y=1.62; head.castShadow=true; g.add(head);
  // Eyes
  [-0.15,0.15].forEach((ex,ei)=>{
    const eye=new THREE.Mesh(new THREE.SphereGeometry(0.09,6,6),new THREE.MeshStandardMaterial({color:0x050510}));
    eye.position.set(ex,1.67,0.32); g.add(eye);
    const shine=new THREE.Mesh(new THREE.SphereGeometry(0.04,4,4),new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:1}));
    shine.position.set(ex+0.04*(ei?-1:1),1.7,0.37); g.add(shine);
  });
  // Smile
  const smilePts=[]; for(let a=-0.6;a<=0.6;a+=0.15) smilePts.push(new THREE.Vector3(Math.sin(a)*0.18,-0.04+Math.cos(a)*0.05-0.05,0.36));
  const smileGeo=new THREE.BufferGeometry().setFromPoints(smilePts.map(p=>{p.y+=1.52;return p;}));
  g.add(new THREE.Line(smileGeo,new THREE.LineBasicMaterial({color:0x050510,linewidth:2})));
  // Glow ring
  const ring=new THREE.Mesh(new THREE.TorusGeometry(0.55,0.05,6,32),new THREE.MeshStandardMaterial({color:hex,emissive:hex,emissiveIntensity:1,transparent:true,opacity:0.6}));
  ring.position.y=0.08; ring.rotation.x=Math.PI/2; g.add(ring);
  // Point light
  const pl=new THREE.PointLight(hex,1.5,4); pl.position.y=1; g.add(pl);
  g.userData.ring=ring;
  return g;
}

const explosions=[];
function explode(x,y,z,color){
  const hex=hexColor(color);
  for(let i=0;i<24;i++){
    const m=new THREE.Mesh(new THREE.SphereGeometry(0.1+Math.random()*0.12,4,4),new THREE.MeshStandardMaterial({color:hex,emissive:hex,emissiveIntensity:2,transparent:true}));
    m.position.set(x,y,z);
    const speed=3+Math.random()*5;
    const angle=Math.random()*Math.PI*2, upAngle=(Math.random()-.2)*Math.PI*.7;
    m.userData={vx:Math.cos(angle)*Math.cos(upAngle)*speed,vy:Math.sin(upAngle)*speed+2,vz:Math.sin(angle)*Math.cos(upAngle)*speed,life:1};
    scene.add(m); explosions.push(m);
  }
}
function updateExplosions(dt){
  for(let i=explosions.length-1;i>=0;i--){
    const p=explosions[i]; p.userData.life-=dt*1.5;
    p.position.x+=p.userData.vx*dt; p.position.y+=p.userData.vy*dt; p.position.z+=p.userData.vz*dt;
    p.userData.vy-=12*dt; p.material.opacity=p.userData.life;
    if(p.userData.life<=0){scene.remove(p);explosions.splice(i,1);}
  }
}

function getMove(){
  let fx=0,fz=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])fx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D'])fx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W'])fz-=1;
  if(keys['ArrowDown']||keys['s']||keys['S'])fz+=1;
  if(joyVec.x||joyVec.y){fx=joyVec.x;fz=joyVec.y;}
  if(fx||fz){const m=Math.hypot(fx,fz);fx/=m;fz/=m;}
  const cy=Math.cos(camYaw),sy=Math.sin(camYaw);
  return {dx:fx*cy+fz*sy, dz:-fx*sy+fz*cy};
}

// ═══════════════════════════════════════════
//  LASER COLLISION
// ═══════════════════════════════════════════
function checkLaserHit(px,py,pz){
  // Player hitbox: cylinder radius 0.38, from y=0 to y=1.9
  // Laser is at LASER_Y (0.55) and is thin (radius 0.28 glow)
  // If player top (py+1.9) > LASER_Y and player bottom (py) < LASER_Y+0.28 => possible height hit
  const pBottom=py; const pTop=py+1.9;
  const laserTop=LASER_Y+LASER_HEIGHT*2.5; const laserBottom=LASER_Y-LASER_HEIGHT*2.5;
  const heightHit=pBottom<laserTop&&pTop>laserBottom;
  if(!heightHit) return false; // jumped over!

  // Check each laser beam: laser is a line through center, direction based on pivot yaw
  for(const piv of laserPivots){
    const angle=piv.rotation.y; // pivot yaw
    // Beam direction unit vector (horizontal)
    const dx=Math.cos(angle), dz=-Math.sin(angle);
    // Vector from center to player (horizontal only)
    const tx=px, tz=pz;
    // Distance from player to laser LINE (cross product / |dir|)
    const cross=Math.abs(tx*(-dz)-tz*dx); // |cross product| = perp distance
    if(cross<0.6) return true; // hit!
  }
  return false;
}

// ═══════════════════════════════════════════
//  MOVE MY PLAYER
// ═══════════════════════════════════════════
function moveMe(dt){
  const {dx,dz}=getMove();
  myX+=dx*WALK_SPEED*dt; myZ+=dz*WALK_SPEED*dt;

  // Clamp to circular arena
  const dist=Math.hypot(myX,myZ);
  if(dist>ARENA_R-0.6){const f=(ARENA_R-0.6)/dist; myX*=f; myZ*=f;}

  // Gravity + jump
  velY-=GRAVITY*dt;
  myY+=velY*dt;
  if(myY<=0){myY=0;velY=0;onGround=true;}
  if(myY>0) onGround=false;

  // Face movement direction
  if(Math.abs(dx)>0.05||Math.abs(dz)>0.05) myYaw=Math.atan2(dx,dz);

  // Update mesh
  const me=players[myId];
  if(me&&me.mesh){
    me.mesh.position.set(myX,myY,myZ);
    me.mesh.rotation.y=myYaw;
    // Squash & stretch on land
    const jumpStretch=myY>0.1?1+myY*0.04:1;
    me.mesh.scale.set(1/Math.sqrt(jumpStretch),jumpStretch,1/Math.sqrt(jumpStretch));
    // Ring pulse
    if(me.mesh.userData.ring){
      const t=Date.now()*0.003;
      me.mesh.userData.ring.material.opacity=0.4+Math.sin(t)*0.25;
    }
    me.x=myX; me.y=myY; me.z=myZ;
  }
}

function updateLaserRotation(dt){
  laserPivots.forEach((p,i)=>{ p.rotation.y+=laserSpeeds[i]*dt; });
  // Pulse center light
  cLight.intensity=2+Math.sin(Date.now()*0.004)*1;
}

  channel=sb.channel('lt3d2-'+roomCode,{config:{presence:{key:myId}}});
  channel
    .on('presence',{event:'sync'},()=>{rebuildFromPresence();if(!gameRunning)renderLobby();})
    .on('broadcast',{event:'move'},({payload})=>{
      if(payload.id===myId) return;
      const p=players[payload.id]; if(!p) return;
      p.x=payload.x; p.y=payload.y||0; p.z=payload.z; p.yaw=payload.yaw||0; p.alive=payload.alive;
      if(p.mesh){ p.mesh.position.set(p.x,p.y,p.z); p.mesh.rotation.y=p.yaw||0; if(!p.alive&&p.mesh){explode(p.x,p.y+1,p.z,p.color);scene.remove(p.mesh);p.mesh=null;} }
    })
    .on('broadcast',{event:'emote'},({payload})=>{
      if(payload.id===myId) return;
      const p=players[payload.id]; if(p){p.emote=payload.emote;p.emoteTime=Date.now();addChat(p.name||'?',payload.emote);}
    })
    .on('broadcast',{event:'lasers'},({payload})=>{
      if(!isHost&&payload.pivots) payload.pivots.forEach((r,i)=>{if(laserPivots[i])laserPivots[i].rotation.y=r;});
      if(!isHost&&payload.speeds) payload.speeds.forEach((s,i)=>laserSpeeds[i]=s);
    })
    .on('broadcast',{event:'wave'},({payload})=>{ if(!isHost) startWave(payload.wave); })
    .on('broadcast',{event:'start'},()=>{ if(!gameRunning&&mode==='multi') beginMultiGame(); })
    .on('broadcast',{event:'tolobby'},()=>{ if(mode==='multi'){cleanAll();spawnMe(0);renderLobby();showScreen('sLobby');}});

  await channel.subscribe(async s=>{
    if(s==='SUBSCRIBED'){
      const idx=Object.keys(players).length;
      await channel.track({id:myId,name:progress.name,color:myColor(),level:progress.level,host:isHost,idx,alive:true});
      document.getElementById('lobbyCode').textContent=roomCode;
      showScreen('sLobby');
    }
  });
}

function rebuildFromPresence(){
  const st=channel?.presenceState()||{}; const ids=Object.keys(st);
  for(const id of ids){
    const meta=st[id][0]; if(!meta||id===myId) continue;
    if(!players[id]){
      const mesh=makePlayer(meta.color||'#00f5ff'); mesh.position.set(meta.x||0,0,meta.z||0); scene.add(mesh);
      players[id]={id,name:meta.name,color:meta.color||'#00f5ff',level:meta.level||1,host:meta.host,x:meta.x||0,y:0,z:meta.z||0,yaw:0,alive:true,mesh,emote:null,emoteTime:0};
    }
  }
  for(const id of Object.keys(players)){if(!ids.includes(id)&&id!==myId){if(players[id].mesh)scene.remove(players[id].mesh);delete players[id];}}
}

function leaveChannel(){if(channel&&sb){try{sb.removeChannel(channel);}catch(e){}}channel=null;}

function renderLobby(){
  const list=document.getElementById('pList'); const pArr=Object.values(players); list.innerHTML='';
  for(let i=0;i<8;i++){
    const p=pArr[i];
    if(p) list.innerHTML+=`<div class="pslot filled ${p.id===myId?'me':''}"><div class="psav">${avatarSVG(p.color,26)}</div><div><div class="psname" style="color:${p.color}">${p.name}</div><div class="pslvl">Lvl ${p.level||1}${p.id===myId?' • DU':''}${p.host?' • HOST':''}</div></div></div>`;
    else list.innerHTML+=`<div class="pslot"><span class="sempty">WARTEN...</span></div>`;
  }
  const cnt=pArr.length, btn=document.getElementById('startBtn'), hint=document.getElementById('lhint');
  if(!isHost){btn.className='btn bghost';btn.disabled=true;hint.textContent='Warte auf Host...';}
  else if(cnt<2){btn.className='btn bghost';btn.disabled=true;hint.textContent=`Min. 2 Spieler (${cnt}/2)`;}
  else{btn.className='btn bcyan';btn.disabled=false;hint.textContent='Bereit! 🚀';}
}

window.toggleMulti=()=>{
  if(!isOnline){setErr('menuErr','Login nötig für Multiplayer!');return;}
  const m=document.getElementById('multiOpts'); m.style.display=m.style.display==='none'?'flex':'none';
};
window.showJoin=()=>document.getElementById('joinArea').style.display='flex';
window.createRoom=async()=>{
  if(!isOnline){setErr('menuErr','Login nötig!');return;}
  mode='multi'; roomCode=randCode(); isHost=true; spawnMe(0); await joinChannel();
};
window.joinRoom=async()=>{
  const code=document.getElementById('joinCode').value.trim().toUpperCase();
  if(code.length!==4){setErr('menuErr','4 Zeichen!');return;}
  if(!isOnline){setErr('menuErr','Login nötig!');return;}
  mode='multi'; roomCode=code; isHost=false; spawnMe(0); await joinChannel();
};
window.leaveRoom=()=>{leaveChannel();cleanAll();Object.values(players).forEach(p=>{if(p.id!==myId&&p.mesh)scene.remove(p.mesh);});players={};spawnMe(0);showScreen('sMenu');};
window.copyCode=()=>{if(navigator.clipboard)navigator.clipboard.writeText(roomCode);setErr('lobbyErr','Kopiert!');};

window.startMulti=()=>{
  if(!isHost)return;
  if(Object.keys(players).length<2){setErr('lobbyErr','Min. 2 Spieler nötig!');return;}
  channel.send({type:'broadcast',event:'start',payload:{}}); beginMultiGame();
};

function beginMultiGame(){
  cleanAll();
  const pArr=Object.values(players);
  pArr.forEach((p,i)=>{
    p.alive=true; const angle=(Math.PI*2/pArr.length)*i;
    p.x=Math.cos(angle)*(ARENA_R*.55); p.z=Math.sin(angle)*(ARENA_R*.55); p.y=0;
    if(p.id===myId){myX=p.x;myZ=p.z;myY=0;velY=0;onGround=true;}
    if(p.mesh){p.mesh.position.set(p.x,0,p.z);p.mesh.visible=true;}
    else{p.mesh=makePlayer(p.color);scene.add(p.mesh);p.mesh.position.set(p.x,0,p.z);}
  });
  buildLasers(4); laserBaseSpeed=0.4;
  gameTimer=99; document.getElementById('hudTimer').textContent='99';
  document.getElementById('hudTimerLbl').textContent='SEKUNDEN';
  document.getElementById('hudWave').textContent='W 1';
  showScreen('game');
  runCountdown(()=>{
    gameRunning=true; soloWave=1; soloSurvTime=0; waveTimer=0;
    if(isHost){
      timerInt=setInterval(()=>{if(!gameRunning)return;gameTimer--;document.getElementById('hudTimer').textContent=gameTimer;if(gameTimer<=0)endMulti(true);},1000);
    }
  });
}

function updateMulti(dt){
  const me=players[myId]; if(!me) return;
  soloSurvTime+=dt; waveTimer+=dt;

  if(me.alive){
    moveMe(dt);
    if(checkLaserHit(myX,myY,myZ)) dieMulti();
  }

  updateLaserRotation(dt);

  if(isHost){
    // wave progression
    const waveInterval=soloWave===1?12:15;
    if(waveTimer>waveInterval){
      const nw=soloWave+1; startWave(nw);
      channel.send({type:'broadcast',event:'wave',payload:{wave:nw}});
    }
    // sync lasers ~10/s
    laserSyncTimer+=dt;
    if(laserSyncTimer>.1&&channel){laserSyncTimer=0;channel.send({type:'broadcast',event:'lasers',payload:{pivots:laserPivots.map(p=>p.rotation.y),speeds:laserSpeeds}});}
    // push my position
    movePushTimer+=dt;
    if(movePushTimer>.05&&channel){movePushTimer=0;channel.send({type:'broadcast',event:'move',payload:{id:myId,x:myX,y:myY,z:myZ,yaw:myYaw,alive:me.alive}});}
  } else {
    movePushTimer+=dt;
    if(movePushTimer>.05&&channel){movePushTimer=0;channel.send({type:'broadcast',event:'move',payload:{id:myId,x:myX,y:myY,z:myZ,yaw:myYaw,alive:me.alive}});}
  }

  const alive=Object.values(players).filter(p=>p.alive);
  document.getElementById('hudAlive').textContent='👤 '+alive.length;
  if(alive.length<=1&&Object.keys(players).length>=2) endMulti(false);
}

function dieMulti(){
  const me=players[myId]; if(!me||!me.alive) return;
  me.alive=false; if(me.mesh){explode(myX,myY+1,myZ,myColor());scene.remove(me.mesh);me.mesh=null;}
  channel.send({type:'broadcast',event:'move',payload:{id:myId,x:myX,y:myY,z:myZ,yaw:myYaw,alive:false}});
  document.getElementById('deadMsg').style.display='block';
  setTimeout(()=>document.getElementById('deadMsg').style.display='none',1500);
}

function endMulti(timedOut){
  if(gameOver)return; gameOver=true; gameRunning=false;
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  const me=players[myId],alive=Object.values(players).filter(p=>p.alive);
  const won=me&&me.alive;
  const xpGain=won?100:35, coinGain=won?60:20;
  if(won)progress.wins++; progress.games++;
  const oldLvl=progress.level; progress.xp+=xpGain; progress.coins+=coinGain;
  while(progress.xp>=xpNeeded(progress.level)){progress.xp-=xpNeeded(progress.level);progress.level++;}
  const lu=progress.level>oldLvl; persist();
  const title=timedOut?'⏰ ZEIT!':won?'🏆 GEWONNEN!':'💀 RAUS!';
  const cls=won||timedOut?'win':'lose';
  document.getElementById('rTitle').textContent=title; document.getElementById('rTitle').className='rtitle '+cls;
  document.getElementById('rStats').textContent=timedOut?`${alive.length} überlebt`:won?'Letzter Überlebender! 🔥':alive.length?`${alive.map(p=>p.name).join(', ')} gewinnt`:'Alle raus';
  document.getElementById('rXp').textContent='+'+xpGain; document.getElementById('rCoin').textContent='+'+coinGain;
  document.getElementById('lvlup').style.display=lu?'block':'none'; if(lu)document.getElementById('lvlup').textContent=`⬆ LEVEL ${progress.level}!`;
  const rb=document.getElementById('rBtns'); rb.innerHTML='';
  const b1=document.createElement('button');b1.className='btn bcyan';b1.textContent='🔄 LOBBY';b1.onclick=()=>{cleanAll();spawnMe(0);if(isHost&&channel)channel.send({type:'broadcast',event:'tolobby',payload:{}});renderLobby();showScreen('sLobby');};rb.appendChild(b1);
  const b2=document.createElement('button');b2.className='btn bghost';b2.textContent='🏠 MENÜ';b2.onclick=()=>{leaveChannel();cleanAll();Object.values(players).forEach(p=>{if(p.mesh)scene.remove(p.mesh)});players={};spawnMe(0);showScreen('sMenu');};rb.appendChild(b2);
  renderProfile(); showScreen('sResult');
}

// ═══════════════════════════════════════════
//  CLEANUP
// ═══════════════════════════════════════════
function cleanAll(){
  gameRunning=false; gameOver=false;
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  laserPivots.forEach(p=>scene.remove(p)); laserPivots=[]; laserSpeeds=[];
  explosions.forEach(p=>scene.remove(p)); explosions.length=0;
  document.getElementById('sResult').classList.add('off');
  document.getElementById('lvlup').style.display='none';
  document.getElementById('deadMsg').style.display='none';
}

// ═══════════════════════════════════════════
//  MAIN RENDER LOOP
// ═══════════════════════════════════════════
const clock=new THREE.Clock();
function renderLoop(){
  requestAnimationFrame(renderLoop);
  const dt=Math.min(clock.getDelta(),0.05); // cap dt

  if(gameRunning){
    if(mode==='solo') updateSolo(dt);
    else updateMulti(dt);
  }
  updateExplosions(dt);
  updateCamera();

  // Pulsing lights
  fill.intensity=1+Math.sin(Date.now()*.0008)*0.5;
  floorMat.emissiveIntensity=0.02+Math.sin(Date.now()*.0005)*0.01;

  // Other players emote
  Object.values(players).forEach(p=>{
    if(p.id===myId||!p.mesh) return;
    if(p.emote&&Date.now()-p.emoteTime<2500&&p.mesh){
      // emote handled via CSS overlay below if needed
    }
  });

  renderer.render(scene,camera);
}
renderLoop();

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
async function boot(){
  try{
    sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    const{data:{session}}=await sb.auth.getSession();
    if(session){SB_USER=session.user;isOnline=true;await loadProg();}
  }catch(e){console.error(e);}
  renderProfile(); showScreen('sMenu');
  spawnMe(0); // preview player in background
}
boot();
</script>
