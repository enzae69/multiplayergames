<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>LASER TRACER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;font-family:'Exo 2',sans-serif;color:#fff;user-select:none;-webkit-user-select:none}
canvas{display:block;position:fixed;inset:0;width:100%!important;height:100%!important;z-index:0;touch-action:none}

.screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px 16px 48px;overflow-y:auto}
.screen.solid{background:rgba(5,5,16,0.97)}
.screen.off{display:none!important}
.screen.hud{background:transparent;pointer-events:none;justify-content:flex-start;padding:14px}

.gtitle{font-family:'Russo One',sans-serif;font-size:clamp(36px,11vw,80px);background:linear-gradient(90deg,#00f5ff,#ff006e,#ffff00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;text-align:center;filter:drop-shadow(0 0 20px #00f5ff)}
.gsub{color:rgba(255,255,255,0.4);letter-spacing:6px;font-size:11px;text-transform:uppercase;margin-top:-10px}
.sep{width:60px;height:2px;background:linear-gradient(90deg,transparent,#00f5ff,transparent)}

.pcard{background:rgba(10,10,31,0.95);border:2px solid rgba(0,245,255,0.3);border-radius:14px;padding:12px 16px;width:min(340px,93vw);display:flex;align-items:center;gap:11px}
.pname{font-weight:900;font-size:15px;color:#00f5ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pstat{font-size:11px;color:rgba(255,255,255,0.4)}

.btn{font-family:'Russo One',sans-serif;font-size:15px;letter-spacing:1.5px;padding:14px 28px;border:none;border-radius:8px;cursor:pointer;transition:transform .15s;text-transform:uppercase;touch-action:manipulation;width:min(300px,90vw);display:block}
.btn:active{transform:scale(.96)}
.bcyan{background:linear-gradient(135deg,#007a8a,#00c4d4);color:#050510;box-shadow:0 0 18px rgba(0,245,255,.4)}
.bgreen{background:linear-gradient(135deg,#1a8a1a,#39ff14);color:#050510;box-shadow:0 0 18px rgba(57,255,20,.4)}
.bghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.berr{color:#ff006e;font-size:12px;text-align:center;min-height:16px}

.multibtns{display:none;flex-direction:column;gap:9px;align-items:center;width:100%}
.multibtns.show{display:flex}
.joinrow{display:none;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.joinrow.show{display:flex}
.jinp{background:rgba(15,15,42,1);border:2px solid rgba(0,245,255,0.3);color:#00f5ff;font-family:'Russo One',sans-serif;font-size:20px;padding:10px 14px;border-radius:8px;outline:none;width:130px;text-align:center;letter-spacing:4px;text-transform:uppercase}

.lbox{background:rgba(10,10,31,.95);border:2px solid rgba(0,245,255,.3);border-radius:16px;padding:20px;width:min(400px,95vw)}
.ltitle{font-family:'Russo One',sans-serif;font-size:18px;color:#00f5ff;text-align:center;letter-spacing:3px;margin-bottom:12px}
.codebig{font-family:'Russo One',sans-serif;font-size:32px;color:#ffff00;letter-spacing:8px;text-align:center;padding:10px;background:rgba(15,15,42,1);border:2px dashed #ffff00;border-radius:10px;margin-bottom:10px;cursor:pointer}
.plist{display:grid;grid-template-columns:1fr 1fr;gap:7px;min-height:80px;margin-bottom:10px}
.pslot{background:rgba(15,15,42,1);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:8px;font-size:12px;color:rgba(255,255,255,.5);display:flex;align-items:center;min-height:44px}
.pslot.filled{border-color:rgba(0,245,255,.3);color:#00f5ff}

.nameinp{background:rgba(15,15,42,1);border:2px solid rgba(0,245,255,0.3);color:#00f5ff;font-family:'Russo One',sans-serif;font-size:18px;padding:10px 14px;border-radius:8px;outline:none;width:min(280px,85vw);text-align:center;letter-spacing:3px;text-transform:uppercase}

.hud-top{display:flex;gap:12px;pointer-events:none;flex-wrap:wrap}
.hudpill{background:rgba(5,5,16,0.8);border:1px solid rgba(0,245,255,0.3);border-radius:20px;padding:5px 14px;font-family:'Russo One',sans-serif;font-size:14px;color:#00f5ff;letter-spacing:2px}

.rsbox{background:rgba(10,10,31,.97);border:2px solid rgba(0,245,255,.4);border-radius:18px;padding:28px 22px;width:min(320px,92vw);display:flex;flex-direction:column;align-items:center;gap:14px}
.rstitle{font-family:'Russo One',sans-serif;font-size:24px;color:#ff006e;letter-spacing:4px}
.rsstat{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:1px;text-align:center}
.rsval{font-family:'Russo One',sans-serif;font-size:28px;color:#00f5ff}

#joyBase{position:fixed;display:none;width:90px;height:90px;border:2px solid rgba(255,255,255,0.25);border-radius:50%;background:rgba(255,255,255,0.05);z-index:100;pointer-events:none;touch-action:none}
#joyKnob{position:absolute;left:22px;top:22px;width:46px;height:46px;background:rgba(0,245,255,0.35);border:2px solid rgba(0,245,255,0.7);border-radius:50%}
#joyZone{position:fixed;bottom:0;left:0;width:55%;height:55%;z-index:90;touch-action:none;display:none}
#jumpBtn{position:fixed;bottom:130px;right:48px;width:130px;height:130px;border-radius:50%;background:rgba(57,255,20,0.2);border:3px solid #39ff14;color:#39ff14;font-family:'Russo One',sans-serif;font-size:20px;cursor:pointer;touch-action:manipulation;z-index:101;display:none;align-items:center;justify-content:center;box-shadow:0 0 36px rgba(57,255,20,.45)}
#jumpBtn:active{background:rgba(57,255,20,0.45)}
#errBanner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:#c00;color:#fff;font-size:12px;padding:8px 12px;font-family:monospace;white-space:pre-wrap;max-height:120px;overflow-y:auto}

/* ── ABILITY SHOP ── */
.ab-shop{width:min(340px,93vw);background:rgba(8,6,24,.97);border:2px solid rgba(191,0,255,.3);border-radius:16px;padding:14px 12px;display:flex;flex-direction:column;gap:10px}
.ab-shop-head{font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:3px;color:rgba(191,0,255,.85);display:flex;justify-content:space-between;align-items:center}
.ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ab-card{background:rgba(191,0,255,.07);border:2px solid rgba(191,0,255,.18);border-radius:12px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;touch-action:manipulation;transition:border-color .2s,background .2s}
.ab-card:active{transform:scale(.94)}
.ab-card.ab-eq{border-color:#bf00ff;background:rgba(191,0,255,.14);box-shadow:0 0 14px rgba(191,0,255,.22)}
.ab-icon{font-size:26px}
.ab-name{font-family:'Russo One',sans-serif;font-size:10px;letter-spacing:1px;color:#fff;text-align:center}
.ab-desc{font-size:9px;color:rgba(255,255,255,.4);text-align:center;line-height:1.3}
.ab-count{font-family:'Russo One',sans-serif;font-size:14px;color:#bf00ff}
.ab-cost{font-family:'Russo One',sans-serif;font-size:10px;color:#ffd700}
.ab-err{font-family:'Russo One',sans-serif;font-size:10px;color:#ff4444;text-align:center;min-height:12px;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- MENU -->
<div id="sMenu" class="screen solid">
  <div class="gtitle">LASER<br>TRACER</div>
  <div class="gsub">3D EDITION</div>
  <div class="sep"></div>
  <div class="pcard">
    <div style="flex:1;min-width:0">
      <div class="pname" id="pName">PLAYER</div>
      <div class="pstat">Lv.<span id="pLvl">1</span> &nbsp;|&nbsp; <span id="pXp">0</span> XP &nbsp;|&nbsp; Best: W<span id="pBest">-</span></div>
    </div>
    <div style="color:#ffd700;font-family:'Russo One',sans-serif;font-size:13px">☀️<span id="pCoins">0</span></div>
  </div>
  <button class="btn bgreen" id="soloBtn">🎯 SOLO ÜBEN</button>
  <button class="btn bcyan" id="multiBtn">⚔️ MULTIPLAYER</button>
  <div class="multibtns" id="multibtns">
    <button class="btn bcyan" id="createBtn" style="font-size:13px;padding:11px">+ RAUM ERSTELLEN</button>
    <button class="btn bghost" id="joinShowBtn" style="font-size:13px;padding:11px">🔍 RAUM BEITRETEN</button>
    <div class="joinrow" id="joinRow">
      <input class="jinp" id="joinInput" maxlength="4" placeholder="CODE" autocomplete="off" spellcheck="false"/>
      <button class="btn bcyan" id="joinBtn" style="width:auto;padding:11px 18px;font-size:13px">JOIN</button>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
    <input class="nameinp" id="nameInp" maxlength="16" placeholder="NAME ÄNDERN..." autocomplete="off" spellcheck="false"/>
    <button class="btn bcyan" id="nameBtn" style="width:auto;padding:11px 16px;font-size:13px">OK</button>
  </div>
  <!-- Ability Shop -->
  <div class="ab-shop">
    <div class="ab-shop-head">
      <span>🔮 ABILITIES</span>
      <span style="color:#ffd700;font-size:12px">☀️<span id="abCoins">0</span></span>
    </div>
    <div class="ab-grid" id="abGrid"></div>
    <div class="ab-err" id="abErr"></div>
  </div>

  <a href="../menu.html" class="btn bghost" style="text-align:center;text-decoration:none;font-family:'Russo One',sans-serif;font-size:13px;padding:10px">← SPIELAUSWAHL</a>
  <div class="berr" id="menuErr"></div>
</div>

<!-- HUD -->
<div id="sGame" class="screen hud off">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;width:100%">
    <div class="hud-top">
      <div class="hudpill" id="hudWave">W1</div>
      <div class="hudpill" id="hudTime">0.0s</div>
      <div class="hudpill" id="hudRound" style="display:none;background:rgba(0,245,255,0.15);border-color:rgba(0,245,255,0.4)">R1/5</div>
    </div>
    <div style="background:rgba(5,5,16,0.7);border:1px solid rgba(0,245,255,0.2);border-radius:20px;padding:5px 12px;font-size:10px;color:rgba(0,245,255,0.4);letter-spacing:1px;pointer-events:none">🎥 Rechts = Kamera</div>
  </div>
  <!-- Leave button when eliminated -->
  <div id="elimBanner" style="display:none;flex-direction:column;align-items:center;pointer-events:auto;margin-top:20px">
    <button class="btn bghost" id="elimLeaveBtn" style="width:auto;padding:10px 22px;font-size:13px;pointer-events:auto">← VERLASSEN</button>
  </div>
</div>

<!-- SPECTATE BAR (fixed, outside all screens) -->
<div id="spectateBar" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;background:rgba(5,5,16,.95);border:2px solid rgba(0,245,255,.4);border-radius:16px;padding:10px 8px;display:none;align-items:center;gap:12px;white-space:nowrap;box-shadow:0 0 20px rgba(0,245,255,.18);font-family:'Russo One',sans-serif">
  <button id="specPrev" onclick="switchSpectate(-1)" style="background:rgba(0,245,255,.1);border:1px solid rgba(0,245,255,.35);color:#00f5ff;border-radius:10px;font-size:18px;padding:7px 16px;cursor:pointer;touch-action:manipulation">◀</button>
  <div style="display:flex;flex-direction:column;align-items:center;gap:1px;min-width:90px">
    <div style="font-size:9px;color:rgba(255,255,255,.35);letter-spacing:3px">BEOBACHTET</div>
    <div id="specName" style="font-size:16px;color:#00f5ff;letter-spacing:2px">-</div>
  </div>
  <button id="specNext" onclick="switchSpectate(1)" style="background:rgba(0,245,255,.1);border:1px solid rgba(0,245,255,.35);color:#00f5ff;border-radius:10px;font-size:18px;padding:7px 16px;cursor:pointer;touch-action:manipulation">▶</button>
</div>

<!-- ANNOUNCEMENT OVERLAY (centered, shown to all players) -->
<div id="announceOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;display:none;align-items:center;justify-content:center;pointer-events:none">
  <div id="announceTxt" style="background:rgba(5,5,16,.96);border:2px solid rgba(255,0,110,.7);border-radius:18px;padding:22px 36px;font-family:'Russo One',sans-serif;font-size:22px;color:#fff;letter-spacing:3px;text-align:center;box-shadow:0 0 40px rgba(255,0,110,.35);max-width:80vw;word-break:break-word"></div>
</div>

<!-- ADMIN IMAGE OVERLAY -->
<div id="adminImgOv" onclick="closeAdminImgLT()" style="position:fixed;inset:0;z-index:600;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:rgba(0,0,0,.82);cursor:pointer">
  <div id="adminImgLabel" style="font-family:'Russo One',sans-serif;font-size:18px;color:#ff006e;letter-spacing:4px;text-shadow:0 0 20px rgba(255,0,110,.8)"></div>
  <img id="adminImgEl" src="" alt="" style="max-width:85vw;max-height:72vh;border-radius:12px;box-shadow:0 0 40px rgba(255,0,110,.4);object-fit:contain"/>
</div>

<!-- ADMIN PANEL (fixed bottom-left, only visible to admin) -->
<div id="adminPanel" style="position:fixed;bottom:24px;left:16px;z-index:300;display:none;flex-direction:column;gap:6px;background:rgba(5,5,16,.97);border:2px solid rgba(255,0,110,.6);border-radius:14px;padding:12px 10px;box-shadow:0 0 24px rgba(255,0,110,.25);font-family:'Russo One',sans-serif">
  <div style="font-size:9px;letter-spacing:3px;color:rgba(255,0,110,.8);text-align:center;margin-bottom:2px">⚡ ADMIN</div>
  <button onclick="adminSpawnLaser()" style="background:rgba(255,0,110,.15);border:1px solid rgba(255,0,110,.5);color:#ff006e;border-radius:8px;font-size:12px;padding:6px 10px;cursor:pointer;font-family:'Russo One',sans-serif;letter-spacing:1px;touch-action:manipulation">➕ LASER</button>
  <button onclick="adminToggleInvincible()" id="adminInvBtn" style="background:rgba(255,0,110,.15);border:1px solid rgba(255,0,110,.5);color:#ff006e;border-radius:8px;font-size:12px;padding:6px 10px;cursor:pointer;font-family:'Russo One',sans-serif;letter-spacing:1px;touch-action:manipulation">🛡️ INVINCIBLE</button>
  <button onclick="adminKillAll()" style="background:rgba(255,0,110,.15);border:1px solid rgba(255,0,110,.5);color:#ff006e;border-radius:8px;font-size:12px;padding:6px 10px;cursor:pointer;font-family:'Russo One',sans-serif;letter-spacing:1px;touch-action:manipulation">💀 KILL ALL</button>
  <div style="border-top:1px solid rgba(255,0,110,.3);margin-top:2px;padding-top:6px;display:flex;flex-direction:column;gap:4px">
    <input id="adminAnnounceInp" type="text" placeholder="Nachricht..." onkeydown="if(event.key==='Enter')adminSendAnnounce()" style="background:rgba(255,0,110,.1);border:1px solid rgba(255,0,110,.4);color:#fff;border-radius:7px;font-size:11px;padding:5px 8px;font-family:'Russo One',sans-serif;outline:none;width:100%;box-sizing:border-box" />
    <button onclick="adminSendAnnounce()" style="background:rgba(255,0,110,.15);border:1px solid rgba(255,0,110,.5);color:#ff006e;border-radius:8px;font-size:12px;padding:6px 10px;cursor:pointer;font-family:'Russo One',sans-serif;letter-spacing:1px;touch-action:manipulation">📢 ANNOUNCE</button>
  </div>
  <div style="border-top:1px solid rgba(255,0,110,.3);margin-top:2px;padding-top:6px;display:flex;flex-direction:column;gap:4px">
    <div style="font-size:8px;letter-spacing:2px;color:rgba(255,215,0,.7)">☀️ SONNEN MÜNZEN</div>
    <input id="ltAdminCoinUser" type="text" placeholder="USERNAME" autocomplete="off" style="background:rgba(255,0,110,.1);border:1px solid rgba(255,0,110,.4);color:#fff;border-radius:7px;font-size:11px;padding:5px 8px;font-family:'Russo One',sans-serif;outline:none;width:100%;box-sizing:border-box"/>
    <input id="ltAdminCoinAmt" type="number" placeholder="BETRAG" min="0" style="background:rgba(255,0,110,.1);border:1px solid rgba(255,0,110,.4);color:#fff;border-radius:7px;font-size:11px;padding:5px 8px;font-family:'Russo One',sans-serif;outline:none;width:100%;box-sizing:border-box"/>
    <button onclick="ltAdminSetCoins()" style="background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.5);color:#ffd700;border-radius:8px;font-size:12px;padding:6px 10px;cursor:pointer;font-family:'Russo One',sans-serif;letter-spacing:1px;touch-action:manipulation">SETZEN</button>
    <div id="ltAdminCoinMsg" style="font-size:9px;min-height:12px;text-align:center;letter-spacing:1px"></div>
  </div>
</div>

<!-- RESULT -->
<div id="sResult" class="screen solid off">
  <div class="rsbox">
    <div class="rstitle">GAME OVER</div>
    <div class="rsstat">Welle</div><div class="rsval" id="rsWave">1</div>
    <div class="rsstat">Überlebt</div><div class="rsval" id="rsSurv">0.0s</div>
    <div class="rsstat">Sonnen Münzen</div><div class="rsval" id="rsCoins">+0 ☀️</div>
    <button class="btn bgreen" id="retryBtn">↺ NOCHMAL</button>
    <button class="btn bghost" id="menuBtn">← MENÜ</button>
  </div>
</div>

<!-- LOBBY -->
<div id="sLobby" class="screen solid off">
  <div class="lbox">
    <div class="ltitle">LOBBY</div>
    <div class="codebig" id="codeVal" onclick="copyCode()">----</div>
    <div style="font-size:10px;color:rgba(255,255,255,.3);letter-spacing:2px;text-align:center;margin-bottom:10px">TIPPE ZUM KOPIEREN</div>
    <div class="plist" id="plistHost"></div>
    <div id="roundPicker" style="display:none;margin-bottom:4px">
      <div style="font-size:10px;color:rgba(255,255,255,.4);letter-spacing:2px;text-align:center;margin-bottom:8px">RUNDEN WÄHLEN</div>
      <div style="display:flex;gap:8px;justify-content:center">
        <button onclick="setRounds(5)"  id="rb5"  class="btn bgreen"  style="width:64px;padding:9px 0;font-size:15px">5</button>
        <button onclick="setRounds(10)" id="rb10" class="btn bghost" style="width:64px;padding:9px 0;font-size:15px">10</button>
        <button onclick="setRounds(15)" id="rb15" class="btn bghost" style="width:64px;padding:9px 0;font-size:15px">15</button>
      </div>
    </div>
    <div id="roundInfo" style="display:none;text-align:center;color:rgba(0,245,255,.6);font-size:12px;letter-spacing:2px;margin-bottom:4px"></div>
    <button class="btn bgreen" id="startBtn" style="margin-bottom:8px">▶ STARTEN</button>
    <button class="btn bghost" id="leaveBtn">← VERLASSEN</button>
  </div>
</div>

<!-- ROUND END -->
<div id="sRoundEnd" class="screen off" style="background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div id="reRound" style="font-size:12px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase"></div>
  <div id="reWinner" style="font-family:'Russo One',sans-serif;font-size:26px;color:#00f5ff;letter-spacing:3px;text-align:center;padding:0 20px"></div>
  <div id="reScores" style="font-size:13px;color:rgba(255,255,255,.6);text-align:center;line-height:2;padding:0 20px"></div>
  <div id="reCountdown" style="font-family:'Russo One',sans-serif;font-size:48px;color:#fff;margin-top:8px"></div>
  <button onclick="leaveRoom()" style="position:fixed;bottom:24px;left:24px;background:rgba(200,0,50,0.85);border:none;border-radius:12px;color:#fff;font-family:'Russo One',sans-serif;font-size:14px;letter-spacing:2px;padding:12px 22px;pointer-events:auto;cursor:pointer">← VERLASSEN</button>
</div>

<!-- Mobile controls -->
<div id="joyBase"><div id="joyKnob"></div></div>
<div id="joyZone"></div>
<button id="jumpBtn">JUMP</button>
<button id="abilityBtn" onclick="useAbility()" style="position:fixed;bottom:280px;right:48px;width:96px;height:96px;border-radius:50%;background:rgba(191,0,255,.18);border:3px solid #bf00ff;color:#bf00ff;font-family:'Russo One',sans-serif;font-size:13px;cursor:pointer;touch-action:manipulation;z-index:101;display:none;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 28px rgba(191,0,255,.4);gap:2px"><span id="abilityBtnIcon" style="font-size:22px">🔮</span><span id="abilityBtnName" style="font-size:8px;letter-spacing:1px;text-align:center">ABILITY</span><span id="abilityBtnCount" style="font-size:12px">×0</span></button>
<div id="errBanner"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
'use strict';

// ── CONSTANTS ─────────────────────────────────────────────────────────────
var ARENA_R      = 18;
var LASER_Y      = 0.65;
var GRAVITY      = 22;
var JUMP_V       = 9.5;
var WALK_SPEED   = 7;

// ── SEEDED RNG (mulberry32) ────────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Triangle-wave for sweep lasers: bounces between -r and +r deterministically
function sweepPos(elapsed, r, speed) {
  var absSpd = Math.abs(speed);
  var period = 4 * r / absSpd;
  var t = ((elapsed % period) + period) % period;
  var half = period / 2;
  var pos = t < half ? -r + t * absSpd : r - (t - half) * absSpd;
  return speed > 0 ? pos : -pos;
}

// ── LOOKAT CAMERA MATRIX ───────────────────────────────────────────────────
function buildCamMatrix() {
  var tx = watchX - camX, ty = (watchY + CAM_TARGET_H) - camY, tz = watchZ - camZ;
  var tl = Math.sqrt(tx*tx + ty*ty + tz*tz);
  if (tl < 0.01) return;
  _fx = tx/tl; _fy = ty/tl; _fz = tz/tl;
  // Right = cross(forward, worldUp=(0,1,0)) = (-fz, 0, fx)
  var rl = Math.sqrt(_fx*_fx + _fz*_fz);
  if (rl < 0.01) { _rx=1; _ry=0; _rz=0; }
  else { _rx = -_fz/rl; _ry = 0; _rz = _fx/rl; }
  // Up = cross(right, forward)
  _ux = -_rz*_fy;
  _uy =  _rz*_fx - _rx*_fz;
  _uz =  _rx*_fy;
}

// ── PERSPECTIVE PROJECTION ─────────────────────────────────────────────────
function proj(wx, wy, wz) {
  var dx = wx-camX, dy = wy-camY, dz = wz-camZ;
  var cx = dx*_rx + dy*_ry + dz*_rz; // right
  var cy = dx*_ux + dy*_uy + dz*_uz; // up
  var cz = dx*_fx + dy*_fy + dz*_fz; // forward (depth)
  if (cz < 0.1) return null;
  var s = FOV / cz;
  return {x: W*0.5 + cx*s, y: H*0.5 - cy*s, s: s};
}

// ── CAMERA ────────────────────────────────────────────────────────────────
function updateCam() {
  // Resolve what the camera follows: spectated peer when dead, otherwise self
  if (myDead && spectatingId && peers[spectatingId] && typeof peers[spectatingId].x === 'number') {
    watchX = peers[spectatingId].x;
    watchY = peers[spectatingId].y || 0;
    watchZ = peers[spectatingId].z;
  } else {
    watchX = myX; watchY = myY; watchZ = myZ;
  }
  var hDist = Math.cos(camPitch) * CAM_DIST;
  camX = watchX - Math.sin(camYaw) * hDist;
  camZ = watchZ - Math.cos(camYaw) * hDist;
  camY = watchY + 1.0 + Math.sin(camPitch) * CAM_DIST;
  buildCamMatrix();
}

// ── FLOOR (checkered tiles) ────────────────────────────────────────────────
function drawFloor() {
  var TILE = 2;
  var N = Math.ceil(ARENA_R / TILE) + 1;
  var col0 = '#0d2444', col1 = '#0a1c38';
  for (var tx = -N; tx <= N; tx++) {
    for (var tz = -N; tz <= N; tz++) {
      var wx = tx*TILE, wz = tz*TILE;
      // check center of tile inside arena
      var cx = wx+TILE*0.5, cz = wz+TILE*0.5;
      if (cx*cx + cz*cz > ARENA_R*ARENA_R + 2) continue;
      var c00 = proj(wx,      0, wz);
      var c10 = proj(wx+TILE, 0, wz);
      var c11 = proj(wx+TILE, 0, wz+TILE);
      var c01 = proj(wx,      0, wz+TILE);
      if (!c00 || !c10 || !c11 || !c01) continue;
      ctx.fillStyle = ((tx+tz) % 2 === 0) ? col0 : col1;
      ctx.beginPath();
      ctx.moveTo(c00.x, c00.y);
      ctx.lineTo(c10.x, c10.y);
      ctx.lineTo(c11.x, c11.y);
      ctx.lineTo(c01.x, c01.y);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,180,255,0.1)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
}

// ── ARENA WALL ────────────────────────────────────────────────────────────
function drawWall() {
  var WALL_H = 2.2;
  var SEGS   = 32;
  for (var i = 0; i < SEGS; i++) {
    var a0 = (i/SEGS)*Math.PI*2;
    var a1 = ((i+1)/SEGS)*Math.PI*2;
    var x0 = Math.cos(a0)*ARENA_R, z0 = Math.sin(a0)*ARENA_R;
    var x1 = Math.cos(a1)*ARENA_R, z1 = Math.sin(a1)*ARENA_R;
    var b00 = proj(x0, 0,      z0);
    var b01 = proj(x0, WALL_H, z0);
    var b10 = proj(x1, 0,      z1);
    var b11 = proj(x1, WALL_H, z1);
    if (!b00 || !b01 || !b10 || !b11) continue;
    // Alternate panel colors (like hazard stripes)
    ctx.fillStyle = i%2===0 ? '#1a0040' : '#280060';
    ctx.beginPath();
    ctx.moveTo(b00.x, b00.y);
    ctx.lineTo(b10.x, b10.y);
    ctx.lineTo(b11.x, b11.y);
    ctx.lineTo(b01.x, b01.y);
    ctx.closePath();
    ctx.fill();
    // Top edge glow
    ctx.strokeStyle = i%2===0 ? 'rgba(0,245,255,0.6)' : 'rgba(180,0,255,0.5)';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 8;
    ctx.shadowColor = i%2===0 ? '#00f5ff' : '#bf00ff';
    ctx.beginPath();
    ctx.moveTo(b01.x, b01.y);
    ctx.lineTo(b11.x, b11.y);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// ── LASERS ────────────────────────────────────────────────────────────────
// Convert world point to camera space (returns {cx,cy,cz})
function toCamSpace(wx, wy, wz) {
  var dx=wx-camX, dy=wy-camY, dz=wz-camZ;
  return {
    cx: dx*_rx+dy*_ry+dz*_rz,
    cy: dx*_ux+dy*_uy+dz*_uz,
    cz: dx*_fx+dy*_fy+dz*_fz
  };
}
function screenFromCam(c) {
  var s = FOV/c.cz;
  return {x: W*0.5+c.cx*s, y: H*0.5-c.cy*s};
}

function drawLasers(t) {
  var r = ARENA_R - 0.5;
  var NEAR = 0.15;
  for (var i = 0; i < lasers.length; i++) {
    var L = lasers[i], a = L.ang;
    var wx1, wz1, wx2, wz2;

    if (L.type === 'rot') {
      wx1 =  Math.cos(a)*r; wz1 =  Math.sin(a)*r;
      wx2 = -wx1;           wz2 = -wz1;
    } else {
      var half = Math.sqrt(Math.max(0, r*r - L.offset*L.offset));
      var ocx = L.offset*Math.sin(a), ocz = -L.offset*Math.cos(a);
      wx1 = ocx+Math.cos(a)*half; wz1 = ocz+Math.sin(a)*half;
      wx2 = ocx-Math.cos(a)*half; wz2 = ocz-Math.sin(a)*half;
    }

    // Near-plane clip: if an endpoint is behind camera, slide it to NEAR
    var c1 = toCamSpace(wx1, LASER_Y, wz1);
    var c2 = toCamSpace(wx2, LASER_Y, wz2);
    if (c1.cz < NEAR && c2.cz < NEAR) continue;
    if (c1.cz < NEAR) {
      var tt = (NEAR-c1.cz)/(c2.cz-c1.cz);
      c1 = {cx:c1.cx+tt*(c2.cx-c1.cx), cy:c1.cy+tt*(c2.cy-c1.cy), cz:NEAR};
    } else if (c2.cz < NEAR) {
      var tt = (NEAR-c2.cz)/(c1.cz-c2.cz);
      c2 = {cx:c2.cx+tt*(c1.cx-c2.cx), cy:c2.cy+tt*(c1.cy-c2.cy), cz:NEAR};
    }

    var p1 = screenFromCam(c1), p2 = screenFromCam(c2);
    var alpha = 0.75 + 0.25*Math.sin(t*3+i);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineCap = 'round';

    ctx.shadowBlur=28; ctx.shadowColor=L.color; ctx.strokeStyle=L.color; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();

    ctx.shadowBlur=6; ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.globalAlpha=alpha*0.6;
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
    ctx.restore();
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function rrect(x, y, w, h, r) {
  if (r > w/2) r = w/2;
  if (r > h/2) r = h/2;
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y,   x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);   ctx.quadraticCurveTo(x,   y+h, x,   y+h-r);
  ctx.lineTo(x, y+r);     ctx.quadraticCurveTo(x,   y,   x+r, y);
  ctx.closePath();
  ctx.fill();
}
// Draw a tapered leg quad from (hx,hy) hip to (fx,fy) foot
function drawLegShape(hx, hy, fx, fy, hw, fw) {
  var nx = fy-hy, ny = -(fx-hx), len = Math.sqrt(nx*nx+ny*ny);
  if (len < 0.01) return;
  nx /= len; ny /= len;
  ctx.beginPath();
  ctx.moveTo(hx+nx*hw, hy+ny*hw); ctx.lineTo(hx-nx*hw, hy-ny*hw);
  ctx.lineTo(fx-nx*fw, fy-ny*fw); ctx.lineTo(fx+nx*fw, fy+ny*fw);
  ctx.closePath(); ctx.fill();
}

// ── CHARACTER (Stumble Guys chibi style + walk/jump animation) ────────────
function drawChar(wx, wy, wz, color, name, isMe, walkPhase, isJumping) {
  walkPhase  = walkPhase  || 0;
  isJumping  = isJumping  || false;
  var legSw  = isJumping ? -0.55 : Math.sin(walkPhase) * 0.42;
  var armSw  = isJumping ?  0.60 : -Math.sin(walkPhase) * 0.38;
  var bodyBob= isJumping ?  0    : Math.abs(Math.sin(walkPhase)) * 0.04;

  // Shadow
  var shp = proj(wx, 0.01, wz);
  if (shp) {
    ctx.save();
    ctx.globalAlpha = isJumping ? 0.13 : 0.30;
    var sgr = ctx.createRadialGradient(shp.x,shp.y,0,shp.x,shp.y,shp.s*0.72);
    sgr.addColorStop(0,'rgba(0,0,0,0.9)'); sgr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = sgr;
    ctx.beginPath(); ctx.ellipse(shp.x,shp.y,shp.s*0.68,shp.s*0.26,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Stumble Guys proportions — big head, short stubby body
  var pFoot = proj(wx, wy+0.04,         wz);
  var pHip  = proj(wx, wy+0.52,         wz);
  var pShld = proj(wx, wy+0.90+bodyBob, wz);
  var pNeck = proj(wx, wy+1.08+bodyBob, wz);
  var pHead = proj(wx, wy+1.50+bodyBob, wz);  // BIG head center
  var pTop  = proj(wx, wy+2.05+bodyBob, wz);

  if (!pFoot && !pHip) return;
  var ref = pHip || pFoot;
  var sc  = ref.s;

  ctx.save();
  ctx.shadowBlur  = isMe ? 18 : 8;
  ctx.shadowColor = color;

  // ── LEGS (animated, tapered) ──
  if (pFoot && pHip) {
    var lw = sc*0.20;
    var hipY = pHip.y, fY = pFoot.y;
    // Leg swing shifts foot X left/right
    var lfx = pHip.x - lw*0.7  + legSw*sc*0.45;
    var rfx = pHip.x + lw*0.3  - legSw*sc*0.45;
    var lfh = pHip.x - lw*0.7;
    var rfh = pHip.x + lw*0.3;
    // Tuck feet up when jumping
    var ftY = isJumping ? hipY + (fY-hipY)*0.45 : fY;

    ctx.fillStyle = color;
    drawLegShape(lfh, hipY, lfx, ftY, lw*0.55, lw*0.48);
    drawLegShape(rfh, hipY, rfx, ftY, lw*0.55, lw*0.48);

    // Shoes
    if (!isJumping) {
      ctx.fillStyle = '#12122a';
      ctx.beginPath(); ctx.ellipse(lfx, ftY+lw*0.18, lw*0.72, lw*0.28, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(rfx, ftY+lw*0.18, lw*0.72, lw*0.28, 0, 0, Math.PI*2); ctx.fill();
    }
  }

  // ── BODY (fat round Stumble Guys torso) ──
  if (pShld && pHip) {
    var bw = sc*0.68, bh = pShld.y - pHip.y - sc*0.02;
    var br = sc*0.14;
    ctx.fillStyle = color;
    rrect(pShld.x - bw*0.5, pHip.y, bw, -bh, br);
    // Belly highlight
    ctx.fillStyle = 'rgba(255,255,255,0.13)';
    rrect(pShld.x - bw*0.40, pHip.y - bh*0.7, bw*0.28, bh*0.42, br*0.5);
    // Chest shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    rrect(pShld.x - bw*0.22, pHip.y - bh*0.82, bw*0.44, bh*0.50, br*0.4);
  }

  // ── ARMS (stubby, animated swing) ──
  if (pShld) {
    var aw = sc*0.20, ah = sc*0.50;
    ctx.fillStyle = color; ctx.globalAlpha = 0.92;
    // Left arm swings forward when right leg goes back
    var laY = pShld.y + armSw*sc*0.38;
    var raY = pShld.y - armSw*sc*0.38;
    rrect(pShld.x - sc*0.56, laY, aw, ah, aw*0.5);
    rrect(pShld.x + sc*0.36, raY, aw, ah, aw*0.5);
    ctx.globalAlpha = 1;
  }

  // ── HEAD (Stumble Guys: massive round head ~45% of height) ──
  if (pHead) {
    var hr = sc * 0.46;
    ctx.shadowBlur = isMe ? 26 : 13;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(pHead.x, pHead.y, hr, 0, Math.PI*2); ctx.fill();
    // Top-left specular blob
    ctx.fillStyle = 'rgba(255,255,255,0.20)';
    ctx.beginPath(); ctx.arc(pHead.x-hr*0.28, pHead.y-hr*0.30, hr*0.42, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // Eye whites — big oval (Stumble Guys style)
    var er = hr*0.185;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.ellipse(pHead.x-hr*0.30, pHead.y-hr*0.06, er*1.25, er*1.55, -0.12, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(pHead.x+hr*0.30, pHead.y-hr*0.06, er*1.25, er*1.55,  0.12, 0, Math.PI*2); ctx.fill();

    // Irises (colored ring)
    ctx.fillStyle = color === '#00f5ff' ? '#006080' : '#333';
    ctx.beginPath(); ctx.arc(pHead.x-hr*0.28, pHead.y-hr*0.05, er*0.90, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(pHead.x+hr*0.32, pHead.y-hr*0.05, er*0.90, 0, Math.PI*2); ctx.fill();

    // Pupils
    ctx.fillStyle = '#050510';
    ctx.beginPath(); ctx.arc(pHead.x-hr*0.27, pHead.y-hr*0.04, er*0.60, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(pHead.x+hr*0.33, pHead.y-hr*0.04, er*0.60, 0, Math.PI*2); ctx.fill();

    // Eye shine (two dots per eye)
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(pHead.x-hr*0.21, pHead.y-hr*0.13, er*0.30, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(pHead.x-hr*0.34, pHead.y-hr*0.01, er*0.16, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(pHead.x+hr*0.39, pHead.y-hr*0.13, er*0.30, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(pHead.x+hr*0.26, pHead.y-hr*0.01, er*0.16, 0, Math.PI*2); ctx.fill();

    // Smile (wide Stumble Guys grin)
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.lineWidth = hr*0.10; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(pHead.x, pHead.y+hr*0.20, hr*0.28, 0.22, Math.PI-0.22); ctx.stroke();

    // Cheek blushes
    ctx.fillStyle = 'rgba(255,120,120,0.28)';
    ctx.beginPath(); ctx.ellipse(pHead.x-hr*0.50, pHead.y+hr*0.10, er*0.80, er*0.45, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(pHead.x+hr*0.50, pHead.y+hr*0.10, er*0.80, er*0.45, 0, 0, Math.PI*2); ctx.fill();
  }

  // Glow ring (self)
  if (isMe && pFoot) {
    ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.globalAlpha=0.40; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.ellipse(pFoot.x,pFoot.y,sc*0.68,sc*0.26,0,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();

  // Name tag
  if (pTop) {
    var fs = Math.max(10, Math.min(18, sc*0.34));
    ctx.save();
    ctx.font='bold '+fs+'px Exo\\ 2, sans-serif';
    ctx.textAlign='center'; ctx.shadowBlur=7; ctx.shadowColor=color;
    ctx.fillStyle = isMe ? '#fff' : 'rgba(255,255,255,0.85)';
    ctx.fillText(name, pTop.x, pTop.y - sc*0.06);
    ctx.restore();
  }
}

// ── PHYSICS ───────────────────────────────────────────────────────────────
function updatePlayer(dt) {
  if (myDead) return;  // dead players don't move (spectate only)
  var dx = 0, dz = 0;
  if (joyActive) { dx = joyDX; dz = joyDZ; }
  else {
    if (keys['w']||keys['W']||keys['ArrowUp'])    dz =  1;
    if (keys['s']||keys['S']||keys['ArrowDown'])  dz = -1;
    if (keys['a']||keys['A']||keys['ArrowLeft'])  dx = -1;
    if (keys['d']||keys['D']||keys['ArrowRight']) dx =  1;
    var len = Math.sqrt(dx*dx+dz*dz);
    if (len > 0.01) { dx/=len; dz/=len; }
  }
  myIsMoving = (Math.abs(dx) > 0.05 || Math.abs(dz) > 0.05);
  if (myIsMoving) {
    var cy = Math.cos(camYaw), sy = Math.sin(camYaw);
    var wx = -dx*cy + dz*sy;
    var wz =  dx*sy + dz*cy;
    var curSpeed = (activeAbility && activeAbility.type === 'speed') ? WALK_SPEED * 2 : WALK_SPEED;
    var nx = myX + wx*curSpeed*dt;
    var nz = myZ + wz*curSpeed*dt;
    var d = Math.sqrt(nx*nx+nz*nz);
    if (d > ARENA_R-0.8) { nx=nx/d*(ARENA_R-0.8); nz=nz/d*(ARENA_R-0.8); }
    myX=nx; myZ=nz;
    myYaw = Math.atan2(wx, wz);
    myWalkPhase += 5.5 * dt;
  }
  myVY -= GRAVITY*dt;
  myY  += myVY*dt;
  if (myY < 0) { myY=0; myVY=0; }
}

function doJump() { if (myY <= 0.05) myVY = JUMP_V; }

function checkHit() {
  if (adminInvincible) return false;
  if (activeAbility && (activeAbility.type === 'unsterblich' || activeAbility.type === 'nolaser')) return false;
  if (myY > 1.3) return false;
  for (var i = 0; i < lasers.length; i++) {
    var L    = lasers[i];
    var a    = L.ang;
    // Signed distance from player to line: x*sin(a) - z*cos(a) = offset
    var dist = myX * Math.sin(a) - myZ * Math.cos(a) - (L.offset || 0);
    if (Math.abs(dist) < 0.65) return true;
  }
  return false;
}

// ── LASERS ────────────────────────────────────────────────────────────────
// type:'rot'   – rotates around center
// type:'sweep' – fixed angle, offset sweeps edge-to-edge
function addLaser() {
  var idx    = lasers.length;
  var r      = ARENA_R - 0.5;
  var rotSpd = 0.42 + soloWave * 0.09;
  var swpSpd = 4    + soloWave * 1.0;
  var t0     = soloTime; // game-clock offset when this laser enters play
  if (idx % 3 === 0) {
    var ang0 = (idx * 1.3 + 0.5) % Math.PI;
    lasers.push({
      type: 'rot', ang0: ang0, ang: ang0, t0: t0,
      speed: rotSpd * (idx % 2 === 0 ? 1 : -1) * (0.85 + rng()*0.3),
      color: COLORS[idx % COLORS.length]
    });
  } else {
    var ang = (idx / (idx + 3)) * Math.PI;
    var dir = (idx % 2 === 0) ? 1 : -1;
    var spd = swpSpd * dir * (0.8 + rng()*0.4);
    lasers.push({
      type: 'sweep', ang: ang, t0: t0,
      offset: -dir * r,       // initial offset (sweepPos(0) matches this)
      speed: spd,
      color: COLORS[idx % COLORS.length]
    });
  }
}

function buildLasers(count) {
  lasers = [];
  for (var i = 0; i < count; i++) addLaser();
}

function updateLasers() {
  // Time-based positions: computed from absolute soloTime so all clients
  // with the same laser parameters stay perfectly in sync regardless of framerate.
  var t = soloTime;
  var r = ARENA_R - 0.5;
  for (var i = 0; i < lasers.length; i++) {
    var L = lasers[i];
    var et = t - L.t0; // elapsed time since this laser entered play
    if (L.type === 'rot') {
      L.ang = L.ang0 + L.speed * et;
    } else {
      L.offset = sweepPos(et, r, L.speed);
    }
  }
}

// ── PEER INTERPOLATION ────────────────────────────────────────────────────
function lerpPeers(dt) {
  var f = Math.min(1, dt * 25);
  for (var id in peers) {
    var p = peers[id];
    // Guard: if position is missing/NaN (peer known only from join, no pos yet), skip
    if (typeof p.tx !== 'number') continue;
    if (typeof p.x !== 'number' || isNaN(p.x)) { p.x=p.tx; p.y=p.ty; p.z=p.tz; }
    p.x = p.x + (p.tx - p.x) * f;
    p.y = p.y + (p.ty - p.y) * f;
    p.z = p.z + (p.tz - p.z) * f;
  }
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  var dt = Math.min((ts-lastTS)/1000, 0.05);
  lastTS = ts;
  if (gameState === 'solo' || gameState === 'multi') {
    updatePlayer(dt);
    soloTime = (ts - soloStart)/1000; // always advance time so lasers keep moving for spectators
    updateLasers();
    if (!myDead && jumpHeld && myY <= 0.05) doJump();
    lerpPeers(dt);
    if (gameState === 'multi' && isHost && ts - lastStaleCheckTS > 3000) {
      lastStaleCheckTS = ts;
      checkStalePeers();
    }
    updateCam();
    if (soloAlive) {
      if (activeAbility && performance.now() > activeAbility.endTime) {
        activeAbility = null;
        updateAbilityBtn();
      }
      updateHUD();
      var playTime = soloTime - soloGrace;
      if (playTime > 0 && playTime >= nextWaveSec) {
        soloWave++; nextWaveSec += 10; addLaser();
      }
      if (soloTime > soloGrace && checkHit()) {
        soloAlive = false;
        if (gameState === 'solo') { endSolo(); return; }
        else {
          // Multi death: stay on game screen and spectate
          myDead = true;
          // Immediately send final position so survivor still sees us
          syncPos(); lastSyncTime = ts;
          if (roomCh) roomCh.send({type:'broadcast',event:'dead',payload:{id:myId}});
          // Hide in-game action buttons (dead players can't jump/use abilities)
          var jbEl=document.getElementById('jumpBtn'); if(jbEl) jbEl.style.display='none';
          var abEl=document.getElementById('abilityBtn'); if(abEl) abEl.style.display='none';
          // Show leave button and start spectating
          var eb = document.getElementById('elimBanner');
          if (eb) eb.style.display = 'flex';
          beginSpectating();
          if (isHost) checkRoundWin(); // non-hosts wait for roundEnd event from host
        }
      }
    }
    render(ts/1000);
    if (gameState === 'multi') {
      // Alive: 20/s   Dead: 1/2s keepalive so channel stays live + survivor keeps seeing body
      var interval = myDead ? 2000 : 50;
      if (ts - lastSyncTime > interval) { syncPos(); lastSyncTime = ts; }
    }
  }
}

// ── SOLO MODE ─────────────────────────────────────────────────────────────
function startSolo() {
  myX=4; myZ=8; myY=0; myVY=0; myYaw=Math.PI;
  camYaw = Math.PI; camPitch = 0.54;
  var hd = Math.cos(camPitch)*CAM_DIST;
  camX = myX - Math.sin(camYaw)*hd;
  camZ = myZ - Math.cos(camYaw)*hd;
  camY = myY + 1.0 + Math.sin(camPitch)*CAM_DIST;
  buildCamMatrix();
  soloWave=1; soloAlive=true; nextWaveSec=10; myDead=false;
  activeAbility=null; spectatingId=null;
  watchX=myX; watchY=myY; watchZ=myZ;
  var sb=document.getElementById('spectateBar'); if(sb) sb.style.display='none';
  soloStart = performance.now();
  buildLasers(2);
  gameState='solo';
  updateAbilityBtn();
  showScreen('sGame');
}

function endSolo() {
  var coins = Math.floor(soloTime*0.5) + (soloWave-1)*5;
  progress.xp += Math.floor(soloTime*2);
  progress.coins += coins;
  if (soloWave > progress.bestWave) progress.bestWave = soloWave;
  var needed = progress.level*100;
  while (progress.xp >= needed) { progress.level++; progress.xp-=needed; needed=progress.level*100; }
  saveLocal(); renderProfile(); renderAbilityShop();
  document.getElementById('rsWave').textContent = soloWave;
  document.getElementById('rsSurv').textContent = soloTime.toFixed(1)+'s';
  document.getElementById('rsCoins').textContent = '+'+coins+' ☀️';
  showScreen('sResult');
}

function updateHUD() {
  var w = document.getElementById('hudWave');
  var t = document.getElementById('hudTime');
  var hr = document.getElementById('hudRound');
  if (w) w.textContent = 'W'+soloWave+' ('+lasers.length+' Laser)';
  if (t) {
    if (soloTime < soloGrace) {
      var left = Math.ceil(soloGrace - soloTime);
      t.textContent = left > 0 ? left+'...' : 'GO!';
    } else {
      var pt = soloTime - soloGrace;
      var till = Math.ceil(nextWaveSec - pt);
      t.textContent = pt.toFixed(1)+'s  +Laser:'+till+'s';
    }
  }
  if (hr && gameState === 'multi') hr.textContent = 'R'+roundNum+'/'+totalRounds+'  ⭐'+myWins;
}

// ── MULTIPLAYER ───────────────────────────────────────────────────────────
function toggleMulti() {
  var el = document.getElementById('multibtns');
  if (el) el.classList.toggle('show');
  if (!sb) document.getElementById('menuErr').textContent = 'Multiplayer verbindet...';
}
function createRoom() {
  if (!sb) { document.getElementById('menuErr').textContent = 'Warte kurz...'; return; }
  var code = Math.random().toString(36).substr(2,4).toUpperCase();
  peers = {}; myWins = 0; roundNum = 1;
  myRoom=code; myId=progress.name+'_'+Date.now(); isHost=true;
  totalRounds=5; setRounds(5);
  document.getElementById('codeVal').textContent = code;
  document.getElementById('plistHost').innerHTML = '<div class="pslot filled">'+progress.name+' (DU)</div>';
  document.getElementById('roundPicker').style.display = 'block';
  document.getElementById('roundInfo').style.display = 'none';
  document.getElementById('startBtn').style.display = '';
  showScreen('sLobby'); joinChannel();
}
function joinRoom() {
  if (!sb) { document.getElementById('menuErr').textContent = 'Warte kurz...'; return; }
  var code = (document.getElementById('joinInput').value||'').trim().toUpperCase();
  if (code.length < 3) return;
  peers = {}; myWins = 0; roundNum = 1;
  myRoom=code; myId=progress.name+'_'+Date.now(); isHost=false;
  document.getElementById('codeVal').textContent = code;
  document.getElementById('plistHost').innerHTML = '';
  document.getElementById('roundPicker').style.display = 'none';
  document.getElementById('roundInfo').style.display = 'block';
  document.getElementById('roundInfo').textContent = 'Warte auf Host...';
  document.getElementById('startBtn').style.display = 'none';
  showScreen('sLobby'); joinChannel();
}
function copyCode() {
  var v = document.getElementById('codeVal').textContent;
  if (navigator.clipboard) navigator.clipboard.writeText(v);
}
function joinChannel() {
  if (roomCh) roomCh.unsubscribe();
  roomCh = sb.channel('room_'+myRoom)
    .on('broadcast',{event:'join'},function(m){
      if (m.payload.id !== myId) {
        var list = document.getElementById('plistHost');
        if (!peers[m.payload.id]) {
          // Brand-new peer: add to lobby list; re-announce only for new peers
          // (re-announcing for known peers creates an infinite storm with 3+ players)
          if (list) list.innerHTML += '<div class="pslot filled">'+m.payload.name+'</div>';
          peers[m.payload.id] = {id:m.payload.id, name:m.payload.name, wins:0};
          if (roomCh) roomCh.send({type:'broadcast',event:'join',payload:{id:myId,name:progress.name}});
        } else {
          // Already known: only refresh name — never wipe position or wins data
          peers[m.payload.id].name = m.payload.name;
        }
      }
    })
    .on('broadcast',{event:'pos'},function(m){
      if (m.payload.id === myId) return;
      var d = m.payload;
      var p = peers[d.id];
      if (p) {
        // First pos update for a join-only peer: snap render pos to avoid lerp from origin
        if (typeof p.x !== 'number' || isNaN(p.x)) { p.x=d.x; p.y=d.y; p.z=d.z; }
        p.tx=d.x; p.ty=d.y; p.tz=d.z;
        p.wp=d.wp; p.color=d.color; p.name=d.name;
        p.lastSeen = Date.now();
      } else {
        peers[d.id] = {x:d.x,y:d.y,z:d.z, tx:d.x,ty:d.y,tz:d.z,
                       wp:d.wp||0, color:d.color, name:d.name, id:d.id, lastSeen:Date.now()};
      }
    })
    .on('broadcast',{event:'dead'},function(m){
      if (peers[m.payload.id]) peers[m.payload.id].isDead = true;
      // If we're spectating the player who just died, switch to next alive
      if (myDead && spectatingId === m.payload.id) switchSpectate(1);
      // Only the host is authoritative for round-end to avoid race conditions with 3+ players
      if (isHost) checkRoundWin();
    })
    .on('broadcast',{event:'roundEnd'},function(m){
      if (isHost) return;
      if (gameState !== 'multi') return; // stale delayed event — already moved to next round
      roundEndActive = true;
      // Sync authoritative win counts from host
      if (m.payload.wins) {
        Object.keys(m.payload.wins).forEach(function(id){
          if (id === myId) { myWins = m.payload.wins[id] || 0; }
          else if (peers[id]) { peers[id].wins = m.payload.wins[id] || 0; }
        });
      }
      showRoundEnd(m.payload.winnerName, m.payload.scores);
    })
    .on('broadcast',{event:'start'},function(m){
      if (!isHost) {
        if (m.payload && m.payload.rounds) totalRounds = m.payload.rounds;
        if (m.payload && m.payload.round)  roundNum = m.payload.round;
        // Sync full player roster so all clients know all players before game starts
        if (m.payload && m.payload.players) {
          m.payload.players.forEach(function(p){
            if (p.id !== myId && !peers[p.id]) {
              peers[p.id] = {id:p.id, name:p.name, wins:p.wins||0};
            }
          });
        }
        var ri = document.getElementById('roundInfo');
        if (ri) ri.textContent = totalRounds + ' Runden';
        beginMulti(m.payload.laserSeed);
      }
    })
    .on('broadcast',{event:'hostLeft'},function(m){
      if (!isHost) {
        if (roomCh) { roomCh.unsubscribe(); roomCh=null; }
        myRoom=null; peers={}; isHost=false; gameState='menu';
        roundNum=1; myWins=0; roundEndActive=false;
        var hr=document.getElementById('hudRound'); if(hr) hr.style.display='none';
        showScreen('sMenu');
        var err=document.getElementById('menuErr');
        if(err){err.textContent='Host hat das Spiel verlassen.';setTimeout(function(){err.textContent='';},4000);}
      }
    })
    .on('broadcast',{event:'kick'},function(m){
      if (m.payload.id === myId) return;
      if (myDead) return;
      var KICK_DIST = 7;
      var dx = myX - m.payload.x;
      var dz = myZ - m.payload.z;
      var dist = Math.sqrt(dx*dx + dz*dz);
      if (dist < 0.01) { dx = 1; dz = 0; dist = 1; }
      myX = myX + (dx/dist) * KICK_DIST;
      myZ = myZ + (dz/dist) * KICK_DIST;
      var d = Math.sqrt(myX*myX + myZ*myZ);
      if (d > ARENA_R - 0.8) { myX = myX/d*(ARENA_R-0.8); myZ = myZ/d*(ARENA_R-0.8); }
      myVY = JUMP_V * 0.6; // small upward bounce
    })
    .on('broadcast',{event:'adminLaser'},function(m){
      var L = m.payload;
      if (!L || !L.type) return;
      lasers.push({type:L.type, ang0:L.ang0||L.ang, ang:L.ang, t0:L.t0, speed:L.speed, color:L.color, offset:L.offset});
    })
    .on('broadcast',{event:'adminKill'},function(m){
      if (m.payload.sender === myId) return;
      if (myDead) return;
      myDead = true;
      if (roomCh) roomCh.send({type:'broadcast', event:'dead', payload:{id:myId}});
      beginSpectating();
    })
    .on('broadcast',{event:'adminAnnounce'},function(m){
      if (m.payload && m.payload.text) showAnnouncement(m.payload.text);
    })
    .on('broadcast',{event:'adminImage'},function(m){
      if (m.payload && m.payload.url) showAdminImageLT(m.payload.username, m.payload.url);
    })
    .on('broadcast',{event:'setSunCoins'},function(m){
      if (!m.payload) return;
      var me = (localStorage.getItem('authUser')||localStorage.getItem('playerName')||'').toUpperCase();
      if (m.payload.username === me) {
        progress.coins = m.payload.amount; saveLocal(); renderProfile(); renderAbilityShop();
      }
    })
    .subscribe();
  setTimeout(function(){
    if (roomCh) roomCh.send({type:'broadcast',event:'join',payload:{id:myId,name:progress.name}});
  }, 500);
}
function setRounds(n) {
  totalRounds = n;
  [5,10,15].forEach(function(v){
    var b = document.getElementById('rb'+v);
    if (b) b.className = 'btn ' + (v===n ? 'bgreen' : 'bghost');
    if (b) b.style.cssText = 'width:64px;padding:9px 0;font-size:15px';
  });
}
function startMulti() {
  if (!isHost) return;
  roundNum = 1; myWins = 0;
  Object.keys(peers).forEach(function(id){ peers[id].wins = 0; });
  var plist = [{id:myId,name:progress.name,wins:0}].concat(
    Object.keys(peers).map(function(id){ return {id:id,name:peers[id].name,wins:0}; })
  );
  var seed = Math.floor(Math.random() * 0xFFFFFF);
  if (roomCh) roomCh.send({type:'broadcast',event:'start',payload:{rounds:totalRounds,players:plist,laserSeed:seed}});
  beginMulti(seed);
}
function beginMulti(laserSeed) {
  roundEndActive = false;
  lastStaleCheckTS = 0;
  var now = Date.now();
  Object.keys(peers).forEach(function(id){ peers[id].isDead = false; peers[id].lastSeen = now; });
  myX=(Math.random()-0.5)*8; myZ=(Math.random()-0.5)*8; myY=0; myVY=0;
  camYaw=Math.PI; camPitch=0.54; buildCamMatrix();
  soloWave=1; soloAlive=true; nextWaveSec=10;
  soloStart=performance.now(); soloTime=0; soloGrace=2.5;
  myDead=false; activeAbility=null; spectatingId=null;
  watchX=myX; watchY=myY; watchZ=myZ;
  var sb=document.getElementById('spectateBar'); if(sb) sb.style.display='none';
  // Use seeded RNG so every client builds identical laser parameters
  rng = laserSeed !== undefined ? mulberry32(laserSeed) : Math.random;
  var eb=document.getElementById('elimBanner'); if(eb) eb.style.display='none';
  var hr=document.getElementById('hudRound');
  if (hr) { hr.style.display=''; hr.textContent='R'+roundNum+'/'+totalRounds; }
  buildLasers(2); gameState='multi';
  showScreen('sGame');
}
// ── SPECTATOR ─────────────────────────────────────────────────────────────
function getAlivePeerIds() {
  return Object.keys(peers).filter(function(id){ return !peers[id].isDead; });
}
function beginSpectating() {
  var alive = getAlivePeerIds();
  spectatingId = alive.length > 0 ? alive[0] : null;
  updateSpectateBar();
}
function switchSpectate(dir) {
  var alive = getAlivePeerIds();
  if (alive.length === 0) { spectatingId = null; updateSpectateBar(); return; }
  var idx = alive.indexOf(spectatingId);
  if (idx === -1) idx = 0;
  else idx = (idx + dir + alive.length) % alive.length;
  spectatingId = alive[idx];
  updateSpectateBar();
}
function updateSpectateBar() {
  var bar  = document.getElementById('spectateBar');
  var nm   = document.getElementById('specName');
  var prev = document.getElementById('specPrev');
  var next = document.getElementById('specNext');
  if (!bar || !myDead) { if (bar) bar.style.display = 'none'; return; }
  var alive = getAlivePeerIds();
  if (alive.length === 0 || !spectatingId || !peers[spectatingId]) {
    bar.style.display = 'none'; return;
  }
  bar.style.display = 'flex';
  if (nm) nm.textContent = peers[spectatingId].name || '?';
  var showArrows = alive.length > 1;
  if (prev) prev.style.visibility = showArrows ? 'visible' : 'hidden';
  if (next) next.style.visibility = showArrows ? 'visible' : 'hidden';
}

// ── ADMIN ─────────────────────────────────────────────────────────────────
function checkAdminStatus() {
  if ((localStorage.getItem('authUser') || '').toUpperCase() !== 'ENZAE') return;
  isAdminUser = true;
  var ap = document.getElementById('adminPanel');
  if (ap) ap.style.display = 'flex';
}
function adminSpawnLaser() {
  if (!isAdminUser) return;
  if (gameState !== 'solo' && gameState !== 'multi') return;
  addLaser();
  if (gameState === 'multi' && roomCh) {
    var L = lasers[lasers.length - 1];
    roomCh.send({type:'broadcast', event:'adminLaser', payload:{
      type:L.type, ang0:L.ang0, ang:L.ang, t0:L.t0,
      speed:L.speed, color:L.color, offset:L.offset
    }});
  }
}
function adminToggleInvincible() {
  if (!isAdminUser) return;
  adminInvincible = !adminInvincible;
  var btn = document.getElementById('adminInvBtn');
  if (btn) {
    btn.style.background  = adminInvincible ? 'rgba(255,0,110,.6)'  : 'rgba(255,0,110,.15)';
    btn.style.color        = adminInvincible ? '#fff'               : '#ff006e';
  }
}
function adminKillAll() {
  if (!isAdminUser) return;
  if (gameState !== 'multi' || !roomCh) return;
  roomCh.send({type:'broadcast', event:'adminKill', payload:{sender:myId}});
  Object.keys(peers).forEach(function(id){ peers[id].isDead = true; });
  if (isHost) checkRoundWin();
}

var _announceTimer = null;
function showAnnouncement(text) {

function adminSendAnnounce() {

  // Broadcast globally to everyone on the portal/other pages

function ltAdminSetCoins() {
  if (!isAdminUser) return;
  var username = (document.getElementById('ltAdminCoinUser').value || '').trim().toUpperCase();
  var amount   = parseInt(document.getElementById('ltAdminCoinAmt').value);
  var msgEl    = document.getElementById('ltAdminCoinMsg');
  msgEl.style.color = '#ffd700'; msgEl.textContent = '';
  if (!username) { msgEl.style.color='#ff4444'; msgEl.textContent='Username?'; return; }
  if (isNaN(amount) || amount < 0) { msgEl.style.color='#ff4444'; msgEl.textContent='Betrag?'; return; }
  var payload = {username: username, amount: amount};
  // Apply locally if it's our own account
  if ((localStorage.getItem('authUser')||'').toUpperCase() === username) {
    progress.coins = amount; saveLocal(); renderProfile(); renderAbilityShop();
  }
  // Broadcast to all connected clients
  if (globalCh) globalCh.send({type:'broadcast', event:'setSunCoins', payload: payload});
  if (gameState === 'multi' && roomCh) roomCh.send({type:'broadcast', event:'setSunCoins', payload: payload});
  msgEl.textContent = '✓ '+username+' = '+amount+' ☀️';
}

function checkStalePeers() {
  if (!isHost || gameState !== 'multi') return;
  var now = Date.now();
  var changed = false;
  Object.keys(peers).forEach(function(id) {
    if (!peers[id].isDead && peers[id].lastSeen && now - peers[id].lastSeen > 5000) {
      peers[id].isDead = true;
      changed = true;
    }
  });
  if (changed) checkRoundWin();
}
function checkRoundWin() {
  // Only the host runs this — sole authority for round-end (fixes 3+ player race conditions)
  if (!isHost || gameState !== 'multi' || roundEndActive) return;
  var alivePeers = Object.keys(peers).filter(function(id){ return !peers[id].isDead; });
  var aliveCount = (!myDead ? 1 : 0) + alivePeers.length;
  if (aliveCount > 1) return;
  roundEndActive = true;
  var winnerName = null;
  var winsMap = {};
  if (!myDead) {
    winnerName = progress.name; myWins++;
  } else if (alivePeers.length === 1) {
    winnerName = peers[alivePeers[0]].name;
    peers[alivePeers[0]].wins = (peers[alivePeers[0]].wins||0) + 1;
  }
  winsMap[myId] = myWins;
  var scores = [{name:progress.name, wins:myWins}];
  Object.keys(peers).forEach(function(id){
    winsMap[id] = peers[id].wins||0;
    scores.push({name:peers[id].name, wins:peers[id].wins||0});
  });
  scores.sort(function(a,b){ return b.wins-a.wins; });
  // Broadcast authoritative round-end to all non-host players
  if (roomCh) roomCh.send({type:'broadcast',event:'roundEnd',payload:{winnerName:winnerName,scores:scores,wins:winsMap}});
  showRoundEnd(winnerName, scores);
}
function showRoundEnd(winnerName, scores) {
  gameState = 'roundEnd';
  spectatingId = null;
  var sb=document.getElementById('spectateBar'); if(sb) sb.style.display='none';
  var reR = document.getElementById('reRound');
  var reW = document.getElementById('reWinner');
  var reS = document.getElementById('reScores');
  var reC = document.getElementById('reCountdown');
  if (reR) reR.textContent = 'RUNDE ' + roundNum + ' / ' + totalRounds;
  if (reW) reW.textContent = winnerName ? winnerName + ' GEWINNT!' : 'UNENTSCHIEDEN';
  if (!scores) {
    scores = [{name:progress.name, wins:myWins}];
    Object.keys(peers).forEach(function(id){ scores.push({name:peers[id].name, wins:peers[id].wins||0}); });
    scores.sort(function(a,b){ return b.wins-a.wins; });
  }
  if (reS) reS.innerHTML = scores.map(function(s){ return s.name+': '+s.wins+' Pkt'; }).join('<br>');
  showScreen('sRoundEnd');
  var isLast = roundNum >= totalRounds;
  var cnt = 5;
  if (reC) reC.textContent = isLast ? cnt : 'Nächste Runde in: '+cnt;
  var iv = setInterval(function(){
    cnt--;
    if (reC) reC.textContent = isLast ? cnt : 'Nächste Runde in: '+cnt;
    if (cnt <= 0) {
      clearInterval(iv);
      if (gameState !== 'roundEnd') return; // start event arrived early, already in new round
      if (isLast) {
        showFinalResult(scores);
      } else {
        roundNum++;
        if (isHost) startMultiRound();
      }
    }
  }, 1000);
}
function startMultiRound() {
  if (!isHost) return;
  var plist = [{id:myId,name:progress.name,wins:myWins}].concat(
    Object.keys(peers).map(function(id){ return {id:id,name:peers[id].name,wins:peers[id].wins||0}; })
  );
  var seed = Math.floor(Math.random() * 0xFFFFFF);
  if (roomCh) roomCh.send({type:'broadcast',event:'start',payload:{rounds:totalRounds,round:roundNum,players:plist,laserSeed:seed}});
  beginMulti(seed);
}
function showFinalResult(scores) {
  var reR = document.getElementById('reRound');
  var reW = document.getElementById('reWinner');
  var reC = document.getElementById('reCountdown');
  if (reR) reR.textContent = 'SPIEL BEENDET';
  if (reW) reW.textContent = scores[0] ? '🏆 ' + scores[0].name : '';
  if (reC) reC.innerHTML = '<button class="btn bghost" onclick="leaveRoom()" style="font-size:14px;padding:12px 28px">← VERLASSEN</button>';
  gameState = 'menu';
}
function syncPos() {
  if (roomCh) roomCh.send({type:'broadcast',event:'pos',payload:{
    id:myId, x:myX, y:myY, z:myZ, color:getSkinColor(), name:progress.name,
    wp:myWalkPhase
  }});
}
function leaveRoom() {
  spectatingId = null;
  var sb=document.getElementById('spectateBar'); if(sb) sb.style.display='none';
  if (roomCh) {
    if ((gameState === 'multi' || gameState === 'roundEnd') && !myDead && soloAlive) {
      // Leaving while alive — notify host so round can progress
      roomCh.send({type:'broadcast', event:'dead', payload:{id:myId}});
    }
    if (isHost) {
      // Tell everyone host left so they return to menu instead of hanging
      roomCh.send({type:'broadcast', event:'hostLeft', payload:{id:myId}});
    }
    roomCh.unsubscribe(); roomCh=null;
  }
  myRoom=null; peers={}; isHost=false; gameState='menu';
  roundNum=1; myWins=0; roundEndActive=false;
  var hr=document.getElementById('hudRound'); if(hr) hr.style.display='none';
  showScreen('sMenu');
}

// ── SCREENS ───────────────────────────────────────────────────────────────
function showScreen(id) {
  var all = document.querySelectorAll('.screen');
  for (var i=0; i<all.length; i++) all[i].classList.add('off');
  var el = document.getElementById(id);
  if (el) el.classList.remove('off');

// ── PROFILE ───────────────────────────────────────────────────────────────
function loadLocal() {
  var n = localStorage.getItem('playerName') || localStorage.getItem('lt_name');
  if (n) progress.name = n;
  progress.level    = parseInt(localStorage.getItem('lt_level')    || '1') || 1;

function saveLocal() {
  localStorage.setItem('playerName',  progress.name);
  localStorage.setItem('lt_level',    progress.level);
  localStorage.setItem('lt_xp',       progress.xp);
  localStorage.setItem('lt_coins',    progress.coins);

function renderProfile() {
  var n = document.getElementById('pName');   if (n) n.textContent = progress.name;
  var l = document.getElementById('pLvl');    if (l) l.textContent = progress.level;
  var x = document.getElementById('pXp');     if (x) x.textContent = progress.xp;
  var c = document.getElementById('pCoins');  if (c) c.textContent = progress.coins;

}
function changeName() {
  var inp = document.getElementById('nameInp');
  if (!inp) return;
  var n = inp.value.trim().toUpperCase();
  if (n.length < 1) return;
  progress.name=n; saveLocal(); renderProfile(); inp.value='';
}

// ── INPUT ─────────────────────────────────────────────────────────────────
function setupInput() {
  document.addEventListener('keydown', function(e){ keys[e.key]=true; });
  document.addEventListener('keyup',   function(e){ keys[e.key]=false; });
  canvas.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  // Mouse camera drag (desktop) — right-click drag for yaw + pitch
  var drag=false, lastMX=0, lastMY=0;
  canvas.addEventListener('mousedown',  function(e){ if(e.button===2){drag=true;lastMX=e.clientX;lastMY=e.clientY;} });
  window.addEventListener('mousemove',  function(e){
    if(!drag) return;
    camYaw   -= (e.clientX-lastMX)*0.005;
    camPitch += (e.clientY-lastMY)*0.005;
    camPitch  = Math.max(0.05, Math.min(1.45, camPitch));
    lastMX=e.clientX; lastMY=e.clientY;
    buildCamMatrix();
  });
  window.addEventListener('mouseup',    function(e){ if(e.button===2)drag=false; });

  // Joystick (left side)
  var jz = document.getElementById('joyZone');
  var jb = document.getElementById('joyBase');
  var jk = document.getElementById('joyKnob');
  var ox=0, oy=0, tid=null, MAX=45;
  jz.addEventListener('touchstart', function(e){
    e.preventDefault();
    var t=e.changedTouches[0]; tid=t.identifier; ox=t.clientX; oy=t.clientY;
    jb.style.left=(ox-45)+'px'; jb.style.top=(oy-45)+'px'; jb.style.display='block';
    joyActive=true;
  },{passive:false});
  jz.addEventListener('touchmove', function(e){
    e.preventDefault();
    for(var i=0;i<e.changedTouches.length;i++){
      var t=e.changedTouches[i];
      if(t.identifier!==tid) continue;
      var dx=t.clientX-ox, dy=t.clientY-oy;
      var len=Math.sqrt(dx*dx+dy*dy);
      if(len>MAX){dx=dx/len*MAX;dy=dy/len*MAX;}
      jk.style.left=(22+dx)+'px'; jk.style.top=(22+dy)+'px';
      joyDX=dx/MAX; joyDZ=-dy/MAX;
    }
  },{passive:false});
  function endJoy(){
    jb.style.display='none'; jk.style.left='22px'; jk.style.top='22px';
    joyActive=false; joyDX=0; joyDZ=0; tid=null;
  }
  jz.addEventListener('touchend',   function(e){e.preventDefault();endJoy();},{passive:false});
  jz.addEventListener('touchcancel',function(e){e.preventDefault();endJoy();},{passive:false});

  // Jump button — tap or hold for continuous jumping
  var jBtn = document.getElementById('jumpBtn');
  jBtn.addEventListener('touchstart', function(e){ e.preventDefault(); jumpHeld=true; doJump(); },{passive:false});
  jBtn.addEventListener('touchend',   function(e){ e.preventDefault(); jumpHeld=false; },{passive:false});
  jBtn.addEventListener('touchcancel',function(){ jumpHeld=false; });
  jBtn.addEventListener('mousedown',  function(){ jumpHeld=true; doJump(); });
  window.addEventListener('mouseup',  function(){ jumpHeld=false; });

  // Camera: simple finger swipe on right half of screen
  canvas.addEventListener('touchstart', function(e){
    if (gameState !== 'solo' && gameState !== 'multi') return;
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (t.clientX > W * 0.50 && camTouchId === null) {
        camTouchId    = t.identifier;
        camTouchLastX = t.clientX;
        camTouchLastY = t.clientY;
      }
    }
  }, {passive: true});
  canvas.addEventListener('touchmove', function(e){
    if (camTouchId === null) return;
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (t.identifier !== camTouchId) continue;
      camYaw   -= (t.clientX - camTouchLastX) * 0.008;
      camPitch += (t.clientY - camTouchLastY) * 0.008;
      camPitch  = Math.max(0.05, Math.min(1.45, camPitch));
      camTouchLastX = t.clientX;
      camTouchLastY = t.clientY;
      buildCamMatrix();
      break;
    }
  }, {passive: true});
  function endCam(e) {
    for (var i = 0; i < e.changedTouches.length; i++) {
      if (e.changedTouches[i].identifier === camTouchId) { camTouchId = null; break; }
    }
  }
  canvas.addEventListener('touchend',    endCam, {passive: true});
  canvas.addEventListener('touchcancel', endCam, {passive: true});
}

window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('soloBtn').addEventListener('click',    startSolo);
  document.getElementById('multiBtn').addEventListener('click',   toggleMulti);
  document.getElementById('createBtn').addEventListener('click',  createRoom);
  document.getElementById('joinShowBtn').addEventListener('click',function(){ document.getElementById('joinRow').classList.add('show'); });
  document.getElementById('joinBtn').addEventListener('click',    joinRoom);
  document.getElementById('nameBtn').addEventListener('click',    changeName);
  document.getElementById('nameInp').addEventListener('keydown',  function(e){ if(e.key==='Enter') changeName(); });
  document.getElementById('startBtn').addEventListener('click',   startMulti);
  document.getElementById('leaveBtn').addEventListener('click',   leaveRoom);
  document.getElementById('retryBtn').addEventListener('click',   startSolo);
  document.getElementById('menuBtn').addEventListener('click',    function(){ gameState='menu'; showScreen('sMenu'); });
  document.getElementById('elimLeaveBtn').addEventListener('click', leaveRoom);

  loadLocal(); renderProfile();
  loadAbilities(); renderAbilityShop(); updateAbilityBtn();
  checkAdminStatus();

  canvas = document.getElementById('c');
  ctx = canvas.getContext('2d');
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  window.addEventListener('resize', function(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; });

  var hd0 = Math.cos(camPitch)*CAM_DIST;
  camX = myX - Math.sin(camYaw)*hd0;
  camZ = myZ - Math.cos(camYaw)*hd0;
  camY = myY + 1.0 + Math.sin(camPitch)*CAM_DIST;
  buildCamMatrix();

  setupInput();
  showScreen('sMenu');
  requestAnimationFrame(loop);

  setTimeout(function(){
    try {
      if (typeof supabase !== 'undefined') {
        sb = supabase.createClient(SUPA_URL, SUPA_KEY);
        globalCh = sb.channel('portal-global')
          .on('broadcast', {event:'adminAnnounce'}, function(m) {
            if (m.payload && m.payload.text) showAnnouncement(m.payload.text);
          })
          .on('broadcast', {event:'adminImage'}, function(m) {
            if (m.payload && m.payload.url) showAdminImageLT(m.payload.username, m.payload.url);
          })
          .on('broadcast', {event:'setSunCoins'}, function(m) {
            if (!m.payload) return;
            var me = (localStorage.getItem('authUser')||localStorage.getItem('playerName')||'').toUpperCase();
            if (m.payload.username === me) {
              progress.coins = m.payload.amount; saveLocal(); renderProfile(); renderAbilityShop();
            }
          })
          .subscribe();
      }
    } catch(e) {}
  }, 300);
});
