<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LASER TRACER 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;height:100dvh;overflow:hidden;background:#050510;font-family:'Exo 2',sans-serif;color:#fff}
  #c{display:block;width:100%;height:100%;touch-action:none}

  /* HUD */
  #hud{position:fixed;top:12px;left:0;right:0;display:flex;justify-content:space-between;padding:0 14px;z-index:20;pointer-events:none}
  .hud-p{background:rgba(5,5,16,0.85);border:1px solid rgba(0,245,255,0.3);border-radius:10px;padding:6px 12px;backdrop-filter:blur(8px)}
  .hud-big{font-family:'Russo One',sans-serif;font-size:26px;color:#00f5ff;line-height:1;filter:drop-shadow(0 0 8px #00f5ff)}
  .hud-sm{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;text-align:center}
  .hud-alive{font-family:'Russo One',sans-serif;font-size:18px;color:#39ff14}
  .hud-wave{font-family:'Russo One',sans-serif;font-size:18px;color:#ff006e}

  /* Screens */
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:50;overflow-y:auto;padding:24px 16px 40px}
  .screen.hidden{display:none}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.04) 1px,transparent 1px);background-size:40px 40px;animation:grid 20s linear infinite;pointer-events:none;z-index:1}
  @keyframes grid{0%{background-position:0 0}100%{background-position:40px 40px}}
  .screen{background:rgba(5,5,16,0.95);z-index:52}
  .game-title{font-family:'Russo One',sans-serif;font-size:clamp(36px,10vw,80px);background:linear-gradient(90deg,#00f5ff,#ff006e,#ffff00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px #00f5ff);animation:tp 3s ease-in-out infinite;text-align:center;letter-spacing:3px}
  @keyframes tp{0%,100%{filter:drop-shadow(0 0 20px #00f5ff)}50%{filter:drop-shadow(0 0 50px #ff006e)}}
  .sub{color:rgba(255,255,255,0.4);letter-spacing:5px;font-size:12px;text-transform:uppercase;margin-top:-10px}
  .sep{width:60px;height:2px;background:linear-gradient(90deg,transparent,#00f5ff,transparent)}
  .btn{font-family:'Russo One',sans-serif;font-size:15px;letter-spacing:1.5px;padding:14px 28px;border:none;border-radius:8px;cursor:pointer;transition:transform 0.15s;text-transform:uppercase;touch-action:manipulation;width:min(300px,90vw)}
  .btn:active{transform:scale(0.96)}
  .btn-cyan{background:linear-gradient(135deg,#007a8a,#00c4d4);color:#050510;box-shadow:0 0 20px rgba(0,245,255,0.4)}
  .btn-green{background:linear-gradient(135deg,#1a8a1a,#39ff14);color:#050510;box-shadow:0 0 20px rgba(57,255,20,0.4)}
  .btn-ghost{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}
  .btn-gold{background:linear-gradient(135deg,#b8860b,#ffd700);color:#000;box-shadow:0 0 20px rgba(255,215,0,0.4)}
  .err{color:#ff006e;font-size:13px;text-align:center;min-height:18px;letter-spacing:1px}

  /* Profile card in menu */
  .profile-card{background:rgba(10,10,31,0.9);border:2px solid rgba(0,245,255,0.3);border-radius:16px;padding:14px 18px;width:min(340px,92vw);display:flex;align-items:center;gap:12px;box-shadow:0 0 30px rgba(0,245,255,0.08)}
  .p-av-wrap{position:relative;flex-shrink:0}
  .p-av{width:48px;height:48px}
  .lvl-badge{position:absolute;bottom:-4px;right:-4px;background:#ffd700;color:#000;font-weight:900;font-size:10px;border-radius:8px;padding:1px 5px;font-family:'Russo One',sans-serif;box-shadow:0 0 8px #ffd700}
  .p-info{flex:1;min-width:0}
  .p-name{font-weight:900;font-size:16px;color:#00f5ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .xp-bg{background:rgba(15,15,42,1);height:7px;border-radius:5px;margin-top:5px;overflow:hidden;border:1px solid rgba(255,255,255,0.08)}
  .xp-fill{height:100%;background:linear-gradient(90deg,#00f5ff,#39ff14);border-radius:5px;box-shadow:0 0 6px #39ff14;transition:width 0.6s}
  .xp-txt{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;letter-spacing:1px}
  .coins-disp{display:flex;align-items:center;gap:4px;font-family:'Russo One',sans-serif;color:#ffd700;font-size:14px;background:rgba(15,15,42,1);padding:5px 10px;border-radius:20px;border:1px solid rgba(255,215,0,0.3)}

  /* Lobby */
  .lobby-box{background:rgba(10,10,31,0.95);border:2px solid rgba(0,245,255,0.3);border-radius:16px;padding:22px;width:min(460px,95vw);box-shadow:0 0 40px rgba(0,245,255,0.1)}
  .lobby-title{font-family:'Russo One',sans-serif;font-size:20px;color:#00f5ff;text-align:center;letter-spacing:3px;margin-bottom:14px}
  .code-box{background:rgba(15,15,42,1);border:2px dashed #ffff00;border-radius:10px;padding:10px;text-align:center;margin-bottom:12px;cursor:pointer}
  .code-big{font-family:'Russo One',sans-serif;font-size:30px;color:#ffff00;letter-spacing:8px;filter:drop-shadow(0 0 8px #ffff00)}
  .code-lbl{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:3px;text-transform:uppercase}
  .plist{display:grid;grid-template-columns:1fr 1fr;gap:8px;min-height:110px;margin-bottom:12px}
  .pslot{background:rgba(15,15,42,1);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:9px;display:flex;align-items:center;gap:7px;min-height:50px}
  .pslot.filled{border-color:rgba(0,245,255,0.3);background:rgba(0,245,255,0.05)}
  .pslot.me{border-color:#00f5ff;box-shadow:0 0 10px rgba(0,245,255,0.2)}
  .pslot-av{width:28px;height:28px;flex-shrink:0}
  .pslot-info{flex:1;min-width:0}
  .pslot-name{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pslot-lvl{font-size:9px;color:#39ff14}
  .slot-empty{color:rgba(255,255,255,0.2);font-size:11px;letter-spacing:2px}
  .lobby-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .lobby-hint{font-size:11px;color:rgba(255,255,255,0.4);text-align:center;margin-top:6px;letter-spacing:1px}

  /* Result overlay */
  #resultScreen .res-title{font-family:'Russo One',sans-serif;font-size:clamp(28px,8vw,60px);letter-spacing:3px;text-align:center}
  .res-title.win{background:linear-gradient(90deg,#39ff14,#00f5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px #39ff14)}
  .res-title.lose{background:linear-gradient(90deg,#ff006e,#ff6600);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px #ff006e)}
  .reward-box{background:rgba(10,10,31,0.9);border:2px solid #ffd700;border-radius:14px;padding:14px 22px;display:flex;gap:22px}
  .rew-val{font-family:'Russo One',sans-serif;font-size:22px;text-align:center}
  .rew-xp{color:#00f5ff} .rew-coin{color:#ffd700}
  .rew-lbl{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase}
  .lvlup{background:linear-gradient(90deg,#ffd700,#ffff00);color:#000;font-family:'Russo One',sans-serif;padding:7px 18px;border-radius:20px;letter-spacing:2px;box-shadow:0 0 25px #ffd700;animation:lp 0.6s}
  @keyframes lp{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}

  /* countdown */
  #cdOverlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:60;pointer-events:none}
  .cd-num{font-family:'Russo One',sans-serif;font-size:clamp(120px,30vw,200px);color:#00f5ff;filter:drop-shadow(0 0 60px #00f5ff);animation:cp 0.6s ease-out}
  @keyframes cp{0%{transform:scale(1.5);opacity:0}50%{transform:scale(0.95);opacity:1}100%{transform:scale(1)}}

  /* Wave banner */
  #waveBanner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Russo One',sans-serif;font-size:clamp(36px,10vw,64px);color:#ff006e;filter:drop-shadow(0 0 30px #ff006e);z-index:55;opacity:0;pointer-events:none}
  #waveBanner.show{animation:wf 1.6s ease-out forwards}
  @keyframes wf{0%{opacity:0;transform:translate(-50%,-50%) scale(1.4)}30%{opacity:1;transform:translate(-50%,-50%) scale(1)}70%{opacity:1}100%{opacity:0}}

  /* MOBILE CONTROLS */
  #joystick{position:fixed;bottom:24px;left:24px;width:120px;height:120px;z-index:30;touch-action:none;display:none}
  #joystick.show{display:block}
  .joy-base{position:absolute;inset:0;border-radius:50%;background:rgba(5,5,16,0.5);border:2px solid rgba(0,245,255,0.3);backdrop-filter:blur(4px)}
  .joy-knob{position:absolute;width:50px;height:50px;left:35px;top:35px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#fff,#00f5ff);box-shadow:0 0 18px #00f5ff}

  #mobileButtons{position:fixed;bottom:24px;right:24px;z-index:30;display:none;flex-direction:column;gap:10px;align-items:flex-end}
  #mobileButtons.show{display:flex}
  .mob-btn{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid rgba(255,255,255,0.2);background:rgba(5,5,16,0.85);backdrop-filter:blur(6px);cursor:pointer;touch-action:manipulation;user-select:none}
  .mob-btn:active{transform:scale(0.9)}
  .mob-btn.jump{background:rgba(0,245,255,0.15);border-color:rgba(0,245,255,0.5);box-shadow:0 0 15px rgba(0,245,255,0.3)}

  /* emote bar */
  #emoteBar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:none;gap:8px;z-index:30}
  #emoteBar.show{display:flex}
  .em-btn{width:50px;height:50px;background:rgba(5,5,16,0.9);border:2px solid rgba(255,255,255,0.15);border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;backdrop-filter:blur(8px);touch-action:manipulation;user-select:none}
  .em-btn:active{transform:scale(0.88);border-color:#00f5ff}
  .em-key{font-size:8px;color:rgba(255,255,255,0.3);letter-spacing:1px}

  /* chat */
  #chatBox{position:fixed;top:70px;right:12px;width:170px;z-index:25;pointer-events:none}
  .chat-msg{background:rgba(5,5,16,0.8);border:1px solid rgba(0,245,255,0.3);border-radius:8px;padding:4px 9px;font-size:11px;margin-bottom:4px;animation:fm 5s forwards}
  @keyframes fm{0%,70%{opacity:1}100%{opacity:0}}
  .chat-name{color:#00f5ff;font-weight:700}

  @media(max-width:480px){
    .mob-btn{width:56px;height:56px;font-size:19px}
    #joystick{width:110px;height:110px}
    .joy-knob{width:44px;height:44px;left:33px;top:33px}
    .em-btn{width:44px;height:44px;font-size:16px}
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- HUD (visible during game) -->
<div id="hud" style="display:none">
  <div class="hud-p"><div class="hud-alive" id="hudAlive">👤 0</div><div class="hud-sm" id="hudAliveLbl">ALIVE</div></div>
  <div class="hud-p"><div class="hud-big" id="hudTimer">60</div><div class="hud-sm" id="hudTimerLbl">SEKUNDEN</div></div>
  <div class="hud-p"><div class="hud-wave" id="hudWave">W1</div><div class="hud-sm" id="hudWaveLbl">WELLE</div></div>
</div>

<div id="chatBox"></div>
<div id="waveBanner"></div>
<div id="cdOverlay" style="display:none"></div>

<!-- JOYSTICK -->
<div id="joystick"><div class="joy-base"></div><div class="joy-knob" id="joyKnob"></div></div>

<!-- JUMP + EMOTE TOGGLE -->
<div id="mobileButtons">
  <div class="mob-btn jump" id="jumpBtn">⬆</div>
  <div class="mob-btn" id="emoteToggleBtn">😊</div>
</div>

<!-- EMOTE BAR -->
<div id="emoteBar">
  <div class="em-btn" onclick="sendEmote('📦','Box')"><span>📦</span><span class="em-key">1</span></div>
  <div class="em-btn" onclick="sendEmote('👋','Wave')"><span>👋</span><span class="em-key">2</span></div>
  <div class="em-btn" onclick="sendEmote('💀','RIP')"><span>💀</span><span class="em-key">3</span></div>
  <div class="em-btn" onclick="sendEmote('🔥','Fire')"><span>🔥</span><span class="em-key">4</span></div>
  <div class="em-btn" onclick="sendEmote('😂','LOL')"><span>😂</span><span class="em-key">5</span></div>
  <div class="em-btn" onclick="sendEmote('🏆','GG')"><span>🏆</span><span class="em-key">6</span></div>
</div>

<!-- ===== SCREENS ===== -->

<!-- MAIN MENU -->
<div class="screen" id="menuScreen">
  <div class="game-title">LASER TRACER</div>
  <div class="sub">3D EDITION</div>
  <div class="sep"></div>
  <div class="profile-card" id="profileCard" style="display:none">
    <div class="p-av-wrap">
      <div class="p-av" id="pAv"></div>
      <div class="lvl-badge" id="pLvl">1</div>
    </div>
    <div class="p-info">
      <div class="p-name" id="pName">Lade...</div>
      <div class="xp-bg"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
      <div class="xp-txt" id="xpTxt">0 / 100 XP</div>
    </div>
    <div class="coins-disp">🪙 <span id="pCoins">0</span></div>
  </div>
  <button class="btn btn-green" onclick="startSolo()">🎯 SOLO ÜBEN</button>
  <button class="btn btn-cyan" onclick="showMulti()">⚔️ MULTIPLAYER</button>
  <div id="multiOpts" style="display:none;flex-direction:column;gap:10px;align-items:center;width:100%">
    <button class="btn btn-cyan" onclick="createRoom()" style="width:min(300px,90vw)">🚀 ROOM ERSTELLEN</button>
    <button class="btn btn-ghost" onclick="showJoin()" style="width:min(300px,90vw)">🔗 BEITRETEN</button>
    <div id="joinArea" style="display:none;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
      <input type="text" id="joinCode" maxlength="4" placeholder="CODE" style="background:rgba(15,15,42,1);border:2px solid rgba(0,245,255,0.3);color:#00f5ff;font-family:'Russo One',sans-serif;font-size:22px;padding:10px 16px;border-radius:8px;outline:none;width:150px;text-align:center;letter-spacing:6px;text-transform:uppercase"/>
      <button class="btn btn-cyan" onclick="joinRoom()" style="width:auto;padding:12px 20px">JOIN</button>
    </div>
  </div>
  <button class="btn btn-ghost" onclick="window.location.href='../menu.html'" style="font-size:12px;padding:10px 20px">← SPIELAUSWAHL</button>
  <div class="err" id="menuErr"></div>
</div>

<!-- LOBBY -->
<div class="screen hidden" id="lobbyScreen">
  <div class="lobby-box">
    <div class="lobby-title">⚡ LOBBY</div>
    <div class="code-box" onclick="copyCode()">
      <div class="code-lbl">Room Code (tippen zum kopieren)</div>
      <div class="code-big" id="lobbyCode">----</div>
    </div>
    <div class="plist" id="playersList"></div>
    <div class="lobby-btns">
      <button class="btn btn-cyan" id="startBtn" onclick="startMulti()" style="width:auto;padding:12px 22px">▶ STARTEN</button>
      <button class="btn btn-ghost" onclick="leaveRoom()" style="width:auto;padding:10px 16px;font-size:12px">← ZURÜCK</button>
    </div>
    <div class="lobby-hint" id="lobbyHint">Mindestens 2 Spieler</div>
    <div class="err" id="lobbyErr"></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="resultScreen">
  <div class="res-title" id="resTitle">GG!</div>
  <div style="color:rgba(255,255,255,0.6);font-size:14px;text-align:center" id="resStats"></div>
  <div class="lvlup" id="lvlupBanner" style="display:none">⬆ LEVEL UP!</div>
  <div class="reward-box">
    <div><div class="rew-val rew-xp" id="rewXp">+0</div><div class="rew-lbl">XP</div></div>
    <div><div class="rew-val rew-coin" id="rewCoin">+0</div><div class="rew-lbl">MÜNZEN</div></div>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center" id="resBtns"></div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js";
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
import { SUPABASE_URL, SUPABASE_ANON_KEY } from "../../supabase-config.js";

// ============================================================
//  SUPABASE + PROGRESS
// ============================================================
let sb = null, SB_USER = null, isOnline = false;
let progress = {name:'Player',level:1,xp:0,coins:200,owned:['cyan','pink'],equipped:'cyan',wins:0,games:0,bestWave:0};
const SKIN_COLORS={cyan:'#00f5ff',pink:'#ff006e',green:'#39ff14',orange:'#ff8800',purple:'#cc00ff',ice:'#aaffff',lava:'#ff3300',toxic:'#aaff00',galaxy:'#7b2fff',gold:'#ffd700',rainbow:'#ff0088',void:'#5500aa'};
function xpForLvl(l){return 100+(l-1)*60}
function myColor(){return SKIN_COLORS[progress.equipped]||'#00f5ff'}

async function saveProgress(){
  if(!sb||!SB_USER) return;
  try{ await sb.from('profiles').upsert({id:SB_USER.id,name:progress.name,level:progress.level,xp:progress.xp,coins:progress.coins,owned:progress.owned,equipped:progress.equipped,wins:progress.wins,games:progress.games,best_wave:progress.bestWave,updated_at:new Date().toISOString()}); }catch(e){}
}
async function loadProgress(){
  if(!sb||!SB_USER) return;
  try{const{data}=await sb.from('profiles').select('*').eq('id',SB_USER.id).single();
  if(data){progress.name=data.name||'Player';progress.level=data.level??1;progress.xp=data.xp??0;progress.coins=data.coins??200;progress.owned=Array.isArray(data.owned)?data.owned:['cyan','pink'];progress.equipped=data.equipped||'cyan';progress.wins=data.wins??0;progress.games=data.games??0;progress.bestWave=data.best_wave??0;}}catch(e){}
}
function persist(){if(sb&&SB_USER)saveProgress();}

function avatarSVG(color,size){
  const cid='g'+color.replace('#','');
  return `<svg width="${size}" height="${size}" viewBox="0 0 60 60"><defs><radialGradient id="${cid}" cx="40%" cy="35%"><stop offset="0%" stop-color="#fff"/><stop offset="45%" stop-color="${color}"/><stop offset="100%" stop-color="${color}"/></radialGradient></defs><circle cx="30" cy="30" r="22" fill="url(#${cid})" stroke="${color}" stroke-width="2"/><circle cx="23" cy="26" r="4.5" fill="#1a1a2e"/><circle cx="37" cy="26" r="4.5" fill="#1a1a2e"/><circle cx="24.5" cy="24.5" r="1.8" fill="#fff"/><circle cx="38.5" cy="24.5" r="1.8" fill="#fff"/><path d="M 23 38 Q 30 43 37 38" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`;
}

function renderProfile(){
  document.getElementById('pName').textContent=progress.name;
  document.getElementById('pLvl').textContent=progress.level;
  document.getElementById('pCoins').textContent=progress.coins;
  document.getElementById('pAv').innerHTML=avatarSVG(myColor(),48);
  const need=xpForLvl(progress.level);
  document.getElementById('xpFill').style.width=Math.min(100,(progress.xp/need)*100)+'%';
  document.getElementById('xpTxt').textContent=`${progress.xp}/${need} XP`;
  document.getElementById('profileCard').style.display='flex';
}

// ============================================================
//  THREE.JS SETUP
// ============================================================
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x050510);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050510, 0.035);

const camera = new THREE.PerspectiveCamera(70, 1, 0.1, 200);
camera.position.set(0, 8, 14);

function resize(){
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
resize(); window.addEventListener('resize',resize);

// Lighting
const ambient = new THREE.AmbientLight(0x1a1a3a, 2);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0x00f5ff, 1.5);
dirLight.position.set(5,15,5);
dirLight.castShadow=true;
dirLight.shadow.mapSize.set(1024,1024);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0xff006e,2,30);
pointLight.position.set(-5,5,0);
scene.add(pointLight);

// ---- ARENA FLOOR ----
const ARENA_W=50, ARENA_D=50;
const floorGeo = new THREE.PlaneGeometry(ARENA_W,ARENA_D);
const floorMat = new THREE.MeshStandardMaterial({color:0x080820,roughness:0.8,metalness:0.2});
const floor = new THREE.Mesh(floorGeo,floorMat);

function createPlayerMesh(color){
  const group = new THREE.Group();
  const hexColor = parseInt(color.replace('#',''), 16);

  // Body
  const bodyGeo = new THREE.CapsuleGeometry(0.5,0.8,4,8);
  const bodyMat = new THREE.MeshStandardMaterial({color:hexColor,emissive:hexColor,emissiveIntensity:0.3,roughness:0.4,metalness:0.2});
  const body = new THREE.Mesh(bodyGeo,bodyMat);
  body.position.y=0.9; body.castShadow=true;
  group.add(body);

  // Head
  const headGeo = new THREE.SphereGeometry(0.45,12,8);
  const headMat = new THREE.MeshStandardMaterial({color:hexColor,emissive:hexColor,emissiveIntensity:0.4,roughness:0.3});
  const head = new THREE.Mesh(headGeo,headMat);
  head.position.y=1.95; head.castShadow=true;
  group.add(head);

  // Eyes
  const eyeGeo = new THREE.SphereGeometry(0.1,6,6);
  const eyeMat = new THREE.MeshStandardMaterial({color:0x050510});
  [-0.18,0.18].forEach(ex=>{
    const eye=new THREE.Mesh(eyeGeo,eyeMat);
    eye.position.set(ex,2.0,0.38); group.add(eye);
    // eye glow
    const glowMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:1});
    const glow=new THREE.Mesh(new THREE.SphereGeometry(0.05,4,4),glowMat);
    glow.position.set(ex+0.04,2.03,0.44); group.add(glow);
  });

  // Player glow light
  const pLight=new THREE.PointLight(hexColor,1.5,4);
  pLight.position.y=1; group.add(pLight);

  // Name label (sprite)
  group.userData.color=hexColor;
  group.userData.baseY=0;
  return group;
}

// ============================================================
//  LASER 3D
// ============================================================
function createLaserMesh(color){
  const group=new THREE.Group();
  const hexColor=parseInt(color.replace('#',''),16);

  // Core beam
  const geo=new THREE.CylinderGeometry(0.05,0.05,1,6);
  const mat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:2});
  const core=new THREE.Mesh(geo,mat);
  group.add(core);

  // Glow tube
  const glowGeo=new THREE.CylinderGeometry(0.15,0.15,1,6);
  const glowMat=new THREE.MeshStandardMaterial({color:hexColor,emissive:hexColor,emissiveIntensity:1,transparent:true,opacity:0.4});
  const glow=new THREE.Mesh(glowGeo,glowMat);
  group.add(glow);

  // Light
  const light=new THREE.PointLight(hexColor,2,5);
  group.add(light);

  group.userData.color=hexColor;
  return group;
}

function randCode(){return Math.random().toString(36).slice(2,6).toUpperCase()}

async function joinChannel(){
  if(!sb) return;
  channel=sb.channel('lt3d-'+roomCode,{config:{presence:{key:myId}}});
  channel
    .on('presence',{event:'sync'},()=>{ rebuildPlayers(); if(!gameRunning)renderLobby(); })
    .on('broadcast',{event:'move'},({payload})=>{ if(payload.id!==myId&&players[payload.id]){ players[payload.id].x=payload.x; players[payload.id].z=payload.z; players[payload.id].y=payload.y||0; players[payload.id].yaw=payload.yaw||0; if(players[payload.id].mesh) players[payload.id].mesh.position.set(payload.x,payload.y||0,payload.z); } })
    .on('broadcast',{event:'emote'},({payload})=>{ if(payload.id!==myId&&players[payload.id]){ players[payload.id].emote=payload.emote; players[payload.id].emoteTime=Date.now(); addChat(players[payload.id].name||'?',payload.emote); }})
    .on('broadcast',{event:'lasers'},({payload})=>{ if(!isHost) syncLasersFromHost(payload.lasers); })
    .on('broadcast',{event:'start'},()=>{ if(!gameRunning&&mode==='multi') beginGame(); })
    .on('broadcast',{event:'tolobby'},()=>{ if(mode==='multi'){ cleanupGame(); spawnMyPlayer(); renderLobby(); showScreen('lobbyScreen'); }});

  await channel.subscribe(async(status)=>{
    if(status==='SUBSCRIBED'){
      await channel.track({id:myId,name:progress.name,color:myColor(),level:progress.level,host:isHost,x:0,y:0,z:0,alive:true});
      document.getElementById('lobbyCode').textContent=roomCode;
      showScreen('lobbyScreen');
    }
  });
}

function rebuildPlayers(){
  const st=channel?.presenceState()||{};
  const ids=Object.keys(st);
  for(const id of ids){
    const meta=st[id][0]; if(!meta) continue;
    if(!players[id]){
      const mesh=createPlayerMesh(meta.color||'#00f5ff');
      scene.add(mesh);
      players[id]={id,name:meta.name,color:meta.color||'#00f5ff',level:meta.level||1,host:meta.host,x:meta.x||0,y:0,z:meta.z||0,yaw:0,alive:true,mesh,emote:null,emoteTime:0};
    }
  }
  for(const id of Object.keys(players)){
    if(!ids.includes(id)){
      if(players[id].mesh){scene.remove(players[id].mesh);}
      delete players[id];
    }
  }
}

function leaveChannel(){
  if(channel&&sb){ try{sb.removeChannel(channel);}catch(e){} }
  channel=null;
}

const LASER_COLORS=['#ff006e','#ff8800','#ffff00','#cc00ff','#00ff88'];

function spawnLaser(speedMul){
  speedMul=speedMul||1;
  const angle=Math.random()*Math.PI*2;
  const side=Math.floor(Math.random()*4);
  let x,z;
  if(side===0){x=(Math.random()-0.5)*ARENA_W;z=-ARENA_D/2;}
  else if(side===1){x= ARENA_W/2;z=(Math.random()-0.5)*ARENA_D;}
  else if(side===2){x=(Math.random()-0.5)*ARENA_W;z= ARENA_D/2;}
  else {x=-ARENA_W/2;z=(Math.random()-0.5)*ARENA_D;}
  const color=LASER_COLORS[Math.floor(Math.random()*LASER_COLORS.length)];
  const len=6+Math.random()*8;
  const mesh=createLaserMesh(color);
  mesh.position.set(x,1.2,z);
  scene.add(mesh);
  const ldata={mesh,x,z,y:1.2,angle:Math.atan2(-(z),-(x))+angle*0.3,speed:(0.08+Math.random()*0.06)*speedMul,rotateSpeed:(Math.random()-0.5)*0.018,length:len,color};
  // scale mesh to length
  mesh.scale.y=len;
  laserObjs.push(ldata);
}

function syncLasersFromHost(data){
  // simplified: just keep host's laser positions
  data.forEach((ld,i)=>{
    if(laserObjs[i]){laserObjs[i].x=ld.x;laserObjs[i].z=ld.z;laserObjs[i].angle=ld.angle;if(laserObjs[i].mesh)laserObjs[i].mesh.position.set(ld.x,ld.y||1.2,ld.z);}
  });
}

function removeLasers(){
  laserObjs.forEach(l=>{if(l.mesh)scene.remove(l.mesh);});
  laserObjs=[];
}

// Joystick
function setupJoystick(){
  const joy=document.getElementById('joystick'),knob=document.getElementById('joyKnob');
  let active=false,cx=0,cy=0; const R=44;
  function start(e){active=true;const r=joy.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;move(e);}
  function move(e){if(!active)return;const t=e.touches?e.touches[0]:e;let dx=t.clientX-cx,dy=t.clientY-cy;const d=Math.hypot(dx,dy);if(d>R){dx=dx/d*R;dy=dy/d*R;}knob.style.transform=`translate(${dx}px,${dy}px)`;joyVec={x:dx/R,y:dy/R};}
  function end(){active=false;knob.style.transform='translate(0,0)';joyVec={x:0,y:0};}
  joy.addEventListener('touchstart',start,{passive:true});joy.addEventListener('touchmove',move,{passive:true});joy.addEventListener('touchend',end);
  joy.addEventListener('mousedown',start);window.addEventListener('mousemove',e=>{if(active)move(e);});window.addEventListener('mouseup',end);
}

function getMovement(){
  let fx=0,fz=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) fx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D']) fx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) fz-=1;
  if(keys['ArrowDown']||keys['s']||keys['S']) fz+=1;
  if(joyVec.x||joyVec.y){fx=joyVec.x;fz=joyVec.y;}
  if(fx||fz){const m=Math.hypot(fx,fz);fx/=m;fz/=m;}
  // rotate by camera yaw
  const cosY=Math.cos(camYaw), sinY=Math.sin(camYaw);
  return {dx: fx*cosY+fz*sinY, dz:-fx*sinY+fz*cosY};
}

// ============================================================
//  GAME LOOP
// ============================================================
let movePushTimer=0, laserSyncTimer2=0;
const clock=new THREE.Clock();

function gameLoop(){
  requestAnimationFrame(gameLoop);
  const dt=clock.getDelta();

  // Background particle drift
  const pos=bgGeo.attributes.position;
  for(let i=0;i<300;i++){pos.array[i*3+1]-=0.01;if(pos.array[i*3+1]<0)pos.array[i*3+1]=15;}
  pos.needsUpdate=true;

  // Explosion particles
  for(let i=explosionParts.length-1;i>=0;i--){
    const p=explosionParts[i];
    p.userData.life-=dt*1.2;
    p.position.addScaledVector(p.userData.vel,dt);
    p.userData.vel.y-=9.8*dt;
    p.material.opacity=p.userData.life;
    p.material.transparent=true;
    if(p.userData.life<=0){scene.remove(p);explosionParts.splice(i,1);}
  }

  if(gameRunning){
    if(mode==='solo') updateSolo(dt);
    else updateMulti(dt);
  }

  updateCamera();
  renderer.render(scene,camera);
}
gameLoop();

// ============================================================
//  SOLO UPDATE
// ============================================================
function updateSolo(dt){
  const me=players[myId]; if(!me||!me.alive) return;

  soloSurvTime+=dt; soloLaserTimer+=dt;
  if(soloLaserTimer>12){soloNextWave();}

  moveMyPlayer(me,dt);
  updateLasers(dt,1+soloWave*0.06);
  checkMyCollision(me);

  document.getElementById('hudAlive').textContent='🌊 '+soloWave;
  document.getElementById('hudTimer').textContent=Math.floor(soloSurvTime)+'s';
  document.getElementById('hudWave').textContent='W'+soloWave;
}

// ============================================================
//  MULTI UPDATE
// ============================================================
function updateMulti(dt){
  const me=players[myId]; if(!me) return;

  if(me.alive) moveMyPlayer(me,dt);

  if(isHost){
    updateLasers(dt,1);
    laserSyncTimer2+=dt;
    if(laserSyncTimer2>0.1&&channel){laserSyncTimer2=0;channel.send({type:'broadcast',event:'lasers',payload:{lasers:laserObjs.map(l=>({x:l.x,z:l.z,y:l.y,angle:l.angle}))}});}
  }

  if(me.alive) checkMyCollision(me);

  // push position
  movePushTimer+=dt;
  if(movePushTimer>0.05&&channel){movePushTimer=0;channel.send({type:'broadcast',event:'move',payload:{id:myId,x:me.x,y:me.y,z:me.z,yaw:camYaw,alive:me.alive}});}

  const alive=Object.values(players).filter(p=>p.alive);
  document.getElementById('hudAlive').textContent='👤 '+alive.length;
  if(alive.length<=1&&Object.keys(players).length>=2) endMulti(false);
}

function moveMyPlayer(me,dt){
  const {dx,dz}=getMovement();
  me.x+=dx*MOVE_SPEED*60*dt;
  me.z+=dz*MOVE_SPEED*60*dt;

  // Clamp to arena
  const hw=ARENA_W/2-1, hd=ARENA_D/2-1;
  me.x=Math.max(-hw,Math.min(hw,me.x));
  me.z=Math.max(-hd,Math.min(hd,me.z));

  // Jump
  if(isJumping){
    playerY+=jumpVel*60*dt; jumpVel-=GRAVITY*60*dt;
    if(playerY<=0){playerY=0;isJumping=false;jumpVel=0;}
  }
  me.y=playerY;

  // Update mesh
  if(me.mesh){
    me.mesh.position.set(me.x,me.y,me.z);
    // Face movement direction
    if(Math.abs(dx)>0.05||Math.abs(dz)>0.05) me.mesh.rotation.y=-Math.atan2(dx,dz);
    // Subtle bob
    if(me.alive) me.mesh.position.y+=Math.sin(Date.now()*0.006)*0.04;
  }

  // Emote float
  if(me.emote && me.mesh && Date.now()-me.emoteTime<2500){
    // handled via HUD overlay (below)
  }
}

// ============================================================
//  LASER UPDATE
// ============================================================
function updateLasers(dt,speedMul){
  const hw=ARENA_W/2, hd=ARENA_D/2;
  for(const l of laserObjs){
    l.x+=Math.cos(l.angle)*l.speed*speedMul*60*dt;
    l.z+=Math.sin(l.angle)*l.speed*speedMul*60*dt;
    l.angle+=l.rotateSpeed;

    // Bounce
    if(l.x<-hw||l.x>hw){l.angle=Math.PI-l.angle;l.x=Math.max(-hw,Math.min(hw,l.x));}
    if(l.z<-hd||l.z>hd){l.angle=-l.angle;l.z=Math.max(-hd,Math.min(hd,l.z));}

    // Update mesh
    if(l.mesh){
      l.mesh.position.set(l.x,l.y,l.z);
      l.mesh.rotation.z=l.angle+Math.PI/2;
      // Pulse glow
      const t=Date.now()*0.003;
      if(l.mesh.children[1]) l.mesh.children[1].material.emissiveIntensity=0.6+Math.sin(t)*0.4;
    }
  }
}

function checkMyCollision(me){
  for(const l of laserObjs){
    const dist=Math.hypot(me.x-l.x, me.z-l.z);
    const heightOk=me.y<2.5; // only collide if not too high (jump avoidance)
    if(dist<1.2&&heightOk){
      me.alive=false;
      explodeAt(me.x,1,me.z,me.color);
      if(me.mesh) scene.remove(me.mesh);
      if(mode==='solo'){endSolo();}
      else if(channel) channel.send({type:'broadcast',event:'move',payload:{id:myId,x:me.x,y:me.y,z:me.z,alive:false}});
      break;
    }
  }
}

// ============================================================
//  WAVE SYSTEM (SOLO)
// ============================================================
function soloNextWave(){
  soloWave++;
  if(soloWave>progress.bestWave){progress.bestWave=soloWave;}
  soloLaserTimer=0;
  const banner=document.getElementById('waveBanner');
  banner.textContent='WELLE '+soloWave;
  banner.classList.remove('show');void banner.offsetWidth;banner.classList.add('show');
  const target=Math.min(3+soloWave*2,20);
  while(laserObjs.length<target) spawnLaser(1+soloWave*0.07);
}

// ============================================================
//  COUNTDOWN
// ============================================================
function runCountdown(cb){
  const ov=document.getElementById('cdOverlay');
  ov.style.display='flex'; ov.innerHTML='';
  let c=3;
  function tick(){
    ov.innerHTML=`<div class="cd-num">${c}</div>`;
    if(c===0){setTimeout(()=>{ov.style.display='none';cb();},600);return;}
    c--;
    setTimeout(tick,1000);
  }
  tick();
}

// ============================================================
//  CLEANUP
// ============================================================
function cleanupGame(){
  gameRunning=false;gameOver=false;
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  removeLasers();
  explosionParts.forEach(p=>scene.remove(p));explosionParts.length=0;
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('lvlupBanner').style.display='none';
}

// ============================================================
//  SOLO START / END
// ============================================================
window.startSolo=()=>{
  mode='solo';
  cleanupGame();
  // Remove old players
  Object.values(players).forEach(p=>{if(p.mesh)scene.remove(p.mesh);});
  players={};
  spawnMyPlayer();
  document.getElementById('hudAliveLbl').textContent='WELLE';
  document.getElementById('hudTimerLbl').textContent='ÜBERLEBT';
  document.getElementById('hudWaveLbl').textContent='WELLE';
  soloWave=0;soloSurvTime=0;soloLaserTimer=0;playerY=0;isJumping=false;
  showScreen('game');
  runCountdown(()=>{gameRunning=true;soloNextWave();});
};

function endSolo(){
  if(gameOver) return;gameOver=true;gameRunning=false;
  const xpGain=soloWave*25+Math.floor(soloSurvTime*2);
  const coinGain=soloWave*15+Math.floor(soloSurvTime);
  progress.games++;
  const oldLvl=progress.level;
  progress.xp+=xpGain;progress.coins+=coinGain;
  while(progress.xp>=xpForLvl(progress.level)){progress.xp-=xpForLvl(progress.level);progress.level++;}
  const lvledUp=progress.level>oldLvl;persist();
  showResult(`🎯 WELLE ${soloWave}`,'win',`${Math.floor(soloSurvTime)}s überlebt — Beste: ${progress.bestWave}`,xpGain,coinGain,lvledUp,
    [{label:'🔄 NOCHMAL',cls:'btn-green',fn:()=>{cleanupGame();window.startSolo();}},{label:'🏠 MENÜ',cls:'btn-ghost',fn:()=>{cleanupGame();showScreen('menuScreen');}}]);
}

// ============================================================
//  MULTI START / END
// ============================================================
window.showMulti=()=>{
  if(!isOnline){setError('menuErr','Login nötig für Multiplayer.');return;}
  const m=document.getElementById('multiOpts');
  m.style.display=m.style.display==='none'?'flex':'none';
};
window.showJoin=()=>{ document.getElementById('joinArea').style.display='flex'; };
window.createRoom=async()=>{
  if(!isOnline){setError('menuErr','Login nötig.');return;}
  mode='multi';roomCode=randCode();isHost=true;
  spawnMyPlayer();
  await joinChannel();
};
window.joinRoom=async()=>{
  const code=document.getElementById('joinCode').value.trim().toUpperCase();
  if(code.length!==4){setError('menuErr','4 Zeichen!');return;}
  if(!isOnline){setError('menuErr','Login nötig.');return;}
  mode='multi';roomCode=code;isHost=false;
  spawnMyPlayer();
  await joinChannel();
};
window.leaveRoom=()=>{leaveChannel();cleanupGame();Object.values(players).forEach(p=>{if(p.mesh)scene.remove(p.mesh);});players={};showScreen('menuScreen');};
window.copyCode=()=>{if(navigator.clipboard)navigator.clipboard.writeText(roomCode);setError('lobbyErr','Kopiert: '+roomCode);};

window.startMulti=async()=>{
  if(!isHost){return;}
  if(Object.keys(players).length<2){setError('lobbyErr','Min. 2 Spieler!');return;}
  channel.send({type:'broadcast',event:'start',payload:{}});
  beginGame();
};

function beginGame(){
  cleanupGame();
  const pArr=Object.values(players);
  pArr.forEach((p,i)=>{
    p.alive=true;p.x=(i%4-1.5)*7;p.z=Math.floor(i/4)*7-7;p.y=0;
    if(p.mesh) p.mesh.position.set(p.x,0,p.z);
    else{p.mesh=createPlayerMesh(p.color);scene.add(p.mesh);p.mesh.position.set(p.x,0,p.z);}
  });
  playerY=0;isJumping=false;
  document.getElementById('hudAliveLbl').textContent='ALIVE';
  document.getElementById('hudTimerLbl').textContent='SEKUNDEN';
  document.getElementById('hudWaveLbl').textContent='#';
  const n=2+Math.floor(pArr.length/2);
  for(let i=0;i<n;i++) spawnLaser();
  gameTimer=60;document.getElementById('hudTimer').textContent='60';
  timerInterval=setInterval(()=>{if(!gameRunning)return;gameTimer--;document.getElementById('hudTimer').textContent=gameTimer;if(gameTimer<=0)endMulti(true);},1000);
  showScreen('game');
  runCountdown(()=>{gameRunning=true;});
}

function endMulti(timedOut){
  if(gameOver) return;gameOver=true;gameRunning=false;
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  const me=players[myId],alive=Object.values(players).filter(p=>p.alive);
  const won=me&&me.alive;
  const xpGain=won?80:30,coinGain=won?50:15;
  if(won)progress.wins++;progress.games++;
  const oldLvl=progress.level;progress.xp+=xpGain;progress.coins+=coinGain;
  while(progress.xp>=xpForLvl(progress.level)){progress.xp-=xpForLvl(progress.level);progress.level++;}
  const lvledUp=progress.level>oldLvl;persist();
  const title=timedOut?'⏰ ZEIT!':won?'🏆 GEWONNEN!':'💀 RAUS!';
  const cls=won||timedOut?'win':'lose';
  const stats=timedOut?`${alive.length} überlebt`:won?'Letzter Überlebender!':alive.length?`${alive.map(p=>p.name).join(', ')} gewinnt`:'Alle raus';
  showResult(title,cls,stats,xpGain,coinGain,lvledUp,[
    {label:'🔄 LOBBY',cls:'btn-cyan',fn:()=>{cleanupGame();if(isHost&&channel)channel.send({type:'broadcast',event:'tolobby',payload:{}});spawnMyPlayer();showScreen('lobbyScreen');renderLobby();}},
    {label:'🏠 MENÜ',cls:'btn-ghost',fn:()=>{leaveChannel();cleanupGame();Object.values(players).forEach(p=>{if(p.mesh)scene.remove(p.mesh);});players={};showScreen('menuScreen');}}
  ]);
}

function showResult(title,cls,stats,xp,coins,lvledUp,btns){
  document.getElementById('resTitle').textContent=title;
  document.getElementById('resTitle').className='res-title '+cls;
  document.getElementById('resStats').textContent=stats;
  document.getElementById('rewXp').textContent='+'+xp;
  document.getElementById('rewCoin').textContent='+'+coins;
  document.getElementById('lvlupBanner').style.display=lvledUp?'block':'none';
  if(lvledUp)document.getElementById('lvlupBanner').textContent=`⬆ LEVEL ${progress.level}!`;
  const rb=document.getElementById('resBtns');rb.innerHTML='';
  btns.forEach(b=>{const btn=document.createElement('button');btn.className='btn '+b.cls;btn.textContent=b.label;btn.onclick=b.fn;rb.appendChild(btn);});
  renderProfile();
  showScreen('resultScreen');
}

// ============================================================
//  BOOT
// ============================================================
async function boot(){
  try{
    sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    const{data:{session}}=await sb.auth.getSession();
    if(session){
      SB_USER=session.user;isOnline=true;
      await loadProgress();
    }
  }catch(e){console.error(e);}
  renderProfile();
  showScreen('menuScreen');
  // Initial camera pos
  camera.position.set(0,10,16);
  camera.lookAt(0,0,0);
}
boot();
</script>
