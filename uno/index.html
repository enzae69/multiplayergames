<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UNO MULTIPLAYER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#080816;color:#fff;font-family:'Exo 2',sans-serif;user-select:none;-webkit-user-select:none}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px 16px 28px;overflow-y:auto}
.screen.off{display:none!important}
.screen::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,180,255,.07) 0%,transparent 65%),radial-gradient(ellipse at 80% 100%,rgba(255,0,100,.05) 0%,transparent 60%);pointer-events:none;z-index:0}
.screen>*{position:relative;z-index:1}

/* ── SHARED UI ── */
.gtitle{font-family:'Russo One',sans-serif;font-size:clamp(64px,17vw,120px);background:linear-gradient(135deg,#ff1744 15%,#ff9100 35%,#ffd600 55%,#00e676 70%,#2979ff 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:6px;text-align:center;filter:drop-shadow(0 0 30px rgba(255,23,68,.5));animation:titleglow 3s ease-in-out infinite alternate}
@keyframes titleglow{from{filter:drop-shadow(0 0 20px rgba(255,23,68,.4))}to{filter:drop-shadow(0 0 40px rgba(255,145,0,.6))}}
.gsub{color:rgba(255,255,255,.35);letter-spacing:8px;font-size:11px;text-transform:uppercase;margin-top:-10px}
.sep{width:80px;height:2px;background:linear-gradient(90deg,transparent,#00d4ff,transparent);margin:2px 0}
.btn{font-family:'Russo One',sans-serif;font-size:15px;letter-spacing:1.5px;padding:14px 28px;border:none;border-radius:12px;cursor:pointer;transition:transform .15s,opacity .15s,box-shadow .15s;text-transform:uppercase;touch-action:manipulation;width:min(300px,90vw);display:block;text-align:center;text-decoration:none}
.btn:active{transform:scale(.95);opacity:.85}
.bcyan{background:linear-gradient(135deg,#006680,#00c4d4);color:#000;box-shadow:0 4px 20px rgba(0,196,212,.35),inset 0 1px 0 rgba(255,255,255,.2)}
.bgreen{background:linear-gradient(135deg,#1a7a0a,#2ecc40);color:#000;box-shadow:0 4px 20px rgba(46,204,64,.35),inset 0 1px 0 rgba(255,255,255,.2)}
.bghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.12)}
.berr{color:#ff1744;font-size:12px;text-align:center;min-height:14px;letter-spacing:1px}
.pcard{background:rgba(10,10,30,.9);border:1px solid rgba(0,212,255,.25);border-radius:16px;padding:13px 18px;width:min(340px,93vw);display:flex;align-items:center;gap:12px;box-shadow:0 4px 24px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05)}
.pname{font-weight:900;font-size:15px;color:#00d4ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nameinp{background:rgba(12,12,36,1);border:2px solid rgba(0,212,255,.3);color:#00d4ff;font-family:'Russo One',sans-serif;font-size:18px;padding:10px 14px;border-radius:10px;outline:none;width:min(280px,85vw);text-align:center;letter-spacing:3px;text-transform:uppercase;transition:border-color .2s}
.nameinp:focus{border-color:#00d4ff;box-shadow:0 0 0 3px rgba(0,212,255,.15)}
.jinp{background:rgba(12,12,36,1);border:2px solid rgba(0,212,255,.3);color:#00d4ff;font-family:'Russo One',sans-serif;font-size:20px;padding:10px 14px;border-radius:10px;outline:none;width:130px;text-align:center;letter-spacing:4px;text-transform:uppercase;transition:border-color .2s}
.jinp:focus{border-color:#00d4ff}
.multibtns{display:none;flex-direction:column;gap:9px;align-items:center;width:100%}
.multibtns.show{display:flex}
.joinrow{display:none;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.joinrow.show{display:flex}

/* ── SOLO BOT SELECTOR ── */
.solo-box{background:rgba(10,10,30,.9);border:1px solid rgba(46,204,64,.3);border-radius:16px;padding:18px 22px;width:min(300px,90vw);display:none;flex-direction:column;align-items:center;gap:13px}
.solo-box.show{display:flex}
.solo-label{font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:4px;color:rgba(255,255,255,.4)}
.bot-row{display:flex;gap:12px}
.bot-btn{font-family:'Russo One',sans-serif;font-size:20px;width:58px;height:58px;border-radius:12px;border:2px solid rgba(46,204,64,.2);background:rgba(12,12,36,1);color:rgba(255,255,255,.4);cursor:pointer;transition:all .15s;touch-action:manipulation}
.bot-btn.sel{background:rgba(46,204,64,.12);border-color:#2ecc40;color:#2ecc40;box-shadow:0 0 16px rgba(46,204,64,.25)}
.bot-btn:active{transform:scale(.9)}

/* ── LOBBY ── */
.lbox{background:rgba(10,10,30,.95);border:1px solid rgba(0,212,255,.3);border-radius:20px;padding:22px;width:min(420px,95vw);box-shadow:0 8px 40px rgba(0,0,0,.5)}
.ltitle{font-family:'Russo One',sans-serif;font-size:18px;color:#00d4ff;text-align:center;letter-spacing:4px;margin-bottom:14px}
.codebig{font-family:'Russo One',sans-serif;font-size:40px;color:#ffd600;letter-spacing:10px;text-align:center;padding:12px;background:rgba(12,12,36,1);border:2px dashed rgba(255,214,0,.4);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.codebig:active{border-color:#ffd600}
.plist{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;min-height:40px}
.pslot{background:rgba(12,12,36,.8);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:9px;color:rgba(255,255,255,.4)}
.pslot.filled{border-color:rgba(0,212,255,.3);color:#fff}
.pslot-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

/* ── GAME SCREEN ── */
#sGame{padding:0;justify-content:flex-start;overflow:hidden;gap:0;background:#080816}
#sGame::before{display:none}

/* ── OPPONENTS BAR ── */
.opponents-bar{display:flex;gap:8px;padding:8px 10px 6px;overflow-x:auto;min-height:82px;align-items:center;background:rgba(0,0,0,.5);width:100%;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,.06)}
.opponents-bar::-webkit-scrollbar{display:none}
.opp{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:64px;padding:6px 5px;border-radius:12px;border:2px solid transparent;transition:border-color .25s,background .25s,box-shadow .25s;flex-shrink:0}
.opp.active{border-color:rgba(255,214,0,.8);background:rgba(255,214,0,.07);box-shadow:0 0 14px rgba(255,214,0,.2);animation:oppulse 1.2s ease-in-out infinite}
@keyframes oppulse{0%,100%{box-shadow:0 0 8px rgba(255,214,0,.2)}50%{box-shadow:0 0 18px rgba(255,214,0,.4)}}
.opp-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Russo One',sans-serif;font-size:13px;color:#000;font-weight:900;border:2px solid rgba(255,255,255,.2);flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.opp-name{font-family:'Russo One',sans-serif;font-size:9px;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px;text-align:center}
.opp-cards{display:flex;gap:-4px;align-items:center;justify-content:center}
.opp-count{font-family:'Russo One',sans-serif;font-size:21px;color:#fff;line-height:1}
.opp-uno{color:#ff1744;font-size:9px;letter-spacing:2px;font-weight:900;animation:unopop .5s ease infinite alternate}
@keyframes unopop{from{opacity:.5}to{opacity:1;text-shadow:0 0 8px #ff1744}}
.opp-bot{font-size:8px;color:rgba(46,204,64,.7);letter-spacing:1px}

/* ── TABLE AREA ── */
.table-area{flex:1;display:flex;align-items:center;justify-content:center;gap:18px;padding:10px 14px;overflow:hidden;min-height:0;position:relative;background:radial-gradient(ellipse at center,rgba(0,40,20,.6) 0%,transparent 70%)}
.table-area::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(0,80,30,.15) 30%,transparent 70%);pointer-events:none}
.discard-pile{display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.discard-pile::before{content:'';position:absolute;width:82px;height:122px;border-radius:13px;border:1px dashed rgba(255,255,255,.08);background:rgba(255,255,255,.02)}
.draw-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1}
.deck-count-lbl{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:2px;text-align:center}
.info-col{display:flex;flex-direction:column;align-items:center;gap:10px;position:relative;z-index:1}
.color-ring{width:36px;height:36px;border-radius:50%;border:3px solid rgba(255,255,255,.4);transition:background .3s,box-shadow .35s;flex-shrink:0}
.dir-badge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 12px;font-size:15px;color:rgba(255,255,255,.5);letter-spacing:2px}
.last-action{font-size:10px;color:rgba(255,255,255,.28);letter-spacing:1px;text-align:center;max-width:86px;line-height:1.5}

/* ── HAND AREA ── */
.hand-area{background:rgba(0,0,0,.55);padding:8px 10px 12px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;width:100%;position:relative;transition:opacity .25s}
.hand-area.not-my-turn::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:20;pointer-events:all;cursor:not-allowed}
.hand-area.not-my-turn .hand-scroll{opacity:.4;pointer-events:none}
.hand-area.my-turn{box-shadow:inset 0 1px 0 rgba(46,204,64,.3)}
.hand-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:6px}
.my-label{font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:2px;color:#00d4ff}
.turn-badge{font-family:'Russo One',sans-serif;font-size:10px;padding:5px 12px;border-radius:14px;letter-spacing:1px;transition:all .3s}
.turn-me{background:rgba(46,204,64,.18);color:#2ecc40;border:1px solid rgba(46,204,64,.45);animation:mepulse 1.1s ease-in-out infinite}
@keyframes mepulse{0%,100%{box-shadow:0 0 0 0 rgba(46,204,64,.25)}50%{box-shadow:0 0 10px 3px rgba(46,204,64,.18)}}
.turn-other{background:rgba(255,255,255,.04);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.07)}
.turn-bot{background:rgba(255,150,0,.1);color:rgba(255,150,0,.7);border:1px solid rgba(255,150,0,.2)}
.hand-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 4px 5px;-webkit-overflow-scrolling:touch;scrollbar-width:none;transition:opacity .25s;min-height:96px;align-items:center}
.hand-scroll::-webkit-scrollbar{display:none}

/* ── UNO CARD ── */
.ucard{width:60px;height:90px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;border:2px solid rgba(255,255,255,.2);box-shadow:0 4px 12px rgba(0,0,0,.55);cursor:default;transition:transform .15s,box-shadow .15s,opacity .15s;flex-shrink:0;font-family:'Russo One',sans-serif;overflow:hidden}
.ucard::before{content:'';position:absolute;width:58%;height:70%;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.15);pointer-events:none}
.ucard.large{width:80px;height:120px;border-radius:12px;cursor:default}
.ucard.large::before{width:60%;height:72%}
.ucard-back{background:linear-gradient(145deg,#10003a,#220060);border-color:rgba(255,255,255,.12);cursor:pointer}
.ucard-back::before{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.ucard-back::after{content:'UNO';position:absolute;color:rgba(255,255,255,.1);font-size:14px;font-family:'Russo One',sans-serif;letter-spacing:3px;transform:rotate(-30deg)}
.ucard.playable{box-shadow:0 0 22px rgba(255,255,255,.6),0 4px 12px rgba(0,0,0,.5)!important;border-color:rgba(255,255,255,.9)!important;cursor:pointer;transform:translateY(-4px)}
.ucard.playable:hover{transform:translateY(-8px);box-shadow:0 0 28px rgba(255,255,255,.7),0 6px 18px rgba(0,0,0,.5)!important}
.ucard.playable:active{transform:translateY(-2px) scale(1.04)!important}
.ucard.dim{opacity:.38;cursor:default}
.ucard-val{font-family:'Russo One',sans-serif;font-size:26px;color:#fff;line-height:1;text-shadow:0 1px 4px rgba(0,0,0,.7);position:relative;z-index:1}
.ucard-val.sm{font-size:18px}
.ucard-corner{position:absolute;font-family:'Russo One',sans-serif;font-size:11px;color:rgba(255,255,255,.9);line-height:1;z-index:1;text-shadow:0 1px 2px rgba(0,0,0,.8)}
.ucard-corner.tl{top:4px;left:6px}
.ucard-corner.br{bottom:4px;right:6px;transform:rotate(180deg)}
.uc-red{background:linear-gradient(145deg,#980f1a,#d42030);border-color:rgba(255,120,120,.3)}
.uc-blue{background:linear-gradient(145deg,#0a3a85,#1555b0);border-color:rgba(80,150,255,.3)}
.uc-green{background:linear-gradient(145deg,#124e16,#1e6e22);border-color:rgba(80,200,80,.3)}
.uc-yellow{background:linear-gradient(145deg,#b86000,#e09020);border-color:rgba(255,200,60,.3)}
.uc-wild{background:conic-gradient(#d42030 0 25%,#e09020 25% 50%,#1e6e22 50% 75%,#1555b0 75% 100%);border-color:rgba(255,255,255,.35)}
.uc-wild::before{background:rgba(0,0,0,.15);border-color:rgba(255,255,255,.2)}

/* ── DRAW PILE LOCKED ── */
.draw-pile-locked{pointer-events:none!important;opacity:.35!important}

/* ── BOT THINKING ── */
#botThinking{position:fixed;top:92px;left:50%;transform:translateX(-50%);z-index:60;background:rgba(10,10,30,.95);border:1px solid rgba(255,150,0,.35);border-radius:22px;padding:6px 18px;font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,150,0,.85);display:none;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.4)}

/* ── PASS BUTTON ── */
#passBtn{position:fixed;bottom:16px;right:16px;z-index:80;display:none;font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:1.5px;padding:12px 20px;border:none;border-radius:12px;cursor:pointer;background:rgba(255,255,255,.1);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.18);touch-action:manipulation;transition:background .15s}
#passBtn:active{opacity:.7}
#unoBtnWrap{position:fixed;bottom:115px;right:16px;z-index:80;display:none}
#unoBtn{font-family:'Russo One',sans-serif;font-size:21px;letter-spacing:4px;padding:13px 20px;border:none;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#8a0014,#ff1744);color:#fff;box-shadow:0 0 28px rgba(255,23,68,.5);animation:unopulse .85s ease-in-out infinite;touch-action:manipulation}
@keyframes unopulse{0%,100%{transform:scale(1);box-shadow:0 0 22px rgba(255,23,68,.5)}50%{transform:scale(1.1);box-shadow:0 0 36px rgba(255,23,68,.7)}}

/* ── COLOUR PICKER ── */
#colorPick{position:fixed;inset:0;z-index:200;background:rgba(5,5,18,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;backdrop-filter:blur(4px)}
#colorPick.off{display:none}
.cp-title{font-family:'Russo One',sans-serif;font-size:22px;letter-spacing:5px;color:#fff}
.cp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cp-btn{width:124px;height:124px;border-radius:18px;border:3px solid rgba(255,255,255,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Russo One',sans-serif;font-size:17px;letter-spacing:2px;color:#fff;transition:transform .15s,box-shadow .15s;touch-action:manipulation}
.cp-btn:hover{transform:scale(1.05)}
.cp-btn:active{transform:scale(.92)}
.cp-red{background:linear-gradient(145deg,#980f1a,#d42030);box-shadow:0 0 22px rgba(212,32,48,.4)}
.cp-blue{background:linear-gradient(145deg,#0a3a85,#1555b0);box-shadow:0 0 22px rgba(21,85,176,.4)}
.cp-green{background:linear-gradient(145deg,#124e16,#1e6e22);box-shadow:0 0 22px rgba(30,110,34,.4)}
.cp-yellow{background:linear-gradient(145deg,#b86000,#e09020);box-shadow:0 0 22px rgba(224,144,32,.4)}

/* ── WINNER ── */
.winner-box{background:rgba(10,10,30,.98);border:1px solid rgba(0,212,255,.4);border-radius:22px;padding:36px 30px;width:min(340px,92vw);display:flex;flex-direction:column;align-items:center;gap:18px;box-shadow:0 12px 50px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06)}
.winner-title{font-family:'Russo One',sans-serif;font-size:28px;color:#ffd600;letter-spacing:5px;text-align:center;text-shadow:0 0 20px rgba(255,214,0,.4)}
.winner-name{font-family:'Russo One',sans-serif;font-size:36px;color:#00d4ff;text-align:center;filter:drop-shadow(0 0 16px #00d4ff)}
.winner-sub{font-size:12px;color:rgba(255,255,255,.38);letter-spacing:2px;text-align:center}

/* ── TOAST ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(10,10,30,.98);border:1px solid rgba(0,212,255,.35);border-radius:12px;padding:10px 22px;font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:2px;color:#00d4ff;white-space:nowrap;pointer-events:none;animation:toastin .3s ease;max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes toastin{from{opacity:0;top:8px}to{opacity:1;top:20px}}

/* ── WAITING OVERLAY TEXT ── */
.not-my-turn-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:25;font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.4);pointer-events:none;white-space:nowrap}
</style>
</head>
<body>

<!-- ══ MENU ══════════════════════════════════════════════════════ -->
<div id="sMenu" class="screen">
  <div class="gtitle">UNO</div>
  <div class="gsub">MULTIPLAYER</div>
  <div class="sep"></div>
  <div class="pcard">
    <div style="font-size:28px">🃏</div>
    <div style="flex:1;min-width:0">
      <div class="pname" id="pName">PLAYER</div>
      <div style="font-size:11px;color:rgba(255,255,255,.35);letter-spacing:1px">Bereit zum Spielen</div>
    </div>
  </div>

  <!-- Solo -->
  <button class="btn bgreen" id="soloBtn">🤖 SOLO vs BOTS</button>
  <div class="solo-box" id="soloBox">
    <div class="solo-label">ANZAHL BOTS</div>
    <div class="bot-row">
      <button class="bot-btn sel" onclick="setBots(1)">1</button>
      <button class="bot-btn"     onclick="setBots(2)">2</button>
      <button class="bot-btn"     onclick="setBots(3)">3</button>
    </div>
    <button class="btn bgreen" id="startSoloBtn" style="width:min(220px,80vw);padding:12px;font-size:14px">▶ SPIELEN</button>
  </div>

  <!-- Multiplayer -->
  <button class="btn bcyan" id="multiBtn">⚔️ MULTIPLAYER</button>
  <div class="multibtns" id="multibtns">
    <button class="btn bcyan" id="createBtn" style="font-size:13px;padding:12px">+ RAUM ERSTELLEN</button>
    <button class="btn bghost" id="joinShowBtn" style="font-size:13px;padding:12px">🔍 RAUM BEITRETEN</button>
    <div class="joinrow" id="joinRow">
      <input class="jinp" id="joinInput" maxlength="4" placeholder="CODE" autocomplete="off" spellcheck="false"/>
      <button class="btn bcyan" id="joinBtn" style="width:auto;padding:12px 20px;font-size:13px">JOIN</button>
    </div>
  </div>

  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
    <input class="nameinp" id="nameInp" maxlength="16" placeholder="NAME ÄNDERN..." autocomplete="off" spellcheck="false"/>
    <button class="btn bcyan" id="nameBtn" style="width:auto;padding:12px 18px;font-size:13px">OK</button>
  </div>
  <a href="../menu.html" class="btn bghost" style="font-family:'Russo One',sans-serif;font-size:13px;padding:11px">← SPIELAUSWAHL</a>
  <div class="berr" id="menuErr"></div>
</div>

<!-- ══ LOBBY ══════════════════════════════════════════════════════ -->
<div id="sLobby" class="screen off">
  <div class="lbox">
    <div class="ltitle">LOBBY</div>
    <div class="codebig" id="codeVal" onclick="copyCode()">----</div>
    <div style="font-size:10px;color:rgba(255,255,255,.25);letter-spacing:2px;text-align:center;margin-bottom:12px">TIPPE ZUM KOPIEREN</div>
    <div class="plist" id="pListEl"></div>
    <button class="btn bgreen" id="startBtn" style="margin-bottom:8px;display:none">▶ SPIEL STARTEN</button>
    <div class="berr" id="lobbyInfo">Warte auf weitere Spieler…</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
'use strict';

// ════════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════════
var SUPA_URL   = 'https://ozvyymrqibpyqccgszlz.supabase.co';
var SUPA_KEY   = 'sb_publishable_30WmZF8d8h_rUSrTGtBwnQ_Kn9gquwL';
var PLR_COLORS = ['#ff1744','#ff6d00','#ffd600','#2ecc40','#00d4ff','#d500f9','#ff4081','#00e5ff'];
var COLOR_HEX  = {red:'#d42030', blue:'#1555b0', green:'#1e6e22', yellow:'#e09020'};
var COLOR_NAME = {red:'Rot', blue:'Blau', green:'Grün', yellow:'Gelb'};
var BOT_NAMES  = ['BOT ALEX','BOT SARA','BOT MAX'];

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
var sb = null;
var myId   = null;
var myName = 'PLAYER';
var isHost = false;
var myRoom = null;
var roomCh = null;
var gs     = null;

// Host-only deck/discard
var hDeck    = [];
var hDiscard = [];

// Lobby registry {id: {id,name,ci}}
var lobby = {};

// Card pending colour selection
var pendingCard = null;

// Solo / bot state
var isSolo       = false;
var botIds       = [];
var selBots      = 1;
var botTimer     = null;

// ════════════════════════════════════════════════════════
// CARD UTILITIES
// ════════════════════════════════════════════════════════
var _uid = 0;
function mkCard(c,v){ return {c:c,v:v,u:++_uid}; }

function buildDeck(){
  var cols=['red','blue','green','yellow'], d=[];
  cols.forEach(function(col){
    d.push(mkCard(col,'0'));
    for(var n=1;n<=9;n++){ d.push(mkCard(col,String(n))); d.push(mkCard(col,String(n))); }
    ['skip','reverse','draw2'].forEach(function(v){ d.push(mkCard(col,v)); d.push(mkCard(col,v)); });
  });
  for(var i=0;i<4;i++){ d.push(mkCard('wild','wild')); d.push(mkCard('wild','wild4')); }
  return d;
}

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; }
  return a;
}

function canPlay(card, top, curColor){
  if(card.c==='wild') return true;
  if(card.c===curColor) return true;
  if(card.v===top.v) return true;
  return false;
}

function cardLabel(v){
  if(v==='skip')    return '⊘';
  if(v==='reverse') return '↺';
  if(v==='draw2')   return '+2';
  if(v==='wild')    return '★';
  if(v==='wild4')   return '+4';
  return v;
}

function cardCls(card){ return 'uc-'+(card.c==='wild'?'wild':card.c); }

// ════════════════════════════════════════════════════════
// HOST GAME LOGIC
// ════════════════════════════════════════════════════════
function hostInitGame(){
  var ids = Object.keys(lobby);
  if(ids.length<2){ showToast('Mindestens 2 Spieler!'); return; }
  _uid=0; hDeck=shuffle(buildDeck()); hDiscard=[];
  var hands={};
  ids.forEach(function(pid){ hands[pid]=[]; for(var i=0;i<7;i++) hands[pid].push(hDeck.pop()); });
  var top=hDeck.pop();
  while(top.c==='wild'){ hDeck.unshift(top); top=hDeck.pop(); }
  hDiscard.push(top);
  var players=ids.map(function(pid,i){ return {id:pid,name:lobby[pid].name,ci:lobby[pid].ci||i}; });
  gs={phase:'playing',players:players,hands:hands,deckCount:hDeck.length,
      topCard:top,curColor:top.c,idx:0,dir:1,pendingDraws:0,drewUid:null,winner:null,lastAction:'Spiel gestartet!'};
  afterStateChange();
}

function hCur(){ return gs.players[gs.idx]; }

function hostAdvance(skip){
  var n=gs.players.length;
  gs.idx=((gs.idx+gs.dir*(skip||1))%n+n)%n;
  gs.drewUid=null;
}

function hostForceDraw(pid,amount){
  var hand=gs.hands[pid];
  for(var i=0;i<amount;i++){ if(hDeck.length===0) hostReshuffle(); if(hDeck.length>0) hand.push(hDeck.pop()); }
  gs.deckCount=hDeck.length; gs.pendingDraws=0;
  var pn=gs.players.find(function(p){return p.id===pid;}).name;
  gs.lastAction+=' → '+pn+' zieht '+amount+'!';
}

function hostReshuffle(){
  if(hDiscard.length<=1) return;
  var keep=hDiscard.pop(); hDeck=shuffle(hDiscard); hDiscard=[keep]; gs.deckCount=hDeck.length;
}

function hostPlayCard(pid, uid, chosenColor){
  if(!gs||gs.phase!=='playing') return;
  if(hCur().id!==pid) return;
  var hand=gs.hands[pid], ci=hand.findIndex(function(c){return c.u===uid;});
  if(ci<0) return;
  var card=hand[ci];
  if(gs.pendingDraws>0 && card.v!=='draw2' && card.v!=='wild4') return;
  if(!canPlay(card,gs.topCard,gs.curColor)) return;
  if(card.c==='wild'&&!chosenColor) return;
  hand.splice(ci,1);
  hDiscard.push(gs.topCard);
  gs.topCard=card; gs.drewUid=null; gs.deckCount=hDeck.length;
  var pn=gs.players.find(function(p){return p.id===pid;}).name;
  gs.lastAction=pn+' spielt '+cardLabel(card.v);
  if(hand.length===0){ gs.winner=pid; gs.phase='finished'; gs.lastAction=pn+' hat gewonnen! 🎉'; afterStateChange(); return; }
  var n=gs.players.length;
  if(card.c==='wild'){
    gs.curColor=chosenColor;
    if(card.v==='wild4'){
      gs.lastAction+=' ('+COLOR_NAME[chosenColor]+')';
      hostAdvance(1); hostForceDraw(hCur().id,4); hostAdvance(1);
    } else {
      gs.lastAction+=' ('+COLOR_NAME[chosenColor]+')'; hostAdvance(1);
    }
  } else {
    gs.curColor=card.c;
    if(card.v==='skip'){ gs.lastAction+=' — Aussetzen!'; hostAdvance(2); }
    else if(card.v==='reverse'){ gs.dir*=-1; gs.lastAction+=' — Wechsel!'; hostAdvance(n===2?2:1); }
    else if(card.v==='draw2'){ hostAdvance(1); hostForceDraw(hCur().id,2); hostAdvance(1); }
    else { hostAdvance(1); }
  }
  afterStateChange();
}

function hostDrawCard(pid){
  if(!gs||gs.phase!=='playing') return;
  if(hCur().id!==pid) return;
  if(gs.drewUid) return;
  if(gs.pendingDraws>0){ hostForceDraw(pid,gs.pendingDraws); hostAdvance(1); afterStateChange(); return; }
  if(hDeck.length===0) hostReshuffle();
  if(hDeck.length===0) return;
  var card=hDeck.pop(); gs.hands[pid].push(card); gs.deckCount=hDeck.length;
  var pn=gs.players.find(function(p){return p.id===pid;}).name;
  gs.lastAction=pn+' zieht eine Karte';
  if(!canPlay(card,gs.topCard,gs.curColor)){ hostAdvance(1); gs.lastAction+=' (kein Zug)'; }
  else { gs.drewUid=card.u; }
  afterStateChange();
}

function hostPassTurn(pid){
  if(!gs||gs.phase!=='playing') return;
  if(hCur().id!==pid) return;
  if(!gs.drewUid) return;
  var pn=gs.players.find(function(p){return p.id===pid;}).name;
  gs.drewUid=null; gs.lastAction=pn+' passt'; hostAdvance(1); afterStateChange();
}

// Central "after any state change" — broadcasts + triggers bot
function afterStateChange(){
  if(roomCh) roomCh.send({type:'broadcast',event:'state',payload:{s:gs}});
  updateGameUI();
  if(isSolo && gs && gs.phase==='playing' && isBotTurn()) scheduleBotTurn();
}

// ════════════════════════════════════════════════════════
// BOT AI
// ════════════════════════════════════════════════════════
function isBotTurn(){
  var cur=hCur();
  return cur && botIds.indexOf(cur.id)!==-1;
}

function scheduleBotTurn(){
  clearTimeout(botTimer);
  document.getElementById('botThinking').style.display='block';
  var delay = 700 + Math.random()*900;
  botTimer = setTimeout(doBotTurn, delay);
}

function doBotTurn(){
  document.getElementById('botThinking').style.display='none';
  if(!gs||gs.phase!=='playing') return;
  var cur=hCur();
  if(!cur||botIds.indexOf(cur.id)===-1) return;
  var hand=gs.hands[cur.id]||[];

  // Handle drawn card first
  if(gs.drewUid){
    var drew=hand.find(function(c){return c.u===gs.drewUid;});
    if(drew && canPlay(drew,gs.topCard,gs.curColor)){
      var col = drew.c==='wild' ? botPickColor(hand) : null;
      hostPlayCard(cur.id, drew.u, col);
    } else {
      hostPassTurn(cur.id);
    }
    return;
  }

  // Must draw stacked?
  if(gs.pendingDraws>0){
    var counter=hand.find(function(c){return c.v==='draw2'||c.v==='wild4';});
    if(counter && canPlay(counter,gs.topCard,gs.curColor)){
      hostPlayCard(cur.id,counter.u, counter.c==='wild'?botPickColor(hand):null);
    } else {
      hostDrawCard(cur.id);
    }
    return;
  }

  // Choose best playable card
  var playable=hand.filter(function(c){return canPlay(c,gs.topCard,gs.curColor);});
  if(playable.length===0){ hostDrawCard(cur.id); return; }

  var card=botPickCard(playable, hand);
  hostPlayCard(cur.id, card.u, card.c==='wild'?botPickColor(hand):null);
}

function botPickCard(playable, fullHand){
  var prio=['draw2','skip','reverse','wild4'];
  for(var i=0;i<prio.length;i++){
    var f=playable.find(function(c){return c.v===prio[i];});
    if(f) return f;
  }
  var colored=playable.filter(function(c){return c.c!=='wild';});
  if(colored.length>0) return colored[Math.floor(Math.random()*colored.length)];
  return playable[0];
}

function botPickColor(hand){
  var counts={red:0,blue:0,green:0,yellow:0};
  hand.forEach(function(c){ if(counts[c.c]!==undefined) counts[c.c]++; });
  var best='red', max=-1;
  Object.keys(counts).forEach(function(col){ if(counts[col]>max){max=counts[col];best=col;} });
  return best;
}

// ════════════════════════════════════════════════════════
// SOLO MODE
// ════════════════════════════════════════════════════════
function setBots(n){
  selBots=n;
  document.querySelectorAll('.bot-btn').forEach(function(b){
    b.classList.toggle('sel', parseInt(b.textContent)===n);
  });
}

function startSolo(){
  if(!validateName()) return;
  isSolo=true; isHost=true; roomCh=null;
  myId=myName+'_YOU';
  lobby={}; botIds=[];
  var ci=0;
  lobby[myId]={id:myId,name:myName,ci:ci++};
  for(var i=0;i<selBots;i++){
    var bid='bot_'+i;
    botIds.push(bid);
    lobby[bid]={id:bid,name:BOT_NAMES[i],ci:ci++};
  }
  hostInitGame();
  showScreen('sGame');
}

// ════════════════════════════════════════════════════════
// MULTIPLAYER — SUPABASE REALTIME
// ════════════════════════════════════════════════════════
function createRoom(){
  if(!validateName()) return;
  isSolo=false; myRoom=rndCode(); myId=myName+'_'+Date.now(); isHost=true;
  lobby={}; botIds=[];
  lobby[myId]={id:myId,name:myName,ci:0};
  showScreen('sLobby');
  document.getElementById('codeVal').textContent=myRoom;
  document.getElementById('startBtn').style.display='block';
  joinChannel();
}

function joinRoom(){
  if(!validateName()) return;
  var code=(document.getElementById('joinInput').value||'').trim().toUpperCase();
  if(code.length!==4){ setErr('Bitte 4-stelligen Code eingeben!'); return; }
  isSolo=false; myRoom=code; myId=myName+'_'+Date.now(); isHost=false;
  lobby={}; botIds=[];
  lobby[myId]={id:myId,name:myName,ci:0};
  showScreen('sLobby');
  document.getElementById('codeVal').textContent=myRoom;
  document.getElementById('startBtn').style.display='none';
  joinChannel();
}

function joinChannel(){
  if(roomCh) roomCh.unsubscribe();
  roomCh=sb.channel('uno_'+myRoom)
    .on('broadcast',{event:'join'},function(m){
      var p=m.payload;
      if(p.id===myId) return;
      if(!lobby[p.id]){
        lobby[p.id]=p;
        announce();
      } else {
        lobby[p.id].name=p.name;
      }
      updateLobbyUI();
    })
    .on('broadcast',{event:'leave'},function(m){
      delete lobby[m.payload.id]; updateLobbyUI();
      if(gs&&gs.phase==='playing'&&!isHost) showToast(m.payload.name+' hat das Spiel verlassen');
    })
    .on('broadcast',{event:'state'},function(m){
      if(isHost) return;
      gs=m.payload.s; updateGameUI();
    })
    .on('broadcast',{event:'action'},function(m){
      if(!isHost) return;
      var p=m.payload;
      if(p.a==='play')   hostPlayCard(p.pid,p.u,p.col);
      else if(p.a==='draw') hostDrawCard(p.pid);
      else if(p.a==='pass') hostPassTurn(p.pid);
    })
    .subscribe(function(){ setTimeout(announce,350); });
}

function announce(){
  var ci=Object.keys(lobby).indexOf(myId);
  roomCh&&roomCh.send({type:'broadcast',event:'join',payload:{id:myId,name:myName,ci:Math.max(ci,0)}});
}

function sendAction(payload){
  if(isHost){
    if(payload.a==='play')   hostPlayCard(payload.pid,payload.u,payload.col);
    else if(payload.a==='draw') hostDrawCard(payload.pid);
    else if(payload.a==='pass') hostPassTurn(payload.pid);
  } else {
    roomCh&&roomCh.send({type:'broadcast',event:'action',payload:payload});
  }
}

function leaveRoom(){
  clearTimeout(botTimer);
  document.getElementById('botThinking').style.display='none';
  if(roomCh){ roomCh.send({type:'broadcast',event:'leave',payload:{id:myId,name:myName}}); roomCh.unsubscribe(); roomCh=null; }
  gs=null; myRoom=null; isHost=false; lobby={}; pendingCard=null; isSolo=false; botIds=[];
  showScreen('sMenu');
}

function rndCode(){
  var ch='ABCDEFGHJKLMNPQRSTUVWXYZ2345679'; var s='';
  for(var i=0;i<4;i++) s+=ch[Math.floor(Math.random()*ch.length)]; return s;
}

// ════════════════════════════════════════════════════════
// PLAYER ACTIONS
// ════════════════════════════════════════════════════════
function onClickCard(card){
  if(!gs||gs.phase!=='playing') return;
  if(hCur().id!==myId) return;
  if(!canPlay(card,gs.topCard,gs.curColor)) return;
  if(gs.pendingDraws>0&&card.v!=='draw2'&&card.v!=='wild4') return;
  if(card.c==='wild'){ pendingCard=card; document.getElementById('colorPick').classList.remove('off'); return; }
  sendAction({a:'play',pid:myId,u:card.u});
}

function chooseColor(color){
  document.getElementById('colorPick').classList.add('off');
  if(!pendingCard) return;
  sendAction({a:'play',pid:myId,u:pendingCard.u,col:color}); pendingCard=null;
}

function onClickDraw(){
  if(!gs||gs.phase!=='playing') return;
  if(hCur().id!==myId) return;
  if(gs.drewUid){ onPassTurn(); return; }
  sendAction({a:'draw',pid:myId});
}

function onPassTurn(){
  if(!gs||gs.phase!=='playing') return;
  if(hCur().id!==myId) return;
  if(!gs.drewUid) return;
  sendAction({a:'pass',pid:myId});
}

function shoutUno(){ showToast('UNO! 🃏'); }

// ════════════════════════════════════════════════════════
// UI
// ════════════════════════════════════════════════════════
function showScreen(id){
  ['sMenu','sLobby','sGame','sWinner'].forEach(function(s){
    document.getElementById(s).classList.toggle('off',s!==id);
  });
}

function updateLobbyUI(){
  var ids=Object.keys(lobby); var html='';
  ids.forEach(function(pid,i){
    var p=lobby[pid]; var col=PLR_COLORS[i%PLR_COLORS.length];
    html+='<div class="pslot filled"><div class="pslot-dot" style="background:'+col+'"></div>'
      +(p.name||'?')+(pid===myId?' <span style="color:rgba(0,212,255,.5);font-size:11px">(Du)</span>':'')+'</div>';
  });
  document.getElementById('pListEl').innerHTML=html;
  var info=document.getElementById('lobbyInfo'), sb2=document.getElementById('startBtn');
  if(isHost){ if(ids.length<2){info.textContent='Warte auf mindestens 1 weiteren Spieler…';sb2.style.display='none';}
    else{info.textContent='';sb2.style.display='block';} }
  else{ info.textContent=ids.length+' Spieler — Warte auf Host…'; }
}

function buildCardEl(card, playable, large){
  var el=document.createElement('div');
  el.className='ucard '+cardCls(card)+(large?' large':'')+(playable?' playable':' dim');
  var lbl=cardLabel(card.v);
  el.innerHTML='<span class="ucard-corner tl">'+lbl+'</span>'
    +'<span class="ucard-val'+(lbl.length>2?' sm':'')+'">'+lbl+'</span>'
    +'<span class="ucard-corner br">'+lbl+'</span>';
  if(playable) el.addEventListener('click',function(){onClickCard(card);});
  return el;
}

function updateGameUI(){
  if(!gs) return;
  if(gs.phase==='finished'){
    clearTimeout(botTimer);
    document.getElementById('botThinking').style.display='none';
    showScreen('sWinner');
    var w=gs.players.find(function(p){return p.id===gs.winner;});
    document.getElementById('winnerNameEl').textContent=w?w.name:'???';
    var bot=botIds.indexOf(gs.winner)!==-1;
    document.getElementById('winnerSubEl').textContent=
      gs.winner===myId ? 'Du hast gewonnen! 🎉' : (bot?'Der Bot hat gewonnen!':'Besser nächstes Mal!');
    document.getElementById('playAgainBtn').style.display=isHost?'block':'none';
    return;
  }
  if(gs.phase!=='playing') return;
  showScreen('sGame');

  var myHand=gs.hands[myId]||[], cur=gs.players[gs.idx];
  var isMyTurn=cur&&cur.id===myId;
  var hex=COLOR_HEX[gs.curColor]||'#fff';

  // Colour ring
  var ring=document.getElementById('colorRing');
  ring.style.background=hex; ring.style.boxShadow='0 0 16px '+hex+', 0 0 6px '+hex;

  // Direction, deck count, last action
  document.getElementById('dirBadge').textContent=gs.dir===1?'▶▶':'◀◀';
  document.getElementById('deckCountLbl').textContent=(gs.deckCount||0)+' Karten';
  document.getElementById('lastActionLbl').textContent=gs.lastAction||'';

  // Draw pile — locked when not my turn
  var dp=document.getElementById('drawPileEl');
  var canDraw=isMyTurn&&!gs.drewUid;
  if(isMyTurn&&!isBotTurn()){
    dp.classList.remove('draw-pile-locked');
    dp.style.opacity='1';
    dp.style.cursor=canDraw?'pointer':'default';
  } else {
    dp.classList.add('draw-pile-locked');
  }

  // Discard
  var discEl=document.getElementById('discardEl'); discEl.innerHTML='';
  if(gs.topCard){
    var tc=buildCardEl(gs.topCard,false,true); tc.classList.remove('dim');
    if(gs.topCard.c==='wild'){ tc.style.outline='3px solid '+hex; tc.style.outlineOffset='3px'; }
    discEl.appendChild(tc);
  }

  // Opponents
  var oppsEl=document.getElementById('oppsEl'); oppsEl.innerHTML='';
  gs.players.forEach(function(p){
    if(p.id===myId) return;
    var hand=gs.hands[p.id]||[], active=cur&&cur.id===p.id;
    var col=PLR_COLORS[p.ci%PLR_COLORS.length];
    var isBot=botIds.indexOf(p.id)!==-1;
    var div=document.createElement('div');
    div.className='opp'+(active?' active':'');
    div.innerHTML='<div class="opp-circle" style="background:'+col+'">'+p.name.substring(0,2).toUpperCase()+'</div>'
      +'<div class="opp-name" style="color:'+col+'">'+p.name+'</div>'
      +(isBot?'<div class="opp-bot">BOT</div>':'')
      +'<div class="opp-count">'+hand.length+'</div>'
      +(hand.length===1?'<div class="opp-uno">UNO!</div>':'');
    oppsEl.appendChild(div);
  });

  // My hand
  var handEl=document.getElementById('handEl'); handEl.innerHTML='';
  myHand.forEach(function(card){
    var pl=isMyTurn&&canPlay(card,gs.topCard,gs.curColor)&&(gs.pendingDraws===0||card.v==='draw2'||card.v==='wild4');
    if(isMyTurn&&gs.drewUid===card.u&&canPlay(card,gs.topCard,gs.curColor)) pl=true;
    handEl.appendChild(buildCardEl(card,pl,false));
  });

  // Hand area turn locking
  var handArea=document.getElementById('handArea');
  var waitingLabel=document.getElementById('waitingLabel');
  if(isMyTurn){
    handArea.classList.remove('not-my-turn');
    handArea.classList.add('my-turn');
    waitingLabel.style.display='none';
  } else {
    handArea.classList.add('not-my-turn');
    handArea.classList.remove('my-turn');
    var botTurnNow=cur&&botIds.indexOf(cur.id)!==-1;
    waitingLabel.style.display='block';
    waitingLabel.textContent=botTurnNow?'BOT DENKT NACH…':'WARTEN…';
  }

  // Turn badge
  var tb=document.getElementById('turnBadge');
  var botTurn=cur&&botIds.indexOf(cur.id)!==-1;
  tb.textContent = isMyTurn ? (gs.pendingDraws>0?'ZIEHE '+gs.pendingDraws+'!':'DEIN ZUG!')
                            : ((cur?cur.name:'?')+' ist dran');
  tb.className='turn-badge '+(isMyTurn?'turn-me':botTurn?'turn-bot':'turn-other');
  document.getElementById('myLabel').textContent=myName+' ('+myHand.length+')';

  // Overlays
  document.getElementById('unoBtnWrap').style.display=myHand.length===1?'block':'none';
  document.getElementById('passBtn').style.display=(isMyTurn&&gs.drewUid)?'block':'none';
}

function showToast(msg){
  var t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(function(){t.remove();},2600);
}

function copyCode(){
  var code=document.getElementById('codeVal').textContent;
  if(navigator.clipboard) navigator.clipboard.writeText(code).then(function(){showToast('Code kopiert: '+code);});
  else showToast(code);
}

function setErr(msg){ document.getElementById('menuErr').textContent=msg; }

// ════════════════════════════════════════════════════════
// NAME
// ════════════════════════════════════════════════════════
function validateName(){
  var name=(document.getElementById('nameInp').value||'').trim().toUpperCase()||myName;
  if(!name){setErr('Bitte gib einen Namen ein!');return false;}
  myName=name; localStorage.setItem('playerName',myName);
  document.getElementById('pName').textContent=myName; setErr(''); return true;
}
function saveName(){
  var name=(document.getElementById('nameInp').value||'').trim().toUpperCase();
  if(!name) return;
  myName=name; localStorage.setItem('playerName',myName);
  document.getElementById('pName').textContent=myName; showToast('Name: '+myName);
}

// ════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════
window.addEventListener('load',function(){
  var stored=localStorage.getItem('playerName');
  if(stored){myName=stored;document.getElementById('pName').textContent=myName;document.getElementById('nameInp').value=myName;}
  if(typeof supabase!=='undefined') sb=supabase.createClient(SUPA_URL,SUPA_KEY);

  document.getElementById('soloBtn').addEventListener('click',function(){
    document.getElementById('soloBox').classList.toggle('show');
    document.getElementById('multibtns').classList.remove('show');
  });
  document.getElementById('startSoloBtn').addEventListener('click',startSolo);
  document.getElementById('multiBtn').addEventListener('click',function(){
    document.getElementById('multibtns').classList.toggle('show');
    document.getElementById('soloBox').classList.remove('show');
  });
  document.getElementById('createBtn').addEventListener('click',createRoom);
  document.getElementById('joinShowBtn').addEventListener('click',function(){document.getElementById('joinRow').classList.add('show');document.getElementById('joinInput').focus();});
  document.getElementById('joinBtn').addEventListener('click',joinRoom);
  document.getElementById('joinInput').addEventListener('keydown',function(e){if(e.key==='Enter')joinRoom();});
  document.getElementById('nameBtn').addEventListener('click',saveName);
  document.getElementById('nameInp').addEventListener('keydown',function(e){if(e.key==='Enter')saveName();});
  document.getElementById('startBtn').addEventListener('click',function(){
    if(!isHost) return;
    if(Object.keys(lobby).length<2){document.getElementById('lobbyInfo').textContent='Mindestens 2 Spieler!';return;}
    hostInitGame(); showScreen('sGame');
    roomCh&&roomCh.send({type:'broadcast',event:'state',payload:{s:gs}});
  });
  document.getElementById('leaveBtn').addEventListener('click',leaveRoom);
  document.getElementById('wLeaveBtn').addEventListener('click',leaveRoom);
  document.getElementById('playAgainBtn').addEventListener('click',function(){
    if(!isHost) return;
    hostInitGame(); showScreen('sGame');
    roomCh&&roomCh.send({type:'broadcast',event:'state',payload:{s:gs}});
  });
});
</script>
