<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UNO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a0a;color:#fff;font-family:'Exo 2',sans-serif;user-select:none;-webkit-user-select:none}

/* ═══ SCREENS ═══ */
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px 16px 32px;overflow-y:auto;background:#1a0a0a}
.screen.off{display:none!important}
#sMenu::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(215,32,39,.18) 0%,transparent 60%);pointer-events:none;z-index:0}
.screen>*{position:relative;z-index:1}

/* ═══ UNO OFFICIAL LOGO ═══ */
.uno-logo{font-family:'Russo One',sans-serif;font-size:clamp(68px,19vw,120px);color:#fff;background:#D72027;padding:2px 28px 10px;border-radius:16px;letter-spacing:12px;text-indent:12px;box-shadow:0 8px 0 #8a0a10,0 14px 36px rgba(0,0,0,.6),inset 0 2px 0 rgba(255,255,255,.25);border:3px solid rgba(255,255,255,.88);transform:rotate(-1.5deg);text-shadow:2px 2px 6px rgba(0,0,0,.35);line-height:1.1}
.uno-sub{color:rgba(255,255,255,.35);letter-spacing:8px;font-size:11px;text-transform:uppercase}
.sep{width:80px;height:2px;background:linear-gradient(90deg,transparent,#D72027,transparent)}

/* ═══ BUTTONS ═══ */
.btn{font-family:'Russo One',sans-serif;font-size:15px;letter-spacing:1.5px;padding:14px 28px;border:none;border-radius:12px;cursor:pointer;transition:transform .15s,opacity .15s,box-shadow .15s;text-transform:uppercase;touch-action:manipulation;width:min(300px,90vw);display:block;text-align:center;text-decoration:none}
.btn:active{transform:scale(.95);opacity:.85}
.bred{background:linear-gradient(160deg,#c01820,#e82030);color:#fff;box-shadow:0 5px 0 #8a0010,0 8px 22px rgba(215,32,39,.4);border:1px solid rgba(255,255,255,.15)}
.bred:active{box-shadow:0 2px 0 #8a0010,0 4px 12px rgba(215,32,39,.3);transform:translateY(3px) scale(.97)}
.bcyan{background:linear-gradient(135deg,#006680,#00b8c8);color:#fff;box-shadow:0 4px 0 #004455,0 7px 20px rgba(0,184,200,.3)}
.bcyan:active{box-shadow:0 1px 0 #004455;transform:translateY(3px) scale(.97)}
.bgreen{background:linear-gradient(135deg,#157a10,#29b820);color:#fff;box-shadow:0 4px 0 #0a4a08,0 7px 20px rgba(41,184,32,.3)}
.bgreen:active{box-shadow:0 1px 0 #0a4a08;transform:translateY(3px) scale(.97)}
.bghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.15)}
.bgold{background:linear-gradient(135deg,#8a5200,#f0a800);color:#fff;box-shadow:0 4px 0 #5a3200,0 7px 20px rgba(240,168,0,.3)}
.bgold:active{box-shadow:0 1px 0 #5a3200;transform:translateY(3px) scale(.97)}
.berr{color:#ff4040;font-size:12px;text-align:center;min-height:14px;letter-spacing:1px}

/* ═══ PROFILE ═══ */
.pcard{background:rgba(30,8,8,.95);border:2px solid rgba(215,32,39,.4);border-radius:14px;padding:12px 18px;width:min(320px,93vw);display:flex;align-items:center;gap:12px;box-shadow:0 0 30px rgba(215,32,39,.1)}
.pname{font-weight:900;font-size:16px;color:#ff6060;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ═══ INPUTS ═══ */
.nameinp{background:rgba(20,5,5,1);border:2px solid rgba(215,32,39,.4);color:#ff6060;font-family:'Russo One',sans-serif;font-size:18px;padding:10px 14px;border-radius:9px;outline:none;width:min(250px,78vw);text-align:center;letter-spacing:3px;text-transform:uppercase}
.nameinp:focus{border-color:#D72027;box-shadow:0 0 12px rgba(215,32,39,.25)}
.jinp{background:rgba(20,5,5,1);border:2px solid rgba(215,32,39,.4);color:#ffaaaa;font-family:'Russo One',sans-serif;font-size:22px;padding:10px 14px;border-radius:9px;outline:none;width:120px;text-align:center;letter-spacing:6px;text-transform:uppercase}
.jinp:focus{border-color:#D72027}
.multibtns{display:none;flex-direction:column;gap:9px;align-items:center;width:100%}
.multibtns.show{display:flex}
.joinrow{display:none;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.joinrow.show{display:flex}

/* ═══ SOLO BOX ═══ */
.solo-box{background:rgba(10,30,10,.95);border:2px solid rgba(41,184,32,.3);border-radius:14px;padding:16px 20px;width:min(300px,90vw);display:none;flex-direction:column;align-items:center;gap:12px}
.solo-box.show{display:flex}
.solo-label{font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:4px;color:rgba(255,255,255,.35)}
.bot-row{display:flex;gap:12px}
.bot-btn{font-family:'Russo One',sans-serif;font-size:20px;width:58px;height:58px;border-radius:12px;border:2px solid rgba(41,184,32,.25);background:rgba(10,25,10,1);color:rgba(255,255,255,.35);cursor:pointer;transition:all .15s;touch-action:manipulation}
.bot-btn.sel{background:rgba(41,184,32,.12);border-color:#29b820;color:#60e055;box-shadow:0 0 14px rgba(41,184,32,.2)}
.bot-btn:active{transform:scale(.9)}

/* ═══ LOBBY ═══ */
.lbox{background:rgba(15,5,5,.98);border:2px solid rgba(215,32,39,.3);border-radius:22px;padding:26px 22px;width:min(420px,95vw);box-shadow:0 0 50px rgba(215,32,39,.06)}
.ltitle{font-family:'Russo One',sans-serif;font-size:22px;color:#ff6060;text-align:center;letter-spacing:4px;margin-bottom:18px}
.codebig{font-family:'Russo One',sans-serif;font-size:46px;color:#ffd700;letter-spacing:12px;text-align:center;padding:14px;background:rgba(10,5,0,1);border:2px dashed rgba(255,215,0,.4);border-radius:12px;margin-bottom:6px;cursor:pointer;transition:all .2s;filter:drop-shadow(0 0 10px rgba(255,215,0,.35))}
.codebig:hover{border-color:rgba(255,215,0,.7);filter:drop-shadow(0 0 22px rgba(255,215,0,.55))}
.copy-hint{font-size:10px;color:rgba(255,255,255,.22);letter-spacing:2px;text-align:center;margin-bottom:12px}
.plist{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;min-height:48px}
.pslot{background:rgba(12,5,5,1);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:11px 14px;font-size:13px;display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.35)}
.pslot.filled{border-color:rgba(215,32,39,.35);color:#fff}
.pslot-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;box-shadow:0 0 7px currentColor}
.pslot-you{font-size:10px;color:rgba(255,100,100,.55);letter-spacing:1px;margin-left:auto}
.waiting-dots span{animation:dotBlink 1.4s ease-in-out infinite}
.waiting-dots span:nth-child(2){animation-delay:.2s}
.waiting-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotBlink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ═══ GAME SCREEN — GREEN FELT ═══ */
#sGame{padding:0;justify-content:flex-start;overflow:hidden;gap:0;background:radial-gradient(ellipse at 50% 40%,#1d6e34 0%,#0e4a1e 55%,#072a10 100%)}

/* ═══ TURN BANNER ═══ */
#turnBanner{position:fixed;top:0;left:0;right:0;z-index:50;min-height:46px;display:flex;align-items:center;justify-content:center;font-family:'Russo One',sans-serif;font-size:14px;letter-spacing:3px;transition:background .3s,color .3s}
.tb-mine{background:rgba(0,0,0,.55);border-bottom:3px solid #39d020;color:#6fff58;animation:tbpulse 1.1s ease-in-out infinite}
.tb-other{background:rgba(0,0,0,.45);border-bottom:2px solid rgba(255,255,255,.12);color:rgba(255,255,255,.4)}
.tb-bot{background:rgba(0,0,0,.45);border-bottom:2px solid rgba(255,180,0,.25);color:rgba(255,180,0,.65)}
@keyframes tbpulse{0%,100%{box-shadow:0 3px 20px rgba(57,208,32,.1)}50%{box-shadow:0 3px 36px rgba(57,208,32,.3)}}

/* ═══ YOUR TURN FLASH ═══ */
#turnFlash{position:fixed;inset:0;z-index:49;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0}
#turnFlash.show{animation:flashBg .7s ease forwards}
@keyframes flashBg{0%{opacity:0}20%{opacity:1;background:rgba(57,208,32,.06)}100%{opacity:0;background:rgba(57,208,32,0)}}
#turnFlash-label{font-family:'Russo One',sans-serif;font-size:52px;color:#6fff58;letter-spacing:6px;text-shadow:0 0 30px rgba(57,208,32,.9);animation:flashLbl .7s ease forwards}
@keyframes flashLbl{0%{transform:scale(.5);opacity:0}35%{transform:scale(1.12);opacity:1}100%{transform:scale(1.5);opacity:0}}

/* ═══ OPPONENTS BAR ═══ */
.opp-bar{display:flex;gap:8px;padding:50px 10px 8px;overflow-x:auto;min-height:100px;align-items:center;width:100%;flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,.08)}
.opp-bar::-webkit-scrollbar{display:none}
.opp{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:70px;padding:6px 6px 8px;border-radius:14px;border:2px solid transparent;transition:all .3s;flex-shrink:0}
.opp.active{border-color:rgba(255,220,0,.65);background:rgba(255,220,0,.07);animation:oppglow 1.2s ease-in-out infinite}
@keyframes oppglow{0%,100%{box-shadow:0 0 0 0 rgba(255,220,0,.1)}50%{box-shadow:0 0 18px 4px rgba(255,220,0,.1)}}
.opp-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Russo One',sans-serif;font-size:14px;color:#fff;border:2px solid rgba(255,255,255,.2);flex-shrink:0;font-weight:900}
.opp-nm{font-family:'Russo One',sans-serif;font-size:9px;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;text-align:center;color:rgba(255,255,255,.55)}
.opp-cnt{font-family:'Russo One',sans-serif;font-size:20px;color:#fff;line-height:1;margin-top:2px}
.opp-uno{color:#ff4040;font-size:8px;letter-spacing:2px;font-weight:900;animation:unopop .5s ease infinite alternate}
@keyframes unopop{from{opacity:.4}to{opacity:1}}
.opp-mini{display:flex;gap:2px;margin-top:3px}
.opp-mc{width:8px;height:12px;border-radius:2px;background:#B01A22;border:1px solid rgba(255,255,255,.2);flex-shrink:0}

/* ═══ TABLE AREA ═══ */
.table-area{flex:1;display:flex;align-items:center;justify-content:center;gap:22px;padding:8px 14px;overflow:hidden;min-height:0}

/* ═══ DRAW PILE (stacked cards effect) ═══ */
.draw-stack{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.draw-stack::before{content:'';position:absolute;top:0;left:0;width:82px;height:120px;background:#9a1520;border:3px solid rgba(255,255,255,.3);border-radius:11px;transform:rotate(-5deg) translate(-4px,3px);z-index:-1}
.draw-stack::after{content:'';position:absolute;top:0;left:0;width:82px;height:120px;background:#7a1018;border:3px solid rgba(255,255,255,.2);border-radius:11px;transform:rotate(-9deg) translate(-7px,5px);z-index:-2}
.deck-lbl{font-family:'Russo One',sans-serif;font-size:10px;color:rgba(255,255,255,.5);letter-spacing:2px;text-shadow:0 1px 3px rgba(0,0,0,.5)}

/* ═══ DISCARD PILE ═══ */
.discard-pile{display:flex;align-items:center;justify-content:center;position:relative}

/* ═══ INFO COLUMN ═══ */
.info-col{display:flex;flex-direction:column;align-items:center;gap:10px}
.color-ring{width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,.4);transition:background .4s,box-shadow .4s}
.dir-badge{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-family:'Russo One',sans-serif;font-size:13px;color:rgba(255,255,255,.5);letter-spacing:2px}
.last-act{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.5px;text-align:center;max-width:76px;line-height:1.6;text-shadow:0 1px 2px rgba(0,0,0,.5)}

/* ═══ HAND AREA ═══ */
.hand-area{background:rgba(0,0,0,.55);padding:8px 10px 14px;border-top:2px solid rgba(255,255,255,.1);flex-shrink:0;width:100%;backdrop-filter:blur(4px)}
.hand-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:6px}
.my-label{font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.4)}
.hand-scroll{display:flex;gap:5px;overflow-x:auto;padding:4px 2px 8px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.hand-scroll::-webkit-scrollbar{display:none}

/* ═══════════════════════════════════════════
   OFFICIAL UNO CARD DESIGN
═══════════════════════════════════════════ */
.ucard{
  width:62px;height:90px;border-radius:9px;
  position:relative;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  border:3px solid rgba(255,255,255,.88);
  box-shadow:0 4px 14px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.15);
  flex-shrink:0;
  transition:transform .15s,box-shadow .15s;
  cursor:default;font-family:'Russo One',sans-serif;
}
.ucard.large{width:82px;height:120px;border-radius:11px}

/* White rotated oval — the signature UNO element */
.ucard-oval{
  position:absolute;
  width:84%;height:67%;
  background:#fff;
  border-radius:50%;
  transform:rotate(-18deg);
  z-index:1;
  pointer-events:none;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}

/* Center symbol — sits on white oval, in card's color */
.ucard-val{
  position:relative;z-index:2;
  font-family:'Russo One',sans-serif;font-size:26px;line-height:1;font-weight:900;
}
.ucard.large .ucard-val{font-size:38px}
.ucard-val.sm{font-size:18px}
.ucard.large .ucard-val.sm{font-size:26px}

/* Corner labels */
.ucard-corner{
  position:absolute;font-family:'Russo One',sans-serif;
  font-size:11px;font-weight:900;line-height:1;z-index:2;color:#fff;
}
.ucard.large .ucard-corner{font-size:13px}
.ucard-corner.tl{top:4px;left:5px}
.ucard-corner.br{bottom:4px;right:5px;transform:rotate(180deg)}

/* ── Official UNO palette — FLAT colors ── */
.uc-red   {background:#D72027}
.uc-blue  {background:#0057A7}
.uc-green {background:#1B9B3D}
.uc-yellow{background:#F5C800}

/* Wild: four-color pie */
.uc-wild{background:conic-gradient(#D72027 0 90deg,#F5C800 90deg 180deg,#1B9B3D 180deg 270deg,#0057A7 270deg 360deg);border-color:rgba(255,255,255,.65)}

/* Symbol color (card color, on white oval) */
.uc-red    .ucard-val{color:#C41C22}
.uc-blue   .ucard-val{color:#004E9A}
.uc-green  .ucard-val{color:#178A35}
.uc-yellow .ucard-val{color:#B89400}
.uc-wild   .ucard-val{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.65)}

/* Yellow card: dark corners for readability */
.uc-yellow .ucard-corner{color:#1a1a1a}

/* Playable card: bright white glow + lift */
.ucard.playable{
  box-shadow:0 0 28px rgba(255,255,255,.8),0 4px 14px rgba(0,0,0,.5)!important;
  border-color:#fff!important;
  cursor:pointer;
  transform:translateY(-7px);
}
.ucard.playable:active{transform:translateY(-18px) scale(1.12)!important;transition:transform .07s}
.ucard.dim{opacity:.35;cursor:default}

/* ── Card back: dark red + yellow oval + UNO ── */
.ucard-back{background:#B01A22;border-color:rgba(255,255,255,.6);cursor:pointer}
.ucard-back::before{
  content:'';position:absolute;
  width:84%;height:67%;
  background:#FFD700;
  border-radius:50%;
  transform:rotate(-18deg);
  z-index:1;
  border:2px solid rgba(160,100,0,.2);
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.ucard-back::after{
  content:'UNO';position:absolute;z-index:2;
  font-family:'Russo One',sans-serif;font-size:15px;
  color:#B01A22;letter-spacing:4px;
  text-shadow:0 1px 0 rgba(0,0,0,.1);
}
.ucard-back.large::after{font-size:21px}

/* ═══ BOT THINKING ═══ */
#botThinking{position:fixed;top:54px;left:50%;transform:translateX(-50%);z-index:60;background:rgba(10,5,0,.95);border:1px solid rgba(255,180,0,.3);border-radius:20px;padding:5px 16px;font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,180,0,.75);display:none;pointer-events:none}

/* ═══ PASS + UNO BUTTONS ═══ */
#passBtn{position:fixed;bottom:16px;right:16px;z-index:80;display:none;font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:1px;padding:12px 20px;border:none;border-radius:12px;cursor:pointer;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);touch-action:manipulation;backdrop-filter:blur(8px)}
#passBtn:active{opacity:.7;transform:scale(.96)}
#unoBtnWrap{position:fixed;bottom:120px;right:16px;z-index:80;display:none}
#unoBtn{font-family:'Russo One',sans-serif;font-size:22px;letter-spacing:4px;padding:13px 22px;border:none;border-radius:14px;cursor:pointer;background:#D72027;color:#fff;border:3px solid rgba(255,255,255,.85);box-shadow:0 6px 0 #8a0010,0 10px 28px rgba(215,32,39,.55);animation:unopulse .9s ease-in-out infinite;touch-action:manipulation}
@keyframes unopulse{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.08) translateY(-3px)}}

/* ═══ COLOUR PICKER ═══ */
#colorPick{position:fixed;inset:0;z-index:200;background:rgba(5,2,2,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;backdrop-filter:blur(6px)}
#colorPick.off{display:none}
.cp-title{font-family:'Russo One',sans-serif;font-size:22px;letter-spacing:5px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.cp-sub{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:3px}
.cp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cp-btn{
  width:136px;height:136px;border-radius:50%;
  border:4px solid rgba(255,255,255,.85);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;font-family:'Russo One',sans-serif;font-size:15px;letter-spacing:2px;color:#fff;
  transition:transform .15s,box-shadow .2s;touch-action:manipulation;
  box-shadow:0 6px 0 rgba(0,0,0,.4),0 10px 28px rgba(0,0,0,.4);
}
.cp-btn:active{transform:scale(.88) translateY(4px)}
.cp-icon{font-size:34px}
.cp-red   {background:#D72027;box-shadow:0 6px 0 #8a0010,0 10px 28px rgba(215,32,39,.4)}
.cp-blue  {background:#0057A7;box-shadow:0 6px 0 #003470,0 10px 28px rgba(0,87,167,.4)}
.cp-green {background:#1B9B3D;box-shadow:0 6px 0 #0e5e25,0 10px 28px rgba(27,155,61,.4)}
.cp-yellow{background:#F5C800;box-shadow:0 6px 0 #a07c00,0 10px 28px rgba(245,200,0,.4)}
.cp-red:hover  {box-shadow:0 8px 0 #8a0010,0 14px 36px rgba(215,32,39,.6)}
.cp-blue:hover {box-shadow:0 8px 0 #003470,0 14px 36px rgba(0,87,167,.6)}
.cp-green:hover{box-shadow:0 8px 0 #0e5e25,0 14px 36px rgba(27,155,61,.6)}
.cp-yellow:hover{box-shadow:0 8px 0 #a07c00,0 14px 36px rgba(245,200,0,.6)}

/* ═══ WINNER ═══ */
.winner-box{background:rgba(8,3,3,.99);border:3px solid #D72027;border-radius:22px;padding:36px 28px;width:min(340px,92vw);display:flex;flex-direction:column;align-items:center;gap:18px;box-shadow:0 0 60px rgba(215,32,39,.15)}
.winner-trophy{font-size:72px;animation:trophy 2s ease-in-out infinite}
@keyframes trophy{0%,100%{transform:scale(1) rotate(-4deg)}50%{transform:scale(1.14) rotate(4deg)}}
.winner-title{font-family:'Russo One',sans-serif;font-size:28px;color:#FFD700;letter-spacing:5px;text-align:center;filter:drop-shadow(0 0 16px rgba(255,215,0,.7))}
.winner-name{font-family:'Russo One',sans-serif;font-size:36px;color:#fff;text-align:center;text-shadow:0 0 20px rgba(255,255,255,.4)}
.winner-sub{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:2px;text-align:center;line-height:1.7}

/* ═══ LEADERBOARD ═══ */
#sLeaderboard{background:#0e0505}

<script>
'use strict';

var SUPA_URL   = 'https://ozvyymrqibpyqccgszlz.supabase.co';
var SUPA_KEY   = 'sb_publishable_30WmZF8d8h_rUSrTGtBwnQ_Kn9gquwL';
var PLR_COLORS = ['#D72027','#0057A7','#1B9B3D','#F5C800','#ff00aa','#9b00ff','#ff6600','#00bbaa'];
var COLOR_HEX  = {red:'#D72027', blue:'#0057A7', green:'#1B9B3D', yellow:'#F5C800'};
var COLOR_NAME = {red:'Rot', blue:'Blau', green:'Grün', yellow:'Gelb'};
var BOT_NAMES  = ['BOT ALEX','BOT SARA','BOT MAX'];

var sb = null;
var myId   = null;
var myName = 'PLAYER';
var isHost = false;
var myRoom = null;
var roomCh = null;
var gs     = null;

var hDeck    = [];
var hDiscard = [];
var lobby    = {};
var pendingCard = null;
var isSolo   = false;
var botIds   = [];
var selBots  = 1;
var botTimer = null;
var heartbeatTimer = null;
var scoreSubmitted = false;
var lbPrevScreen   = 'sMenu';
var prevTurnId = null;

// ════ CARD UTILS ════
var _uid = 0;
function mkCard(c,v){ return {c:c,v:v,u:++_uid}; }

function buildDeck(){
  var cols=['red','blue','green','yellow'], d=[];
  cols.forEach(function(col){
    d.push(mkCard(col,'0'));
    for(var n=1;n<=9;n++){ d.push(mkCard(col,String(n))); d.push(mkCard(col,String(n))); }
    ['skip','reverse','draw2'].forEach(function(v){ d.push(mkCard(col,v)); d.push(mkCard(col,v)); });
  });
  for(var i=0;i<4;i++){ d.push(mkCard('wild','wild')); d.push(mkCard('wild','wild4')); }
  return d;
}

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; }
  return a;
}

function canPlay(card, top, curColor){
  if(card.c==='wild') return true;
  if(card.c===curColor) return true;
  if(card.v===top.v) return true;
  return false;
}

function cardLabel(v){
  if(v==='skip')    return '⊘';
  if(v==='reverse') return '↺';
  if(v==='draw2')   return '+2';
  if(v==='wild')    return '★';
  if(v==='wild4')   return '+4';
  return v;
}

function cardCls(card){ return 'uc-'+(card.c==='wild'?'wild':card.c); }

// ════ HOST GAME LOGIC ════
function hostInitGame(){
  var ids = Object.keys(lobby);
  if(ids.length<2){ showToast('Mindestens 2 Spieler!'); return; }
  _uid=0; hDeck=shuffle(buildDeck()); hDiscard=[];
  scoreSubmitted=false;
  var hands={};
  ids.forEach(function(pid){ hands[pid]=[]; for(var i=0;i<7;i++) hands[pid].push(hDeck.pop()); });
  var top=hDeck.pop();
  while(top.c==='wild'){ hDeck.unshift(top); top=hDeck.pop(); }
  hDiscard.push(top);
  var players=ids.map(function(pid,i){ return {id:pid,name:lobby[pid].name,ci:i}; });
  gs={phase:'playing',players:players,hands:hands,deckCount:hDeck.length,
      topCard:top,curColor:top.c,idx:0,dir:1,pendingDraws:0,drewUid:null,winner:null,lastAction:'Spiel gestartet!'};
  prevTurnId = null;
  afterStateChange();
}

function curPlayer(){ return gs && gs.players && gs.players[gs.idx]; }

function hostAdvance(skip){
  var n=gs.players.length;
  gs.idx=((gs.idx+gs.dir*(skip||1))%n+n)%n;
  gs.drewUid=null;
}

function hostForceDraw(pid,amount){
  var hand=gs.hands[pid];
  for(var i=0;i<amount;i++){ if(hDeck.length===0) hostReshuffle(); if(hDeck.length>0) hand.push(hDeck.pop()); }
  gs.deckCount=hDeck.length; gs.pendingDraws=0;
  var pn=playerName(pid);
  gs.lastAction+=' → '+pn+' zieht '+amount+'!';
}

function hostReshuffle(){
  if(hDiscard.length<=1) return;
  var keep=hDiscard.pop(); hDeck=shuffle(hDiscard); hDiscard=[keep]; gs.deckCount=hDeck.length;
}

function playerName(pid){
  var p=gs.players.find(function(x){return x.id===pid;});
  return p ? p.name : '?';
}

function hostPlayCard(pid, uid, chosenColor){
  if(!gs||gs.phase!=='playing') return;
  if(!curPlayer()||curPlayer().id!==pid) return;
  var hand=gs.hands[pid];
  if(!hand) return;
  var ci=hand.findIndex(function(c){return c.u===uid;});
  if(ci<0) return;
  var card=hand[ci];
  if(gs.pendingDraws>0 && card.v!=='draw2' && card.v!=='wild4') return;
  if(!canPlay(card,gs.topCard,gs.curColor)) return;
  if(card.c==='wild'&&!chosenColor) return;
  hand.splice(ci,1);
  hDiscard.push(gs.topCard);
  gs.topCard=card; gs.drewUid=null; gs.deckCount=hDeck.length;
  gs.lastAction=playerName(pid)+' spielt '+cardLabel(card.v);
  if(hand.length===0){ gs.winner=pid; gs.phase='finished'; gs.lastAction=playerName(pid)+' hat gewonnen! 🎉'; afterStateChange(); return; }
  var n=gs.players.length;
  if(card.c==='wild'){
    gs.curColor=chosenColor;
    if(card.v==='wild4'){
      gs.lastAction+=' ('+COLOR_NAME[chosenColor]+')';
      hostAdvance(1); hostForceDraw(curPlayer().id,4); hostAdvance(1);
    } else {
      gs.lastAction+=' ('+COLOR_NAME[chosenColor]+')'; hostAdvance(1);
    }
  } else {
    gs.curColor=card.c;
    if(card.v==='skip'){ gs.lastAction+=' — Aussetzen!'; hostAdvance(2); }
    else if(card.v==='reverse'){ gs.dir*=-1; gs.lastAction+=' — Wechsel!'; hostAdvance(n===2?2:1); }
    else if(card.v==='draw2'){ hostAdvance(1); hostForceDraw(curPlayer().id,2); hostAdvance(1); }
    else { hostAdvance(1); }
  }
  afterStateChange();
}

function hostDrawCard(pid){
  if(!gs||gs.phase!=='playing') return;
  if(!curPlayer()||curPlayer().id!==pid) return;
  if(gs.drewUid) return;
  if(gs.pendingDraws>0){ hostForceDraw(pid,gs.pendingDraws); hostAdvance(1); afterStateChange(); return; }
  if(hDeck.length===0) hostReshuffle();
  if(hDeck.length===0) return;
  var card=hDeck.pop();
  gs.hands[pid].push(card);
  gs.deckCount=hDeck.length;
  gs.lastAction=playerName(pid)+' zieht eine Karte';
  if(!canPlay(card,gs.topCard,gs.curColor)){ hostAdvance(1); gs.lastAction+=' (kein Zug)'; }
  else { gs.drewUid=card.u; }
  afterStateChange();
}

function hostPassTurn(pid){
  if(!gs||gs.phase!=='playing') return;
  if(!curPlayer()||curPlayer().id!==pid) return;
  if(!gs.drewUid) return;
  gs.drewUid=null; gs.lastAction=playerName(pid)+' passt'; hostAdvance(1); afterStateChange();
}

function afterStateChange(){
  broadcastState();
  updateGameUI();
  if(isSolo && gs && gs.phase==='playing' && isBotTurn()) scheduleBotTurn();
}

function broadcastState(){
  if(roomCh && gs) roomCh.send({type:'broadcast',event:'state',payload:{s:gs}});
}

function startHeartbeat(){
  clearInterval(heartbeatTimer);
  if(!isHost) return;
  heartbeatTimer = setInterval(function(){
    if(isHost && gs && gs.phase==='playing') broadcastState();
  }, 5000);
}

function stopHeartbeat(){ clearInterval(heartbeatTimer); }

// ════ BOT AI ════
function isBotTurn(){
  var c=curPlayer();
  return c && botIds.indexOf(c.id)!==-1;
}

function scheduleBotTurn(){
  clearTimeout(botTimer);
  document.getElementById('botThinking').style.display='block';
  botTimer=setTimeout(doBotTurn, 750+Math.random()*950);
}

function doBotTurn(){
  document.getElementById('botThinking').style.display='none';
  if(!gs||gs.phase!=='playing') return;
  var c=curPlayer();
  if(!c||botIds.indexOf(c.id)===-1) return;
  var hand=gs.hands[c.id]||[];
  if(gs.drewUid){
    var drew=hand.find(function(x){return x.u===gs.drewUid;});
    if(drew&&canPlay(drew,gs.topCard,gs.curColor)){ hostPlayCard(c.id,drew.u,drew.c==='wild'?botPickColor(hand):null); }
    else { hostPassTurn(c.id); }
    return;
  }
  if(gs.pendingDraws>0){
    var counter=hand.find(function(x){return x.v==='draw2'||x.v==='wild4';});
    if(counter&&canPlay(counter,gs.topCard,gs.curColor)){ hostPlayCard(c.id,counter.u,counter.c==='wild'?botPickColor(hand):null); }
    else { hostDrawCard(c.id); }
    return;
  }
  var playable=hand.filter(function(x){return canPlay(x,gs.topCard,gs.curColor);});
  if(playable.length===0){ hostDrawCard(c.id); return; }
  var card=botPickCard(playable,hand);
  hostPlayCard(c.id,card.u,card.c==='wild'?botPickColor(hand):null);
}

function botPickCard(playable,fullHand){
  var prio=['draw2','skip','reverse','wild4'];
  for(var i=0;i<prio.length;i++){ var f=playable.find(function(x){return x.v===prio[i];}); if(f) return f; }
  var colored=playable.filter(function(x){return x.c!=='wild';});
  if(colored.length>0) return colored[Math.floor(Math.random()*colored.length)];
  return playable[0];
}

function botPickColor(hand){
  var counts={red:0,blue:0,green:0,yellow:0};
  hand.forEach(function(c){ if(counts[c.c]!==undefined) counts[c.c]++; });
  var best='red',max=-1;
  Object.keys(counts).forEach(function(col){ if(counts[col]>max){max=counts[col];best=col;} });
  return best;
}

// ════ SOLO ════
function setBots(n){
  selBots=n;
  document.querySelectorAll('.bot-btn').forEach(function(b){
    b.classList.toggle('sel',parseInt(b.textContent)===n);
  });
}

function startSolo(){
  if(!validateName()) return;
  isSolo=true; isHost=true; roomCh=null; scoreSubmitted=false;
  myId=myName+'_YOU';
  lobby={}; botIds=[];
  lobby[myId]={id:myId,name:myName,ci:0};
  for(var i=0;i<selBots;i++){
    var bid='bot_'+i;
    botIds.push(bid);
    lobby[bid]={id:bid,name:BOT_NAMES[i],ci:i+1};
  }
  hostInitGame();
  showScreen('sGame');
}

// ════ MULTIPLAYER ════
function createRoom(){
  if(!validateName()) return;
  isSolo=false; myRoom=rndCode(); myId=myName+'_'+Date.now(); isHost=true;
  lobby={}; botIds=[]; scoreSubmitted=false;
  lobby[myId]={id:myId,name:myName,ci:0};
  showScreen('sLobby');
  document.getElementById('codeVal').textContent=myRoom;
  document.getElementById('startBtn').style.display='block';
  joinChannel();
}

function joinRoom(){
  if(!validateName()) return;
  var code=(document.getElementById('joinInput').value||'').trim().toUpperCase();
  if(code.length!==4){ setErr('Bitte 4-stelligen Code eingeben!'); return; }
  isSolo=false; myRoom=code; myId=myName+'_'+Date.now(); isHost=false;
  lobby={}; botIds=[];
  lobby[myId]={id:myId,name:myName,ci:0};
  showScreen('sLobby');
  document.getElementById('codeVal').textContent=myRoom;
  document.getElementById('startBtn').style.display='none';
  joinChannel();
}

function joinChannel(){
  if(roomCh) roomCh.unsubscribe();
  roomCh=sb.channel('uno_'+myRoom)
    .on('broadcast',{event:'join'},function(m){
      var p=m.payload;
      if(p.id===myId) return;
      var isNew=!lobby[p.id];
      if(isNew){ lobby[p.id]=p; announce(); }
      else { lobby[p.id].name=p.name; }
      updateLobbyUI();
    })
    .on('broadcast',{event:'leave'},function(m){
      delete lobby[m.payload.id];
      updateLobbyUI();
      if(gs&&gs.phase==='playing') showToast(m.payload.name+' hat das Spiel verlassen');
    })
    .on('broadcast',{event:'state'},function(m){
      if(isHost) return;
      var newGs=m.payload.s;
      if(!newGs) return;
      var cur=newGs.players && newGs.players[newGs.idx];
      var wasMyTurn = gs && gs.players && gs.players[gs.idx] && gs.players[gs.idx].id===myId;
      var isNowMyTurn = cur && cur.id===myId;
      gs=newGs;
      updateGameUI();
      if(isNowMyTurn && !wasMyTurn) showTurnFlash();
    })
    .on('broadcast',{event:'action'},function(m){
      if(!isHost) return;
      var p=m.payload;
      if(p.a==='play')  hostPlayCard(p.pid,p.u,p.col);
      else if(p.a==='draw') hostDrawCard(p.pid);
      else if(p.a==='pass') hostPassTurn(p.pid);
    })
    .subscribe(function(s){
      if(s==='SUBSCRIBED') setTimeout(announce,350);
    });
}

function announce(){
  if(!roomCh) return;
  roomCh.send({type:'broadcast',event:'join',payload:{id:myId,name:myName,ci:0}});
}

function sendAction(payload){
  if(isHost){
    if(payload.a==='play')  hostPlayCard(payload.pid,payload.u,payload.col);
    else if(payload.a==='draw') hostDrawCard(payload.pid);
    else if(payload.a==='pass') hostPassTurn(payload.pid);
  } else {
    if(roomCh) roomCh.send({type:'broadcast',event:'action',payload:payload});
  }
}

function leaveRoom(){
  clearTimeout(botTimer); stopHeartbeat();
  document.getElementById('botThinking').style.display='none';
  if(roomCh){
    roomCh.send({type:'broadcast',event:'leave',payload:{id:myId,name:myName}});
    roomCh.unsubscribe(); roomCh=null;
  }
  gs=null; myRoom=null; isHost=false; lobby={}; pendingCard=null; isSolo=false; botIds=[]; prevTurnId=null;
  showScreen('sMenu');
}

function rndCode(){
  var ch='ABCDEFGHJKLMNPQRSTUVWXYZ2345679',s='';
  for(var i=0;i<4;i++) s+=ch[Math.floor(Math.random()*ch.length)];
  return s;
}

// ════ PLAYER ACTIONS ════
function onClickCard(card){
  if(!gs||gs.phase!=='playing') return;
  var c=curPlayer(); if(!c||c.id!==myId) return;
  if(!canPlay(card,gs.topCard,gs.curColor)) return;
  if(gs.pendingDraws>0&&card.v!=='draw2'&&card.v!=='wild4') return;
  if(gs.drewUid && gs.drewUid!==card.u) return;
  if(card.c==='wild'){ pendingCard=card; document.getElementById('colorPick').classList.remove('off'); return; }
  sendAction({a:'play',pid:myId,u:card.u});
}

function chooseColor(color){
  document.getElementById('colorPick').classList.add('off');
  if(!pendingCard) return;
  sendAction({a:'play',pid:myId,u:pendingCard.u,col:color});
  pendingCard=null;
}

function onClickDraw(){
  if(!gs||gs.phase!=='playing') return;
  var c=curPlayer(); if(!c||c.id!==myId) return;
  if(gs.drewUid){ onPassTurn(); return; }
  sendAction({a:'draw',pid:myId});
}

function onPassTurn(){
  if(!gs||gs.phase!=='playing') return;
  var c=curPlayer(); if(!c||c.id!==myId) return;
  if(!gs.drewUid) return;
  sendAction({a:'pass',pid:myId});
}

function shoutUno(){ showToast('UNO!'); }

// ════ UI ════
function showScreen(id){
  ['sMenu','sLobby','sGame','sWinner','sLeaderboard'].forEach(function(s){
    document.getElementById(s).classList.toggle('off',s!==id);
  });
}

function showTurnFlash(){
  var el=document.getElementById('turnFlash');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function updateLobbyUI(){
  var ids=Object.keys(lobby);
  var html='';
  ids.forEach(function(pid,i){
    var p=lobby[pid], col=PLR_COLORS[i%PLR_COLORS.length];
    html+='<div class="pslot filled">'
      +'<div class="pslot-dot" style="color:'+col+';background:'+col+'"></div>'
      +'<span>'+(p.name||'?')+'</span>'
      +(pid===myId?'<span class="pslot-you">DU</span>':'')
      +'</div>';
  });
  document.getElementById('pListEl').innerHTML=html;
  var info=document.getElementById('lobbyInfo');
  var sb2=document.getElementById('startBtn');
  if(isHost){
    if(ids.length<2){
      info.innerHTML='<span class="waiting-dots">Warte auf Spieler<span>.</span><span>.</span><span>.</span></span>';
      sb2.style.display='none';
    } else {
      info.textContent='';
      sb2.style.display='block';
    }
  } else {
    info.innerHTML='<span>'+ids.length+' Spieler </span><span class="waiting-dots"><span>.</span><span>.</span><span>.</span></span>';
  }
}

// ── Official UNO card builder ──
function buildCardEl(card, playable, large){
  var el=document.createElement('div');
  var lbl=cardLabel(card.v);
  var isWild=(card.c==='wild');

  el.className='ucard '+cardCls(card)+(large?' large':'')+(playable?' playable':' dim');

  // Top-left corner
  var tl=document.createElement('div');
  tl.className='ucard-corner tl';
  tl.textContent=lbl;
  el.appendChild(tl);

  // White oval (non-wild cards only)
  if(!isWild){
    var oval=document.createElement('div');
    oval.className='ucard-oval';
    el.appendChild(oval);
  }

  // Center symbol
  var val=document.createElement('div');
  val.className='ucard-val'+(lbl.length>2?' sm':'');
  val.textContent=lbl;
  el.appendChild(val);

  // Bottom-right corner
  var br=document.createElement('div');
  br.className='ucard-corner br';
  br.textContent=lbl;
  el.appendChild(br);

  if(playable) el.addEventListener('click',function(){ onClickCard(card); });
  return el;
}

function updateGameUI(){
  if(!gs) return;

  if(gs.phase==='finished'){
    clearTimeout(botTimer); stopHeartbeat();
    document.getElementById('botThinking').style.display='none';
    if(!scoreSubmitted){
      scoreSubmitted=true;
      submitScore(myName, gs.winner===myId);
    }
    showScreen('sWinner');
    var w=gs.players.find(function(p){return p.id===gs.winner;});
    document.getElementById('winnerNameEl').textContent=w?w.name:'???';
    var isBot=gs.winner&&botIds.indexOf(gs.winner)!==-1;
    document.getElementById('winnerSubEl').textContent=
      gs.winner===myId?'Du hast gewonnen! 🎉':(isBot?'Der Bot hat gewonnen!':'Besser nächstes Mal!');
    document.getElementById('playAgainBtn').style.display=isHost?'block':'none';
    return;
  }
  if(gs.phase!=='playing') return;
  showScreen('sGame');

  var cur=gs.players[gs.idx];
  var isMyTurn=!!(cur && cur.id===myId);
  var hex=COLOR_HEX[gs.curColor]||'#fff';

  // Turn banner
  var tb=document.getElementById('turnBanner');
  var botTurn=cur&&botIds.indexOf(cur.id)!==-1;
  if(isMyTurn){
    tb.textContent='⭐ DEIN ZUG! ⭐';
    tb.className='tb-mine';
  } else if(botTurn){
    tb.textContent=(cur?cur.name:'?')+' denkt nach…';
    tb.className='tb-bot';
  } else {
    tb.textContent=(cur?cur.name:'?')+' IST DRAN';
    tb.className='tb-other';
  }

  // Color ring
  var ring=document.getElementById('colorRing');
  ring.style.background=hex;
  ring.style.boxShadow='0 0 14px '+hex+', 0 0 28px '+hex+'66';

  document.getElementById('dirBadge').textContent=gs.dir===1?'▶▶':'◀◀';
  document.getElementById('deckCountLbl').textContent=(gs.deckCount||0)+' Karten';
  document.getElementById('lastActLbl').textContent=gs.lastAction||'';

  // Draw pile
  var dp=document.getElementById('drawPileEl');
  dp.style.opacity=(isMyTurn&&!isBotTurn())?'1':'0.55';
  dp.style.pointerEvents=(isMyTurn&&!isBotTurn())?'auto':'none';

  // Discard pile
  var discEl=document.getElementById('discardEl'); discEl.innerHTML='';
  if(gs.topCard){
    var tc=buildCardEl(gs.topCard,false,true);
    tc.classList.remove('dim');
    tc.style.boxShadow='0 0 32px '+hex+', 0 6px 20px rgba(0,0,0,.7)';
    if(gs.topCard.c==='wild'){
      tc.style.outline='4px solid '+hex;
      tc.style.outlineOffset='2px';
    }
    discEl.appendChild(tc);
  }

  // Opponents
  var oppsEl=document.getElementById('oppsEl'); oppsEl.innerHTML='';
  gs.players.forEach(function(p){
    if(p.id===myId) return;
    var hand=gs.hands[p.id]||[];
    var active=cur&&cur.id===p.id;
    var col=PLR_COLORS[p.ci%PLR_COLORS.length];
    var isBot=botIds.indexOf(p.id)!==-1;
    var div=document.createElement('div');
    div.className='opp'+(active?' active':'');
    var av=document.createElement('div');
    av.className='opp-av';
    av.style.background=col;
    av.textContent=p.name.substring(0,2).toUpperCase();
    div.appendChild(av);
    var nm=document.createElement('div');
    nm.className='opp-nm';
    nm.textContent=p.name+(isBot?' 🤖':'');
    div.appendChild(nm);
    var cnt=document.createElement('div');
    cnt.className='opp-cnt';
    cnt.textContent=hand.length;
    div.appendChild(cnt);
    var mini=document.createElement('div');
    mini.className='opp-mini';
    for(var i=0;i<Math.min(hand.length,5);i++){
      var mc=document.createElement('div'); mc.className='opp-mc'; mini.appendChild(mc);
    }
    div.appendChild(mini);
    if(hand.length===1){
      var uno=document.createElement('div'); uno.className='opp-uno'; uno.textContent='UNO!'; div.appendChild(uno);
    }
    oppsEl.appendChild(div);
  });

  // My hand
  var myHand=gs.hands[myId]||[];
  document.getElementById('myLabel').textContent='MEINE KARTEN ('+myHand.length+')';
  var handEl=document.getElementById('handEl'); handEl.innerHTML='';
  myHand.forEach(function(card){
    var canDraw=(gs.pendingDraws===0 || card.v==='draw2' || card.v==='wild4');
    var playableNow=isMyTurn && canPlay(card,gs.topCard,gs.curColor) && canDraw;
    if(gs.drewUid){
      playableNow = isMyTurn && card.u===gs.drewUid && canPlay(card,gs.topCard,gs.curColor);
    }
    handEl.appendChild(buildCardEl(card,playableNow,false));
  });

  document.getElementById('passBtn').style.display=(isMyTurn&&gs.drewUid&&!isBotTurn())?'block':'none';
  document.getElementById('unoBtnWrap').style.display=myHand.length===1?'block':'none';
}

function showToast(msg){
  var t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(function(){t.remove();},2600);
}

function copyCode(){
  var code=document.getElementById('codeVal').textContent;
  if(navigator.clipboard) navigator.clipboard.writeText(code).then(function(){showToast('Code kopiert: '+code);});
  else showToast(code);
}

function setErr(msg){ document.getElementById('menuErr').textContent=msg; }

// ════ NAME ════
function validateName(){
  var inp=(document.getElementById('nameInp').value||'').trim().toUpperCase();
  var name=inp||myName;
  if(!name){setErr('Bitte gib einen Namen ein!');return false;}
  myName=name; localStorage.setItem('playerName',myName);
  document.getElementById('pName').textContent=myName; setErr(''); return true;
}

function saveName(){
  var name=(document.getElementById('nameInp').value||'').trim().toUpperCase();
  if(!name) return;
  myName=name; localStorage.setItem('playerName',myName);
  document.getElementById('pName').textContent=myName; showToast('Name: '+myName);
}

// ════ LEADERBOARD ════
async function submitScore(playerName, won){
  if(!sb||!playerName||playerName.startsWith('BOT')) return;
  try {
    var res=await sb.from('leaderboard').select('wins,games').eq('player_name',playerName).maybeSingle();
    var ex=res.data;
    if(ex){
      await sb.from('leaderboard').update({wins:ex.wins+(won?1:0),games:ex.games+1,last_seen:new Date().toISOString()}).eq('player_name',playerName);
    } else {
      await sb.from('leaderboard').insert({player_name:playerName,wins:won?1:0,games:1,last_seen:new Date().toISOString()});
    }
  } catch(e){ console.log('Score submit error:',e); }
}

async function loadLeaderboard(){
  var el=document.getElementById('lbContent');
  el.innerHTML='<div class="lb-loading">Laden…</div>';
  if(!sb){ el.innerHTML='<div class="lb-error">Keine Verbindung</div>'; return; }
  try {
    var res=await sb.from('leaderboard').select('player_name,wins,games').order('wins',{ascending:false}).limit(25);
    if(res.error) throw res.error;
    renderLeaderboard(res.data||[]);
  } catch(e){
    el.innerHTML='<div class="lb-error">Tabelle nicht verfügbar.<br><span style="font-size:10px;opacity:.6">Supabase-Tabelle einrichten nötig.</span></div>';
  }
}

function renderLeaderboard(data){
  var el=document.getElementById('lbContent');
  if(!data||!data.length){ el.innerHTML='<div class="lb-empty">Noch keine Einträge — spiel los!</div>'; return; }
  var medals=['🥇','🥈','🥉'];
  var html='';
  data.forEach(function(row,i){
    var wr=row.games>0?Math.round(row.wins/row.games*100):0;
    var isMe=row.player_name===myName;
    html+='<div class="lb-row'+(isMe?' lb-me':'')+'">'
      +'<div class="lb-rank">'+(i<3?medals[i]:i+1)+'</div>'
      +'<div class="lb-name">'+(row.player_name||'?')+(isMe?' ◀':'')+'</div>'
      +'<div class="lb-wins">'+row.wins+'</div>'
      +'<div class="lb-wr">'+wr+'%</div>'
      +'</div>';
  });
  el.innerHTML=html;
}

function showLeaderboard(prevScreen){
  lbPrevScreen=prevScreen||'sMenu';
  showScreen('sLeaderboard');
  loadLeaderboard();
}

// ════ BOOT ════
window.addEventListener('load',function(){
  var stored=localStorage.getItem('playerName');
  if(stored){ myName=stored; document.getElementById('pName').textContent=myName; document.getElementById('nameInp').value=myName; }
  if(typeof supabase!=='undefined') sb=supabase.createClient(SUPA_URL,SUPA_KEY);

  document.getElementById('soloBtn').addEventListener('click',function(){
    document.getElementById('soloBox').classList.toggle('show');
    document.getElementById('multibtns').classList.remove('show');
  });
  document.getElementById('startSoloBtn').addEventListener('click',startSolo);
  document.getElementById('multiBtn').addEventListener('click',function(){
    document.getElementById('multibtns').classList.toggle('show');
    document.getElementById('soloBox').classList.remove('show');
  });
  document.getElementById('createBtn').addEventListener('click',createRoom);
  document.getElementById('joinShowBtn').addEventListener('click',function(){
    document.getElementById('joinRow').classList.add('show');
    document.getElementById('joinInput').focus();
  });
  document.getElementById('joinBtn').addEventListener('click',joinRoom);
  document.getElementById('joinInput').addEventListener('keydown',function(e){if(e.key==='Enter')joinRoom();});
  document.getElementById('nameBtn').addEventListener('click',saveName);
  document.getElementById('nameInp').addEventListener('keydown',function(e){if(e.key==='Enter')saveName();});
  document.getElementById('startBtn').addEventListener('click',function(){
    if(!isHost) return;
    if(Object.keys(lobby).length<2){ document.getElementById('lobbyInfo').textContent='Mindestens 2 Spieler!'; return; }
    hostInitGame();
    startHeartbeat();
  });
  document.getElementById('leaveBtn').addEventListener('click',leaveRoom);
  document.getElementById('wLeaveBtn').addEventListener('click',leaveRoom);
  document.getElementById('playAgainBtn').addEventListener('click',function(){
    if(!isHost) return;
    hostInitGame();
    startHeartbeat();
  });
  document.getElementById('lbMenuBtn').addEventListener('click',function(){ showLeaderboard('sMenu'); });
  document.getElementById('wLbBtn').addEventListener('click',function(){ showLeaderboard('sWinner'); });
  document.getElementById('lbBackBtn').addEventListener('click',function(){ showScreen(lbPrevScreen); });
  document.getElementById('lbRefreshBtn').addEventListener('click',loadLeaderboard);
});
</script>
