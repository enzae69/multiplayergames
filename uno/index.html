<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UNO MULTIPLAYER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;color:#fff;font-family:'Exo 2',sans-serif;user-select:none;-webkit-user-select:none}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px 16px 28px;overflow-y:auto;background:#050510}
.screen.off{display:none!important}

/* ── SHARED UI ── */
.gtitle{font-family:'Russo One',sans-serif;font-size:clamp(58px,16vw,110px);background:linear-gradient(90deg,#e32636 20%,#ffc107 40%,#1565c0 60%,#2e7d32 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px;text-align:center;filter:drop-shadow(0 0 22px #e32636)}
.gsub{color:rgba(255,255,255,.4);letter-spacing:6px;font-size:11px;text-transform:uppercase;margin-top:-8px}
.sep{width:60px;height:2px;background:linear-gradient(90deg,transparent,#00f5ff,transparent)}
.btn{font-family:'Russo One',sans-serif;font-size:15px;letter-spacing:1.5px;padding:14px 28px;border:none;border-radius:10px;cursor:pointer;transition:transform .15s,opacity .15s;text-transform:uppercase;touch-action:manipulation;width:min(300px,90vw);display:block;text-align:center;text-decoration:none}
.btn:active{transform:scale(.96);opacity:.85}
.bcyan{background:linear-gradient(135deg,#007a8a,#00c4d4);color:#050510;box-shadow:0 0 18px rgba(0,245,255,.4)}
.bgreen{background:linear-gradient(135deg,#1a8a1a,#39ff14);color:#050510;box-shadow:0 0 18px rgba(57,255,20,.4)}
.bghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12)}
.berr{color:#ff006e;font-size:12px;text-align:center;min-height:14px;letter-spacing:1px}
.pcard{background:rgba(10,10,31,.95);border:2px solid rgba(0,245,255,.3);border-radius:14px;padding:12px 16px;width:min(340px,93vw);display:flex;align-items:center;gap:11px}
.pname{font-weight:900;font-size:15px;color:#00f5ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nameinp{background:rgba(15,15,42,1);border:2px solid rgba(0,245,255,.3);color:#00f5ff;font-family:'Russo One',sans-serif;font-size:18px;padding:10px 14px;border-radius:8px;outline:none;width:min(280px,85vw);text-align:center;letter-spacing:3px;text-transform:uppercase}
.jinp{background:rgba(15,15,42,1);border:2px solid rgba(0,245,255,.3);color:#00f5ff;font-family:'Russo One',sans-serif;font-size:20px;padding:10px 14px;border-radius:8px;outline:none;width:130px;text-align:center;letter-spacing:4px;text-transform:uppercase}
.multibtns{display:none;flex-direction:column;gap:9px;align-items:center;width:100%}
.multibtns.show{display:flex}
.joinrow{display:none;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.joinrow.show{display:flex}

/* ── LOBBY ── */
.lbox{background:rgba(10,10,31,.95);border:2px solid rgba(0,245,255,.3);border-radius:18px;padding:20px;width:min(420px,95vw)}
.ltitle{font-family:'Russo One',sans-serif;font-size:18px;color:#00f5ff;text-align:center;letter-spacing:3px;margin-bottom:12px}
.codebig{font-family:'Russo One',sans-serif;font-size:36px;color:#ffff00;letter-spacing:8px;text-align:center;padding:10px;background:rgba(15,15,42,1);border:2px dashed rgba(255,255,0,.5);border-radius:10px;margin-bottom:6px;cursor:pointer}
.plist{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;min-height:40px}
.pslot{background:rgba(15,15,42,1);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:9px 12px;font-size:13px;display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.5)}
.pslot.filled{border-color:rgba(0,245,255,.35);color:#fff}
.pslot-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.3)}

/* ── GAME SCREEN ── */
#sGame{padding:0;justify-content:flex-start;overflow:hidden;gap:0}

.opponents-bar{display:flex;gap:6px;padding:8px 10px 6px;overflow-x:auto;min-height:78px;align-items:center;background:rgba(0,0,0,.35);width:100%;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.opponents-bar::-webkit-scrollbar{display:none}
.opp{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:62px;padding:5px 4px;border-radius:10px;border:2px solid transparent;transition:border-color .25s,background .25s;flex-shrink:0}
.opp.active{border-color:rgba(255,220,0,.7);background:rgba(255,220,0,.08);animation:oppulse 1s ease-in-out infinite}
@keyframes oppulse{0%,100%{box-shadow:0 0 0 0 rgba(255,220,0,.3)}50%{box-shadow:0 0 10px 3px rgba(255,220,0,.25)}}
.opp-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Russo One',sans-serif;font-size:13px;color:#050510;font-weight:900;border:2px solid rgba(255,255,255,.25);flex-shrink:0}
.opp-name{font-family:'Russo One',sans-serif;font-size:9px;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62px;text-align:center;margin-top:1px}
.opp-count{font-family:'Russo One',sans-serif;font-size:19px;color:#fff;line-height:1}
.opp-uno{color:#ff006e;font-size:9px;letter-spacing:2px;font-weight:900;animation:unopop .5s ease infinite alternate}
@keyframes unopop{from{opacity:.6}to{opacity:1}}

.table-area{flex:1;display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 12px;overflow:hidden;min-height:0}
.discard-pile{display:flex;align-items:center;justify-content:center}
.draw-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.deck-count-lbl{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;text-align:center}
.info-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.color-ring{width:34px;height:34px;border-radius:50%;border:3px solid rgba(255,255,255,.5);transition:background .3s,box-shadow .3s;flex-shrink:0}
.dir-badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;font-size:14px;color:rgba(255,255,255,.6);letter-spacing:2px}
.last-action{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-align:center;max-width:80px;line-height:1.4}

.hand-area{background:rgba(0,0,0,.45);padding:7px 10px 10px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;width:100%}
.hand-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:5px}
.my-label{font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:2px;color:#00f5ff}
.turn-badge{font-family:'Russo One',sans-serif;font-size:10px;padding:4px 10px;border-radius:12px;letter-spacing:1px;transition:all .3s}
.turn-me{background:rgba(57,255,20,.15);color:#39ff14;border:1px solid rgba(57,255,20,.4);animation:mepulse 1s ease-in-out infinite}
@keyframes mepulse{0%,100%{box-shadow:0 0 0 0 rgba(57,255,20,.3)}50%{box-shadow:0 0 8px 2px rgba(57,255,20,.2)}}
.turn-other{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.08)}
.hand-scroll{display:flex;gap:7px;overflow-x:auto;padding:3px 3px 4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hand-scroll::-webkit-scrollbar{display:none}

/* ── UNO CARD ── */
.ucard{width:58px;height:88px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;border:3px solid rgba(255,255,255,.25);box-shadow:0 3px 10px rgba(0,0,0,.5);cursor:default;transition:transform .15s,box-shadow .15s,opacity .15s;flex-shrink:0;font-family:'Russo One',sans-serif;overflow:hidden}
.ucard.large{width:78px;height:118px;border-radius:11px;cursor:default}
.ucard-back{background:linear-gradient(135deg,#14003d,#280070);border-color:rgba(255,255,255,.15);cursor:pointer}
.ucard-back::after{content:'UNO';position:absolute;color:rgba(255,255,255,.07);font-size:16px;font-family:'Russo One',sans-serif;letter-spacing:3px;transform:rotate(-30deg)}
.ucard.playable{box-shadow:0 0 18px rgba(255,255,255,.55),0 3px 10px rgba(0,0,0,.5)!important;border-color:rgba(255,255,255,.95)!important;cursor:pointer}
.ucard.playable:active{transform:translateY(-8px) scale(1.06)!important}
.ucard.dim{opacity:.45;cursor:default}
.ucard-val{font-family:'Russo One',sans-serif;font-size:26px;color:#fff;line-height:1;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.ucard-val.sm{font-size:19px}
.ucard-corner{position:absolute;font-family:'Russo One',sans-serif;font-size:10px;color:rgba(255,255,255,.85);line-height:1}
.ucard-corner.tl{top:3px;left:5px}
.ucard-corner.br{bottom:3px;right:5px;transform:rotate(180deg)}
/* Card colour variants */
.uc-red{background:linear-gradient(145deg,#b5101c,#e32636);border-color:rgba(255,130,130,.35)}
.uc-blue{background:linear-gradient(145deg,#0b449a,#1565c0);border-color:rgba(100,160,255,.35)}
.uc-green{background:linear-gradient(145deg,#185a1c,#2e7d32);border-color:rgba(100,220,100,.35)}
.uc-yellow{background:linear-gradient(145deg,#d97000,#f9a825);border-color:rgba(255,220,80,.35)}
.uc-wild{background:conic-gradient(#e32636 0 25%, #f9a825 25% 50%, #2e7d32 50% 75%, #1565c0 75% 100%);border-color:rgba(255,255,255,.4)}
/* Pass button */
#passBtn{position:fixed;bottom:14px;right:14px;z-index:80;display:none;font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:1px;padding:11px 18px;border:none;border-radius:10px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.2);touch-action:manipulation}
#passBtn:active{opacity:.7}
/* UNO shout button */
#unoBtnWrap{position:fixed;bottom:110px;right:14px;z-index:80;display:none}
#unoBtn{font-family:'Russo One',sans-serif;font-size:20px;letter-spacing:3px;padding:12px 18px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#a00018,#ff006e);color:#fff;box-shadow:0 0 24px rgba(255,0,110,.55);animation:unopulse .8s ease-in-out infinite;touch-action:manipulation}
@keyframes unopulse{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}

/* ── COLOUR PICKER ── */
#colorPick{position:fixed;inset:0;z-index:200;background:rgba(5,5,16,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px}
#colorPick.off{display:none}
.cp-title{font-family:'Russo One',sans-serif;font-size:20px;letter-spacing:4px;color:#fff}
.cp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cp-btn{width:118px;height:118px;border-radius:16px;border:3px solid rgba(255,255,255,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Russo One',sans-serif;font-size:17px;letter-spacing:2px;color:#fff;transition:transform .15s;touch-action:manipulation}
.cp-btn:active{transform:scale(.92)}
.cp-red{background:linear-gradient(145deg,#b5101c,#e32636);box-shadow:0 0 18px rgba(227,38,54,.45)}
.cp-blue{background:linear-gradient(145deg,#0b449a,#1565c0);box-shadow:0 0 18px rgba(21,101,192,.45)}
.cp-green{background:linear-gradient(145deg,#185a1c,#2e7d32);box-shadow:0 0 18px rgba(46,125,50,.45)}
.cp-yellow{background:linear-gradient(145deg,#d97000,#f9a825);box-shadow:0 0 18px rgba(249,168,37,.45)}

/* ── WINNER ── */
.winner-box{background:rgba(10,10,31,.97);border:2px solid rgba(0,245,255,.4);border-radius:20px;padding:32px 28px;width:min(340px,92vw);display:flex;flex-direction:column;align-items:center;gap:16px}
.winner-title{font-family:'Russo One',sans-serif;font-size:26px;color:#ffff00;letter-spacing:4px;text-align:center}
.winner-name{font-family:'Russo One',sans-serif;font-size:34px;color:#00f5ff;text-align:center;filter:drop-shadow(0 0 14px #00f5ff)}
.winner-sub{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:2px;text-align:center}

/* ── TOAST ── */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(10,10,31,.97);border:1px solid rgba(0,245,255,.4);border-radius:10px;padding:9px 20px;font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:2px;color:#00f5ff;white-space:nowrap;pointer-events:none;animation:toastin .3s ease;max-width:90vw;text-align:center}
@keyframes toastin{from{opacity:0;top:8px}to{opacity:1;top:18px}}
</style>
</head>
<body>

<!-- ══ MENU ══════════════════════════════════════════════════════ -->
<div id="sMenu" class="screen">
  <div class="gtitle">UNO</div>
  <div class="gsub">MULTIPLAYER</div>
  <div class="sep"></div>
  <div class="pcard">
    <div style="font-size:26px">🃏</div>
    <div style="flex:1;min-width:0">
      <div class="pname" id="pName">PLAYER</div>
      <div style="font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px">Bereit zum Spielen</div>
    </div>
  </div>
  <button class="btn bcyan" id="multiBtn">⚔️ MULTIPLAYER</button>
  <div class="multibtns" id="multibtns">
    <button class="btn bcyan" id="createBtn" style="font-size:13px;padding:11px">+ RAUM ERSTELLEN</button>
    <button class="btn bghost" id="joinShowBtn" style="font-size:13px;padding:11px">🔍 RAUM BEITRETEN</button>
    <div class="joinrow" id="joinRow">
      <input class="jinp" id="joinInput" maxlength="4" placeholder="CODE" autocomplete="off" spellcheck="false"/>
      <button class="btn bcyan" id="joinBtn" style="width:auto;padding:11px 18px;font-size:13px">JOIN</button>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
    <input class="nameinp" id="nameInp" maxlength="16" placeholder="NAME ÄNDERN..." autocomplete="off" spellcheck="false"/>
    <button class="btn bcyan" id="nameBtn" style="width:auto;padding:11px 16px;font-size:13px">OK</button>
  </div>
  <a href="../menu.html" class="btn bghost" style="font-family:'Russo One',sans-serif;font-size:13px;padding:10px">← SPIELAUSWAHL</a>
  <div class="berr" id="menuErr"></div>
</div>

<!-- ══ LOBBY ══════════════════════════════════════════════════════ -->
<div id="sLobby" class="screen off">
  <div class="lbox">
    <div class="ltitle">LOBBY</div>
    <div class="codebig" id="codeVal" onclick="copyCode()">----</div>
    <div style="font-size:10px;color:rgba(255,255,255,.3);letter-spacing:2px;text-align:center;margin-bottom:10px">TIPPE ZUM KOPIEREN</div>
    <div class="plist" id="pListEl"></div>
    <button class="btn bgreen" id="startBtn" style="margin-bottom:8px;display:none">▶ SPIEL STARTEN</button>
    <div class="berr" id="lobbyInfo">Warte auf weitere Spieler…</div>
    <button class="btn bghost" id="leaveBtn" style="margin-top:4px">← VERLASSEN</button>
  </div>
</div>

<!-- ══ GAME ═══════════════════════════════════════════════════════ -->
<div id="sGame" class="screen off">
  <!-- Opponents strip -->
  <div class="opponents-bar" id="oppsEl"></div>
  <!-- Table -->
  <div class="table-area">
    <!-- Discard pile -->
    <div class="discard-pile" id="discardEl"></div>
    <!-- Draw pile -->
    <div class="draw-wrap">
      <div id="drawPileEl" onclick="onClickDraw()" style="cursor:pointer">
        <div class="ucard large ucard-back"></div>
      </div>
      <div class="deck-count-lbl" id="deckCountLbl">-- Karten</div>
    </div>
    <!-- Info column -->
    <div class="info-col">
      <div class="color-ring" id="colorRing"></div>
      <div class="dir-badge" id="dirBadge">▶▶</div>
      <div class="last-action" id="lastActionLbl"></div>
    </div>
  </div>
  <!-- My hand -->
  <div class="hand-area">
    <div class="hand-top">
      <div class="my-label" id="myLabel">ICH (0)</div>
      <div class="turn-badge turn-other" id="turnBadge">WARTEN…</div>
    </div>
    <div class="hand-scroll" id="handEl"></div>
  </div>
</div>

<!-- ══ WINNER ═════════════════════════════════════════════════════ -->
<div id="sWinner" class="screen off">
  <div class="winner-box">
    <div style="font-size:52px">🏆</div>
    <div class="winner-title">GEWONNEN!</div>
    <div class="winner-name" id="winnerNameEl">---</div>
    <div class="winner-sub" id="winnerSubEl"></div>
    <button class="btn bgreen" id="playAgainBtn" style="display:none;margin-top:4px">↺ NOCHMAL</button>
    <button class="btn bghost" id="wLeaveBtn">← ZUM MENÜ</button>
  </div>
</div>

<!-- ══ COLOUR PICKER ══════════════════════════════════════════════ -->
<div id="colorPick" class="off">
  <div class="cp-title">FARBE WÄHLEN</div>
  <div class="cp-grid">
    <div class="cp-btn cp-red"    onclick="chooseColor('red')">ROT</div>
    <div class="cp-btn cp-blue"   onclick="chooseColor('blue')">BLAU</div>
    <div class="cp-btn cp-green"  onclick="chooseColor('green')">GRÜN</div>
    <div class="cp-btn cp-yellow" onclick="chooseColor('yellow')">GELB</div>
  </div>
</div>

<!-- ══ FLOATING BUTTONS ════════════════════════════════════════════ -->
<div id="unoBtnWrap"><button id="unoBtn" onclick="shoutUno()">UNO!</button></div>
<button id="passBtn" onclick="onPassTurn()">PASSEN ›</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
'use strict';

// ════════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════════
var SUPA_URL  = 'https://ozvyymrqibpyqccgszlz.supabase.co';
var SUPA_KEY  = 'sb_publishable_30WmZF8d8h_rUSrTGtBwnQ_Kn9gquwL';
var PLR_COLORS = ['#ff006e','#ff6b00','#ffdd00','#39ff14','#00f5ff','#bf00ff','#ff3cac','#00ffa3'];
var COLOR_HEX  = {red:'#e32636', blue:'#1565c0', green:'#2e7d32', yellow:'#f9a825'};
var COLOR_NAME = {red:'Rot', blue:'Blau', green:'Grün', yellow:'Gelb'};

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
var sb = null;
var myId   = null;
var myName = 'PLAYER';
var isHost = false;
var myRoom = null;
var roomCh = null;

// gs = authoritative game state, always up-to-date on host.
// Non-host players receive it via broadcast.
var gs = null;

// Host-only: full deck & discard pile (not broadcast to save bandwidth)
var hDeck    = [];
var hDiscard = [];

// Lobby player registry {id: {id,name,colorIdx}}
var lobby = {};

// Card pending colour selection (wild played but colour not yet chosen)
var pendingCard = null;

// ════════════════════════════════════════════════════════
// CARD UTILITIES
// ════════════════════════════════════════════════════════
var _uid = 0;
function mkCard(color, value){ return {c:color, v:value, u:++_uid}; }

function buildDeck(){
  var colors = ['red','blue','green','yellow'], deck = [];
  colors.forEach(function(col){
    deck.push(mkCard(col,'0'));
    for(var n=1;n<=9;n++){ deck.push(mkCard(col,String(n))); deck.push(mkCard(col,String(n))); }
    ['skip','reverse','draw2'].forEach(function(v){ deck.push(mkCard(col,v)); deck.push(mkCard(col,v)); });
  });
  for(var i=0;i<4;i++){ deck.push(mkCard('wild','wild')); deck.push(mkCard('wild','wild4')); }
  return deck;
}

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; }
  return a;
}

function canPlay(card, topCard, curColor){
  if(card.c==='wild') return true;
  if(card.c===curColor) return true;
  if(card.v===topCard.v) return true;
  return false;
}

function cardLabel(v){
  if(v==='skip')    return '⊘';
  if(v==='reverse') return '↺';
  if(v==='draw2')   return '+2';
  if(v==='wild')    return '★';
  if(v==='wild4')   return '+4';
  return v;
}

function cardColorClass(card){ return 'uc-'+(card.c==='wild'?'wild':card.c); }

// ════════════════════════════════════════════════════════
// HOST GAME LOGIC
// ════════════════════════════════════════════════════════
function hostInitGame(){
  var ids = Object.keys(lobby);
  if(ids.length < 2){ showToast('Mindestens 2 Spieler benötigt!'); return; }

  _uid = 0;
  hDeck    = shuffle(buildDeck());
  hDiscard = [];

  // Deal 7 cards per player
  var hands = {};
  ids.forEach(function(pid){ hands[pid]=[]; for(var i=0;i<7;i++) hands[pid].push(hDeck.pop()); });

  // First discard card must not be wild
  var top = hDeck.pop();
  while(top.c==='wild'){ hDeck.unshift(top); top=hDeck.pop(); }
  hDiscard.push(top);

  var players = ids.map(function(pid,i){ return {id:pid, name:lobby[pid].name, ci:lobby[pid].ci||i}; });

  gs = {
    phase:'playing',
    players: players,
    hands: hands,
    deckCount: hDeck.length,
    topCard: top,
    curColor: top.c,
    idx: 0,
    dir: 1,
    pendingDraws: 0,
    drewUid: null,
    winner: null,
    lastAction: 'Spiel gestartet!'
  };

  hostBroadcast();
}

function hCurPlayer(){ return gs.players[gs.idx]; }

function hostAdvance(skip){
  var n = gs.players.length;
  gs.idx = ((gs.idx + gs.dir*(skip||1)) % n + n) % n;
  gs.drewUid = null;
}

function hostForceDraw(pid, amount){
  var hand = gs.hands[pid];
  for(var i=0;i<amount;i++){
    if(hDeck.length===0) hostReshuffle();
    if(hDeck.length>0) hand.push(hDeck.pop());
  }
  gs.deckCount  = hDeck.length;
  gs.pendingDraws = 0;
  var pname = gs.players.find(function(p){return p.id===pid;}).name;
  gs.lastAction += ' → '+pname+' zieht '+amount+'!';
}

function hostReshuffle(){
  if(hDiscard.length<=1) return;
  var keep = hDiscard.pop();
  hDeck = shuffle(hDiscard);
  hDiscard = [keep];
  gs.deckCount = hDeck.length;
}

function hostPlayCard(pid, uid, chosenColor){
  if(!gs || gs.phase!=='playing') return;
  if(hCurPlayer().id !== pid) return;

  var hand = gs.hands[pid];
  var ci = hand.findIndex(function(c){ return c.u===uid; });
  if(ci<0) return;
  var card = hand[ci];

  // If stacked draws: only draw2 on draw2, wild4 on wild4/draw2
  if(gs.pendingDraws>0){
    if(card.v!=='draw2' && card.v!=='wild4') return;
  }
  if(!canPlay(card, gs.topCard, gs.curColor)) return;

  // Wild needs colour
  if(card.c==='wild' && !chosenColor) return;

  // Remove from hand
  hand.splice(ci,1);
  hDiscard.push(gs.topCard);
  gs.topCard   = card;
  gs.drewUid   = null;
  gs.deckCount = hDeck.length;

  var pname = gs.players.find(function(p){return p.id===pid;}).name;
  gs.lastAction = pname + ' spielt ' + cardLabel(card.v);

  // Check win
  if(hand.length===0){
    gs.winner = pid;
    gs.phase  = 'finished';
    gs.lastAction = pname + ' hat gewonnen! 🎉';
    hostBroadcast();
    return;
  }

  // Apply effect
  var n = gs.players.length;
  if(card.c==='wild'){
    gs.curColor = chosenColor;
    if(card.v==='wild4'){
      gs.pendingDraws += 4;
      hostAdvance(1);
      hostForceDraw(hCurPlayer().id, gs.pendingDraws||4);
      gs.pendingDraws = 0;
      hostAdvance(1);
    } else {
      gs.lastAction += ' ('+COLOR_NAME[chosenColor]+')';
      hostAdvance(1);
    }
  } else {
    gs.curColor = card.c;
    if(card.v==='skip'){
      gs.lastAction += ' — Aussetzen!';
      hostAdvance(2);
    } else if(card.v==='reverse'){
      gs.dir *= -1;
      gs.lastAction += ' — Richtungswechsel!';
      if(n===2){ hostAdvance(2); } else { hostAdvance(1); }
    } else if(card.v==='draw2'){
      gs.pendingDraws += 2;
      hostAdvance(1);
      hostForceDraw(hCurPlayer().id, gs.pendingDraws);
      gs.pendingDraws = 0;
      hostAdvance(1);
    } else {
      hostAdvance(1);
    }
  }

  hostBroadcast();
}

function hostDrawCard(pid){
  if(!gs || gs.phase!=='playing') return;
  if(hCurPlayer().id !== pid) return;
  if(gs.drewUid) return;

  if(gs.pendingDraws>0){
    hostForceDraw(pid, gs.pendingDraws);
    gs.pendingDraws = 0;
    hostAdvance(1);
    hostBroadcast();
    return;
  }

  if(hDeck.length===0) hostReshuffle();
  if(hDeck.length===0) return;

  var card = hDeck.pop();
  gs.hands[pid].push(card);
  gs.deckCount = hDeck.length;

  var pname = gs.players.find(function(p){return p.id===pid;}).name;
  gs.lastAction = pname + ' zieht eine Karte';

  if(!canPlay(card, gs.topCard, gs.curColor)){
    hostAdvance(1);
    gs.lastAction += ' (kein Zug)';
  } else {
    gs.drewUid = card.u; // player may now choose to play it
  }

  hostBroadcast();
}

function hostPassTurn(pid){
  if(!gs || gs.phase!=='playing') return;
  if(hCurPlayer().id !== pid) return;
  if(!gs.drewUid) return;
  var pname = gs.players.find(function(p){return p.id===pid;}).name;
  gs.drewUid    = null;
  gs.lastAction = pname + ' passt';
  hostAdvance(1);
  hostBroadcast();
}

function hostBroadcast(){
  if(roomCh) roomCh.send({type:'broadcast', event:'state', payload:{s:gs}});
  updateGameUI();
}

// ════════════════════════════════════════════════════════
// MULTIPLAYER — SUPABASE REALTIME
// ════════════════════════════════════════════════════════
function createRoom(){
  if(!validateName()) return;
  myRoom  = rndCode();
  myId    = myName+'_'+Date.now();
  isHost  = true;
  lobby   = {};
  lobby[myId] = {id:myId, name:myName, ci:0};
  showScreen('sLobby');
  document.getElementById('codeVal').textContent = myRoom;
  document.getElementById('startBtn').style.display = 'block';
  joinChannel();
}

function joinRoom(){
  if(!validateName()) return;
  var code = (document.getElementById('joinInput').value||'').trim().toUpperCase();
  if(code.length!==4){ setErr('Bitte 4-stelligen Code eingeben!'); return; }
  myRoom = code;
  myId   = myName+'_'+Date.now();
  isHost = false;
  lobby  = {};
  showScreen('sLobby');
  document.getElementById('codeVal').textContent = myRoom;
  document.getElementById('startBtn').style.display = 'none';
  joinChannel();
}

function joinChannel(){
  if(roomCh) roomCh.unsubscribe();
  roomCh = sb.channel('uno_'+myRoom)
    .on('broadcast',{event:'join'},function(m){
      var p = m.payload;
      if(!lobby[p.id]) lobby[p.id] = p;
      // Re-announce so latecomers see us
      announce();
      updateLobbyUI();
    })
    .on('broadcast',{event:'leave'},function(m){
      delete lobby[m.payload.id];
      updateLobbyUI();
      if(gs && gs.phase==='playing' && !isHost){
        showToast(m.payload.name+' hat das Spiel verlassen');
      }
    })
    .on('broadcast',{event:'state'},function(m){
      if(isHost) return; // host has authoritative state
      gs = m.payload.s;
      updateGameUI();
    })
    .on('broadcast',{event:'action'},function(m){
      if(!isHost) return;
      var p = m.payload;
      if(p.a==='play')   hostPlayCard(p.pid, p.u, p.col);
      else if(p.a==='draw')   hostDrawCard(p.pid);
      else if(p.a==='pass')   hostPassTurn(p.pid);
    })
    .subscribe(function(){ setTimeout(announce, 350); });
}

function announce(){
  var ci = Object.keys(lobby).indexOf(myId);
  roomCh && roomCh.send({type:'broadcast', event:'join', payload:{id:myId, name:myName, ci:Math.max(ci,0)}});
}

function sendAction(payload){
  if(isHost){
    if(payload.a==='play') hostPlayCard(payload.pid, payload.u, payload.col);
    else if(payload.a==='draw') hostDrawCard(payload.pid);
    else if(payload.a==='pass') hostPassTurn(payload.pid);
  } else {
    roomCh && roomCh.send({type:'broadcast', event:'action', payload:payload});
  }
}

function leaveRoom(){
  if(roomCh){
    roomCh.send({type:'broadcast', event:'leave', payload:{id:myId, name:myName}});
    roomCh.unsubscribe(); roomCh=null;
  }
  gs=null; myRoom=null; isHost=false; lobby={}; pendingCard=null;
  showScreen('sMenu');
}

function rndCode(){
  var ch='ABCDEFGHJKLMNPQRSTUVWXYZ2345679'; var s='';
  for(var i=0;i<4;i++) s+=ch[Math.floor(Math.random()*ch.length)]; return s;
}

// ════════════════════════════════════════════════════════
// PLAYER ACTIONS (touch/click → server)
// ════════════════════════════════════════════════════════
function onClickCard(card){
  if(!gs||gs.phase!=='playing') return;
  var cur = gs.players[gs.idx];
  if(cur.id!==myId) return;
  if(!canPlay(card, gs.topCard, gs.curColor)) return;
  if(gs.pendingDraws>0 && card.v!=='draw2' && card.v!=='wild4') return;

  if(card.c==='wild'){
    pendingCard = card;
    document.getElementById('colorPick').classList.remove('off');
    return;
  }
  sendAction({a:'play', pid:myId, u:card.u});
}

function chooseColor(color){
  document.getElementById('colorPick').classList.add('off');
  if(!pendingCard) return;
  sendAction({a:'play', pid:myId, u:pendingCard.u, col:color});
  pendingCard = null;
}

function onClickDraw(){
  if(!gs||gs.phase!=='playing') return;
  var cur = gs.players[gs.idx];
  if(cur.id!==myId) return;
  if(gs.drewUid){ onPassTurn(); return; } // already drew, pass
  sendAction({a:'draw', pid:myId});
}

function onPassTurn(){
  if(!gs||gs.phase!=='playing') return;
  var cur = gs.players[gs.idx];
  if(cur.id!==myId) return;
  if(!gs.drewUid) return;
  sendAction({a:'pass', pid:myId});
}

function shoutUno(){ showToast('UNO! 🃏'); }

// ════════════════════════════════════════════════════════
// UI RENDERING
// ════════════════════════════════════════════════════════
function showScreen(id){
  ['sMenu','sLobby','sGame','sWinner'].forEach(function(s){
    document.getElementById(s).classList.toggle('off', s!==id);
  });
}

function updateLobbyUI(){
  var ids = Object.keys(lobby);
  var html = '';
  ids.forEach(function(pid,i){
    var p = lobby[pid];
    var col = PLR_COLORS[i % PLR_COLORS.length];
    html += '<div class="pslot filled"><div class="pslot-dot" style="background:'+col+'"></div>'
          +(p.name||'?')+(pid===myId?' <span style="color:rgba(0,245,255,.5);font-size:11px">(Du)</span>':'')+'</div>';
  });
  document.getElementById('pListEl').innerHTML = html;

  var info = document.getElementById('lobbyInfo');
  var sb2  = document.getElementById('startBtn');
  if(isHost){
    if(ids.length<2){ info.textContent='Warte auf mindestens 1 weiteren Spieler…'; sb2.style.display='none'; }
    else { info.textContent=''; sb2.style.display='block'; }
  } else {
    info.textContent = ids.length+' Spieler — Warte auf Host…';
  }
}

function buildCardEl(card, playable, large){
  var el = document.createElement('div');
  el.className = 'ucard '+cardColorClass(card)+(large?' large':'')+(playable?' playable':' dim');
  var lbl = cardLabel(card.v);
  el.innerHTML = '<span class="ucard-corner tl">'+lbl+'</span>'
    +'<span class="ucard-val'+(lbl.length>2?' sm':'')+'">'+lbl+'</span>'
    +'<span class="ucard-corner br">'+lbl+'</span>';
  if(playable) el.addEventListener('click', function(){ onClickCard(card); });
  return el;
}

function updateGameUI(){
  if(!gs) return;

  if(gs.phase==='finished'){
    showScreen('sWinner');
    var winner = gs.players.find(function(p){ return p.id===gs.winner; });
    document.getElementById('winnerNameEl').textContent = winner ? winner.name : '???';
    var isWinner = gs.winner===myId;
    document.getElementById('winnerSubEl').textContent = isWinner ? 'Du hast gewonnen! 🎉' : 'Besser nächstes Mal!';
    document.getElementById('playAgainBtn').style.display = isHost ? 'block' : 'none';
    return;
  }

  if(gs.phase!=='playing') return;
  showScreen('sGame');

  var myHand  = gs.hands[myId] || [];
  var cur     = gs.players[gs.idx];
  var isMyTurn = cur && cur.id===myId;

  // Colour ring
  var ring = document.getElementById('colorRing');
  var hex  = COLOR_HEX[gs.curColor] || '#fff';
  ring.style.background  = hex;
  ring.style.boxShadow   = '0 0 12px '+hex;

  // Direction
  document.getElementById('dirBadge').textContent = gs.dir===1 ? '▶▶' : '◀◀';

  // Deck count
  document.getElementById('deckCountLbl').textContent = (gs.deckCount||0)+' Karten';

  // Draw pile opacity
  var drawEl = document.getElementById('drawPileEl');
  var canDraw = isMyTurn && !gs.drewUid;
  drawEl.style.opacity = canDraw ? '1' : '0.4';
  drawEl.style.cursor  = canDraw ? 'pointer' : (gs.drewUid && isMyTurn ? 'pointer' : 'default');

  // Discard top card
  var discEl = document.getElementById('discardEl');
  discEl.innerHTML = '';
  if(gs.topCard){
    var tc = buildCardEl(gs.topCard, false, true);
    tc.classList.remove('dim');
    if(gs.topCard.c==='wild'){
      tc.style.outline = '3px solid '+hex;
      tc.style.outlineOffset = '2px';
    }
    discEl.appendChild(tc);
  }

  // Opponents
  var oppsEl = document.getElementById('oppsEl');
  oppsEl.innerHTML = '';
  gs.players.forEach(function(p,i){
    if(p.id===myId) return;
    var hand   = gs.hands[p.id]||[];
    var active = cur && cur.id===p.id;
    var col    = PLR_COLORS[p.ci % PLR_COLORS.length];
    var div = document.createElement('div');
    div.className = 'opp'+(active?' active':'');
    div.innerHTML = '<div class="opp-circle" style="background:'+col+'">'+
      (p.name||'?').substring(0,2).toUpperCase()+'</div>'+
      '<div class="opp-name" style="color:'+col+'">'+p.name+'</div>'+
      '<div class="opp-count">'+hand.length+'</div>'+
      (hand.length===1?'<div class="opp-uno">UNO!</div>':'');
    oppsEl.appendChild(div);
  });

  // My hand
  var handEl = document.getElementById('handEl');
  handEl.innerHTML = '';
  myHand.forEach(function(card){
    var playable = isMyTurn
      && canPlay(card, gs.topCard, gs.curColor)
      && (gs.pendingDraws===0 || card.v==='draw2' || card.v==='wild4');
    // Drawn card can always be played if playable, regardless of pendingDraws check above
    if(isMyTurn && gs.drewUid===card.u && canPlay(card, gs.topCard, gs.curColor)) playable=true;
    handEl.appendChild(buildCardEl(card, playable, false));
  });

  // Turn badge
  var tb = document.getElementById('turnBadge');
  tb.textContent  = isMyTurn ? 'DEIN ZUG!' : ((cur?cur.name:'?')+' ist dran');
  tb.className    = 'turn-badge '+(isMyTurn?'turn-me':'turn-other');
  document.getElementById('myLabel').textContent = myName+' ('+myHand.length+')';

  // UNO button
  document.getElementById('unoBtnWrap').style.display = myHand.length===1 ? 'block' : 'none';

  // Pass button — only when I drew a card this turn
  document.getElementById('passBtn').style.display = (isMyTurn && gs.drewUid) ? 'block' : 'none';

  // Last action
  document.getElementById('lastActionLbl').textContent = gs.lastAction||'';

  // Pending draws indicator
  if(isMyTurn && gs.pendingDraws>0){
    document.getElementById('turnBadge').textContent = 'ZIEHE '+gs.pendingDraws+' KARTEN!';
  }
}

function showToast(msg){
  var t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(function(){ t.remove(); }, 2600);
}

function copyCode(){
  var code = document.getElementById('codeVal').textContent;
  if(navigator.clipboard) navigator.clipboard.writeText(code).then(function(){ showToast('Code kopiert: '+code); });
  else showToast(code);
}

function setErr(msg){ document.getElementById('menuErr').textContent=msg; }

// ════════════════════════════════════════════════════════
// NAME HANDLING
// ════════════════════════════════════════════════════════
function validateName(){
  var inp  = document.getElementById('nameInp');
  var name = (inp.value||'').trim().toUpperCase() || myName;
  if(!name){ setErr('Bitte gib einen Namen ein!'); return false; }
  myName = name;
  localStorage.setItem('playerName', myName);
  document.getElementById('pName').textContent = myName;
  setErr('');
  return true;
}

function saveName(){
  var inp  = document.getElementById('nameInp');
  var name = (inp.value||'').trim().toUpperCase();
  if(!name) return;
  myName = name;
  localStorage.setItem('playerName', myName);
  document.getElementById('pName').textContent = myName;
  showToast('Name: '+myName);
}

// ════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════
window.addEventListener('load', function(){
  var stored = localStorage.getItem('playerName');
  if(stored){ myName=stored; document.getElementById('pName').textContent=myName; document.getElementById('nameInp').value=myName; }

  if(typeof supabase!=='undefined') sb=supabase.createClient(SUPA_URL, SUPA_KEY);

  document.getElementById('multiBtn').addEventListener('click',   function(){ document.getElementById('multibtns').classList.add('show'); });
  document.getElementById('createBtn').addEventListener('click',  createRoom);
  document.getElementById('joinShowBtn').addEventListener('click',function(){ document.getElementById('joinRow').classList.add('show'); document.getElementById('joinInput').focus(); });
  document.getElementById('joinBtn').addEventListener('click',    joinRoom);
  document.getElementById('joinInput').addEventListener('keydown',function(e){ if(e.key==='Enter') joinRoom(); });
  document.getElementById('nameBtn').addEventListener('click',    saveName);
  document.getElementById('nameInp').addEventListener('keydown',  function(e){ if(e.key==='Enter') saveName(); });
  document.getElementById('startBtn').addEventListener('click',   function(){
    if(!isHost) return;
    var ids=Object.keys(lobby);
    if(ids.length<2){ document.getElementById('lobbyInfo').textContent='Mindestens 2 Spieler!'; return; }
    hostInitGame();
    showScreen('sGame');
    roomCh && roomCh.send({type:'broadcast', event:'state', payload:{s:gs}});
  });
  document.getElementById('leaveBtn').addEventListener('click',   leaveRoom);
  document.getElementById('wLeaveBtn').addEventListener('click',  leaveRoom);
  document.getElementById('playAgainBtn').addEventListener('click',function(){
    if(!isHost) return;
    hostInitGame();
    showScreen('sGame');
    roomCh && roomCh.send({type:'broadcast', event:'state', payload:{s:gs}});
  });
});
</script>
